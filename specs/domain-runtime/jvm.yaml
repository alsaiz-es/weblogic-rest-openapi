openapi: 3.0.3
info:
  title: WebLogic REST Management API — JVM Runtime
  description: |
    Read-only monitoring endpoint for the `JVMRuntime` on a managed
    server. Exposes heap sizing, uptime, process CPU load, and JVM/OS
    identity strings.

    Field set and types verified against live WLS 12.2.1.4 (HotSpot 1.8.0_401)
    and WLS 14.1.2.0 (HotSpot 21.0.9) installs.

    **Known quirk**: this bean exposes a `threadStackDump` field
    containing the full output of `jstack` as a single multi-kilobyte
    string. Always pair GETs on this resource with
    `excludeFields=threadStackDump` unless you specifically want the
    dump; otherwise every poll ships 100+ KB you will discard.
  version: 0.1.1
  contact:
    name: weblogic-rest-openapi (unofficial)
    url: https://github.com/alsaiz-es/weblogic-rest-openapi
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://{host}:{port}/management/weblogic/{version}
    description: WebLogic Administration Server management endpoint (HTTP).
    variables:
      host:
        default: localhost
      port:
        default: "7001"
      version:
        default: latest
        enum:
          - latest
          - "14.1.1.0"
          - "14.1.2.0"
          - "12.2.1.4.0"
  - url: https://{host}:{port}/management/weblogic/{version}
    description: WebLogic Administration Server management endpoint (HTTPS).
    variables:
      host:
        default: localhost
      port:
        default: "7002"
      version:
        default: latest
        enum:
          - latest
          - "14.1.1.0"
          - "14.1.2.0"
          - "12.2.1.4.0"

security:
  - basicAuth: []

tags:
  - name: jvmRuntime
    description: JVM-level metrics per server.

paths:
  /domainRuntime/serverRuntimes/{serverName}/JVMRuntime:
    parameters:
      - name: serverName
        in: path
        required: true
        description: Name of the managed server (case-sensitive).
        schema:
          type: string
        example: osb_server1
    get:
      operationId: getJVMRuntime
      tags: [jvmRuntime]
      summary: Get the JVM runtime for a server.
      description: |
        Returns the `JVMRuntime` bean with heap, uptime, process CPU load,
        and identity strings. See the file-level description for the
        `threadStackDump` exclusion recommendation.
      parameters:
        - $ref: '../common/schemas.yaml#/components/parameters/FieldsParam'
        - $ref: '../common/schemas.yaml#/components/parameters/ExcludeFieldsParam'
        - $ref: '../common/schemas.yaml#/components/parameters/LinksParam'
      responses:
        '200':
          description: JVM runtime bean.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JVMRuntime'
              examples:
                osbServer1:
                  $ref: '#/components/examples/JVMRuntimeExample'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        WebLogic administration user credentials. `Monitor` role is
        sufficient for GET operations on runtime resources.

  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '../common/schemas.yaml#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user lacks the required role.
      content:
        application/json:
          schema:
            $ref: '../common/schemas.yaml#/components/schemas/ErrorResponse'
    NotFound:
      description: The server does not exist or is not running.
      content:
        application/json:
          schema:
            $ref: '../common/schemas.yaml#/components/schemas/ErrorResponse'

  schemas:
    JVMRuntime:
      type: object
      description: |
        JVM-level runtime data for a single managed server. Values come
        straight from the server's in-process JMX beans
        (`java.lang.Runtime`, `java.lang.Memory`,
        `java.lang.OperatingSystem`) and thus reflect the JVM that
        WebLogic itself is running in — not Node Manager or any forked
        process.
      properties:
        identity:
          $ref: '../common/schemas.yaml#/components/schemas/Identity'
        type:
          type: string
          description: Bean discriminator. Always `JVMRuntime`.
          example: JVMRuntime
        name:
          type: string
          description: |
            Bean name. Mirrors the server name (not a JVM-specific
            identifier) — same convention as `JDBCServiceRuntime`.
          example: osb_server1

        # --- Uptime ---
        uptime:
          type: integer
          format: int64
          description: |
            JVM uptime in milliseconds. Equivalent to
            `RuntimeMXBean.getUptime()`. Reset on every server restart.
          example: 489908

        # --- Heap ---
        heapSizeCurrent:
          type: integer
          format: int64
          description: |
            Current committed heap size, in bytes. Can shrink and grow
            between `-Xms` and `-Xmx` over the JVM's life.
          example: 2979004416
        heapSizeMax:
          type: integer
          format: int64
          description: |
            Hard upper bound on the heap, in bytes (equivalent to `-Xmx`).
          example: 3817865216
        heapFreeCurrent:
          type: integer
          format: int64
          description: |
            Free space inside the currently committed heap, in bytes.
            The amount of memory that can be allocated without first
            growing the heap.
          example: 1962374912
        heapFreePercent:
          type: integer
          format: int32
          description: |
            Free heap as a percentage of `heapSizeMax` (not of
            `heapSizeCurrent`). Integer-valued in the REST serialization
            — loses sub-percent precision.
          example: 73

        # --- CPU ---
        processCpuLoad:
          type: number
          format: double
          description: |
            Recent CPU usage of the WebLogic JVM process, as a fraction
            in `[0.0, 1.0]`. Multiply by the CPU count to get the
            per-core equivalent. Sourced from `OperatingSystemMXBean`;
            may be `-1.0` when unavailable.
          minimum: -1
          maximum: 1
          example: 0.04995764876004397

        # --- JVM / OS identity ---
        javaVersion:
          type: string
          description: JVM version string (`java.version`).
          example: 1.8.0_401
        javaVendor:
          type: string
          description: Vendor reported by the JRE.
          example: Oracle Corporation
        javaVendorVersion:
          type: string
          nullable: true
          description: |
            Vendor-specific version string (added in WLS 14.1.2, not present
            in 12.2.1.4). Often `null` on stock Oracle JDK builds — the
            field exists in the response but carries no value.
          example: null
        javaVMVendor:
          type: string
          description: |
            Vendor of the VM implementation. On HotSpot JDKs this matches
            `javaVendor`; on OpenJ9 / third-party VMs it will differ.
          example: Oracle Corporation
        OSName:
          type: string
          description: |
            Operating system name. **Note the uppercase `OS` prefix** —
            this differs from the typical `osName`/`osVersion` naming
            used elsewhere in the WebLogic REST API.
          example: Linux
        OSVersion:
          type: string
          example: 4.1.12-124.57.1.el7uek.x86_64

        # --- Diagnostics payload (opt-in) ---
        threadStackDump:
          type: string
          description: |
            Full thread stack dump (`jstack`-equivalent) as a single
            string with embedded newlines. Typically 50-500 KB.

            Always exclude with `excludeFields=threadStackDump` from
            monitoring polls. Useful only for ad-hoc diagnostics; request
            it explicitly with `fields=threadStackDump` when needed.

  examples:
    JVMRuntimeExample:
      summary: Composite example — 12.2.1.4 body with the 14.1.2 `javaVendorVersion` field
      description: |
        Values for every field except `javaVendorVersion` come verbatim
        from a WLS 12.2.1.4 osb_server1 response (HotSpot 1.8.0_401).
        `javaVendorVersion` was added in WLS 14.1.2 and is shown here as
        `null`, matching what a 14.1.2 Oracle JDK install returns; on
        12.2.1.4 the field is absent from the response entirely.

        `threadStackDump` is elided — in a real response it is a ~100 KB
        string. Request it explicitly with `fields=threadStackDump` when
        you need it.
      value:
        identity: [JVMRuntime]
        type: JVMRuntime
        name: osb_server1
        uptime: 489908
        heapSizeCurrent: 2979004416
        heapSizeMax: 3817865216
        heapFreeCurrent: 1962374912
        heapFreePercent: 73
        processCpuLoad: 0.04995764876004397
        javaVersion: 1.8.0_401
        javaVendor: Oracle Corporation
        javaVendorVersion: null
        javaVMVendor: Oracle Corporation
        OSName: Linux
        OSVersion: 4.1.12-124.57.1.el7uek.x86_64
        threadStackDump: "…elided (≈100 KB of jstack output)…"
