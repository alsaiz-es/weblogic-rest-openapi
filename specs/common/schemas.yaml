openapi: 3.0.3
info:
  title: WebLogic REST Management API — Shared Components
  description: |
    Shared schemas and parameters reused across bean-tree specifications
    (domain-runtime, server-runtime, edit, lifecycle).

    This file is not a standalone API. It exists to be referenced by sibling
    specs via `$ref: '../common/schemas.yaml#/components/...'`.
  version: 0.1.1
paths: {}
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        WebLogic administration user credentials. The user must have at least
        the `Monitor` role for GET operations; `Operator`, `Deployer`, or
        `Admin` are required for lifecycle and edit operations.

  parameters:
    VersionPathParam:
      name: version
      in: path
      required: true
      description: |
        WebLogic REST API version segment. Use a concrete version to pin
        behavior, or `latest` to follow the server default.
      schema:
        type: string
        enum:
          - latest
          - "14.1.1.0"
          - "14.1.2.0"
          - "12.2.1.4.0"
        default: latest

    FieldsParam:
      name: fields
      in: query
      required: false
      description: |
        Comma-separated list of property names to include in the response.
        When omitted, WebLogic returns the default property set for the bean.
      schema:
        type: string
      example: name,state,healthState

    ExcludeFieldsParam:
      name: excludeFields
      in: query
      required: false
      description: |
        Comma-separated list of property names to omit from the response.
        Mutually exclusive with `fields`.
      schema:
        type: string
      example: serverLogRuntime,JMSRuntime

    LinksParam:
      name: links
      in: query
      required: false
      description: |
        Comma-separated list of link relation names (`rel`) to include in
        the response `links` array. `none` suppresses all links. Omit the
        parameter to return every link the server provides.

        Examples: `links=none`, `links=self`, `links=self,parent`.
      schema:
        type: string
      examples:
        suppressAll:
          value: none
          summary: Suppress all HATEOAS links.
        selfOnly:
          value: self
          summary: Return only the self link.
        selfAndParent:
          value: self,parent
          summary: Return self and parent links.

    ExcludeLinksParam:
      name: excludeLinks
      in: query
      required: false
      description: |
        Comma-separated list of link relation names to omit from the
        response. Mutually exclusive with `links`.
      schema:
        type: string
      example: canonical,parent

  schemas:
    Identity:
      type: array
      description: |
        Canonical bean path expressed as an ordered list of segments. The
        first segment is the root MBean; subsequent segments alternate
        between child-collection names and instance names.

        In practice (verified on WLS 12.2.1.4) this array may be returned
        **empty** (`[]`) when the bean is addressed directly; the
        authoritative path is then implicit in the `self` link. Treat
        empty as a valid value.
      items:
        type: string
      example:
        - domainRuntime
        - serverRuntimes
        - AdminServer

    Link:
      type: object
      description: HATEOAS link to a related resource.
      required:
        - rel
        - href
      properties:
        rel:
          type: string
          description: |
            Relationship name. Common values include `self`, `canonical`,
            `parent`, and bean-specific relations such as `threadPoolRuntime`.
          example: self
        href:
          type: string
          format: uri
          description: Absolute URL of the related resource.
          example: http://example.com/management/weblogic/latest/domainRuntime/serverRuntimes/AdminServer
        title:
          type: string
          description: Optional human-readable title.

    HealthSymptom:
      type: object
      description: |
        A single symptom contributing to a subsystem's health state.

        Note: field names and the `severity` enum are inferred from the
        `weblogic.health.Symptom` Java API. Pending verification against a
        live symptomatic response — all health responses observed so far
        carried `symptoms: []`. The REST serialization may downcase the
        severity values (`low`/`medium`/`high`) as it does for
        `HealthState.state`; confirm before relying on the casing.
      properties:
        severity:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
        cause:
          type: string
          description: Short description of the contributing cause.
        mitigationMessages:
          type: array
          items:
            type: string
        panicMessage:
          type: string
          nullable: true

    HealthState:
      type: object
      description: |
        Composite health state reported by a subsystem or server. The `state`
        field is the coarse roll-up; `symptoms` provides the underlying
        contributing conditions when available.

        Note: the REST serialization uses **lowercase** state tokens
        (`ok`, `warning`, ...), not the `HEALTH_*` Java constants from
        `weblogic.health.HealthState`. Verified against WLS 12.2.1.4.
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - ok
            - warning
            - critical
            - failed
            - overloaded
            - unknown
        subsystemName:
          type: string
          description: Name of the subsystem reporting this health state.
          nullable: true
        partitionName:
          type: string
          nullable: true
        symptoms:
          type: array
          items:
            $ref: '#/components/schemas/HealthSymptom'

    ErrorResponse:
      type: object
      description: |
        Error envelope returned by WebLogic for failed management requests.
        Follows RFC 7807 (`application/problem+json`) loosely.
      required:
        - type
        - title
      properties:
        type:
          type: string
          description: URI identifying the error type.
          example: http://www.oracle.com/weblogic/rest/errors/not-found
        title:
          type: string
          description: Short, human-readable error summary.
          example: Not Found
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        status:
          type: integer
          format: int32
          description: HTTP status code.
          example: 404
        messages:
          type: array
          description: WebLogic-specific diagnostic messages.
          items:
            type: object
            properties:
              severity:
                type: string
                enum:
                  - SUCCESS
                  - INFO
                  - WARNING
                  - ERROR
                  - FAILURE
              message:
                type: string
