      operationId: getWebserviceTestpage__edit_webserviceTestpage
      tags: *id006
      summary: Read singleton `WebserviceTestpage` under `/edit`.
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/FieldsParam'
      - $ref: '#/components/parameters/ExcludeFieldsParam'
      - $ref: '#/components/parameters/LinksParam'
      - $ref: '#/components/parameters/ExcludeLinksParam'
      responses:
        '200':
          description: WebserviceTestpage bean.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebserviceTestpage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: updateWebserviceTestpage__edit_webserviceTestpage
      tags: *id006
      summary: Update singleton `WebserviceTestpage`.
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebserviceTestpage'
      responses:
        '200':
          description: WebserviceTestpage updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebserviceTestpage'
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  schemas:
    Identity:
      type: array
      description: Canonical bean path expressed as ordered segments.
      items:
        type: string
    Link:
      type: object
      required:
      - rel
      - href
      properties:
        rel:
          type: string
        href:
          type: string
          format: uri
        title:
          type: string
    EnvelopeBase:
      type: object
      description: "Mixin composed into every generated bean schema. Adds the standard\n`identity` and `links` fields the
        WLS REST framework injects on\nevery singleton response.\n"
      properties:
        identity:
          $ref: '#/components/schemas/Identity'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    CollectionEnvelope:
      type: object
      description: "Generic envelope for collection responses. The `items` array holds\nbean instances; `links` carries collection-level
        HATEOAS links.\nThe concrete item schema is referenced by each path's response.\n"
      properties:
        items:
          type: array
          items:
            type: object
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    ErrorResponse:
      type: object
      description: Standard error envelope for read-tree failures (RFC 7807-ish).
      required:
      - type
      - title
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
        status:
          type: integer
          format: int32
        messages:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum:
                - SUCCESS
                - INFO
                - WARNING
                - ERROR
                - FAILURE
              message:
                type: string
    EditErrorDetail:
      type: object
      required:
      - type
      - title
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
    EditErrorResponse:
      type: object
      description: "Edit-tree validation error envelope. Carries `wls:errorsDetails`\nwith one or more nested errors. Distinct
        from `ErrorResponse`.\n"
      required:
      - status
      - title
      properties:
        status:
          type: integer
          format: int32
        type:
          type: string
          format: uri
        title:
          type: string
        wls:errorsDetails:
          type: array
          items:
            $ref: '#/components/schemas/EditErrorDetail'
    ServerRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: Provides methods for retrieving runtime information about a server instance and for transitioning a
          server from one state to another.
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          activationTime:
            type: integer
            format: int64
            description: The time when the server was started.
            readOnly: true
          adminServer:
            type: boolean
            description: Indicates whether the server is an Administration Server.
            readOnly: true
          adminServerHost:
            type: string
            description: 'The address on which the Administration Server is listening for connections. For example, this might
              return the string: santiago'
            readOnly: true
          adminServerListenPort:
            type: integer
            format: int32
            description: The port on which the Administration Server is listening for connections.
            readOnly: true
          adminServerListenPortSecure:
            type: boolean
            description: Indicates whether the port that the server uses for administrative traffic is configured to use
              a secure protocol.
            readOnly: true
          administrationPortEnabled:
            type: boolean
            description: Indicates whether the administration port is enabled on the server
            readOnly: true
          administrationURL:
            type: string
            description: "The URL that the server and its clients use for administrative connections.\n\nIf no administration
              channel is enabled, then this method returns the URL for connections through the default channel. If the default
              channel is de-activated, this method returns the URL for a secure channel. If no secure channel is enabled,
              the method returns null.\n\nThe returned URL will be consistent with dynamic channel updates."
            readOnly: true
          applicationRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ApplicationRuntime'
            description: Returns the list of currently running Applications
            readOnly: true
          asyncReplicationRuntime:
            allOf:
            - $ref: '#/components/schemas/AsyncReplicationRuntime'
            description: Return an MBean which represents this server's view of its AsyncReplicationRuntime, if any.
            readOnly: true
          batchJobRepositoryRuntime:
            allOf:
            - $ref: '#/components/schemas/BatchJobRepositoryRuntime'
            description: Gets the BatchJobRepositoryRuntimeMBean for this server.
            readOnly: true
          classLoaderRuntime:
            allOf:
            - $ref: '#/components/schemas/ClassLoaderRuntime'
            description: Get statistics for system-level class loading.
            readOnly: true
          clusterRuntime:
            allOf:
            - $ref: '#/components/schemas/ClusterRuntime'
            description: Return an MBean which represents this server's view of its cluster, if any.
            readOnly: true
          concurrentManagedObjectsRuntime:
            allOf:
            - $ref: '#/components/schemas/ConcurrentManagedObjectsRuntime'
            description: The ConcurrentManagedObjectsRuntimeMBean for this server.
            readOnly: true
          connectorServiceRuntime:
            allOf:
