          JDBCLLRTableName:
            type: string
            description: "The table name for this server's Logging Last Resource (LLR) database table(s). WebLogic Server
              creates the table(s) and then uses them during transaction processing for the LLR transaction optimization.
              This setting must be unique for each server. The default table name is `WL_LLR_SERVERNAME`.\n\nThis setting
              only applies if this server hosts one or more LLR-enabled JDBC data sources.\n\nThe format for the tables that
              WebLogic Server creates is [[[catalog.]schema.]name.] Each \".\" in the table name is significant, and schema
              generally corresponds to username in many databases.\n\nIMPORTANT: If this value is changed but the LLR table
              already exists in the database, you must preserve the existing table's data. Consequently, when changing the
              table name, the existing database table must be renamed by a database administrator to match the new configured
              table name. Otherwise, transaction records may be lost, resulting in heuristic failures that aren't logged.\n\
              \nIMPORTANT: Each server's table name must be unique. Multiple LLR-enabled data sources within the same server
              may share the same table, but multiple servers must not share the same table. If multiple same-named servers
              share a table, the behavior is undefined and it is likely that transactions will not recover properly after
              a crash, creating heuristic hazards."
            x-weblogic-restart-needed: true
          JDBCLoginTimeoutSeconds:
            type: integer
            format: int32
            description: The JDBC Login Timeout value. Specified value is passed into 
              java.sql.DriverManager.setLoginTimeout(). Note that this DriverManager setting will impact *all* JDBC 
              drivers loaded into this JVM. Feature is disabled by default.
            x-weblogic-restart-needed: true
          JMSConnectionFactoryUnmappedResRefMode:
            type: string
            enum:
            - ReturnDefault
            - FailSafe
            description: "Use this unmapped resource reference mode to specify the behavior of any resource reference to a
              Connection Factory when the resource reference does not directly specify a JNDI name by a lookup attribute,
              or by a mappedName attribute, or by a jndi-name in a descriptor file. If a JNDI name is specified, the resource
              reference either resolves to the specified object in the JNDI tree or generates a javax.naming.NameNotFoundException.\
              \ \n\nFollowing are the available unmapped resource reference modes: \n\n- `FailSafe :` In this mode, an application
              JMS connection factory resource reference that does not specify a JNDI name resolves to an object bound to the
              JNDI tree with the same name as the resource reference name if one can be found in JNDI tree. Otherwise, it
              throws a javax.naming.NameNotFoundException. A resource reference without a JNDI name never returns a Java EE
              7 Default Connection Factory in this mode. \n\nThis mode yields pre-12.2.1 WebLogic Server behavior. This mode
              is Java EE compliant, but the Java EE 7 specification disallows it from being the default mode. \n\n- \n\n-
              `ReturnDefault :` This policy is a Java EE compliant mode and it is the default mode. It complies with Java
              EE 7 while doing a best effort to try delivering FailSafe behavior when it is expected. \n\n(a) If the resource
              reference name matches the local JNDI name of a configured foreign JMS provider mapping, then WebLogic Server
              returns the remote JNDI entry from the mapping if it can be resolved, or it throws a javax.naming.NameNotFoundException.\
              \ \n\n(b) If the resource reference does not match with a foreign JMS provider mapping, and if the resource
              reference name matches the name of an object that is already bound to the JNDI tree, WebLogic Server returns
              the JNDI tree object. \n\n(c) If neither (a) nor (b) apply, then WebLogic Server returns \"java:comp/DefaultJMSConnectionFactory\"\
              . In addition, it adds an 'Info' message in the server log indicating that a special behavior has occurred.
              This log message will occur at most once per application per server boot. \n\n-"
          JMSDefaultConnectionFactoriesEnabled:
            type: boolean
            description: "Specifies whether this server uses JMS default connection factories.\n\nWebLogic Server provides
              the following JMS default connection factories:\n\n- `weblogic.jms.ConnectionFactory` \n- \n- `weblogic.jms.XAConnectionFactory`
              An XA factory is required for JMS applications to use JTA user-transactions, but is not required for transacted
              sessions. All other preconfigured attributes for the default connection factories are set to the same default
              values as a user-defined connection factory. If the preconfigured settings of the default factories are appropriate
              for your application, you do not need to configure any additional factories for your application. \n- \n\nNote:
              When using the default connection factories, you have no control over targeting the WebLogic Server instances
              where the connection factory may be deployed. However, you can disable the default connection factories on a
              per-server basis. To deploy a connection factory on independent servers, on specific servers within a cluster,
              or on an entire cluster, you need to configure a connection factory and specify the appropriate server targets.
              The default Java EE 7 JMS Connection Factory, java:comp/DefaultJMSConnectionFactory, will be available even
              when the WebLogic JMS default connection factories are disabled."
          JNDITransportableObjectFactoryList:
