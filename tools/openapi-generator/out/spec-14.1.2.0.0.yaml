            format: int32
            description: "The number of seconds the Node Manager should wait before restarting this server.\n\nAfter killing
              a server process, the system might need several seconds to release the TCP port(s) the server was using. If
              Node Manager attempts to restart the Managed Server while its ports are still active, the startup attempt fails.\n\
              \nIf AutoMigration is enabled and RestartDelaySeconds is 0, the RestartDelaySeconds is automatically set to
              the lease time. This prevents the server from failing to restart after migration when the previous lease is
              still valid."
          restartIntervalSeconds:
            type: integer
            format: int32
            description: The number of seconds during which this server can be restarted, up to the number of times 
              specified in RestartMax.
          restartMax:
            type: integer
            format: int32
            description: The number of times that the Node Manager can restart this server within the interval specified
              in RestartIntervalSeconds.
          retryIntervalBeforeMSIMode:
            type: integer
            format: int32
            description: Get the number of seconds between the retries to contact admin server, before starting in 
              Managed Server Independence Mode
          serverDebug:
            allOf:
            - $ref: '#/components/schemas/ServerDebug'
            description: The debug setting for this server.
          serverDiagnosticConfig:
            allOf:
            - $ref: '#/components/schemas/WLDFServerDiagnostic'
            description: The diagnostic configuration for the servers
          serverLifeCycleTimeoutVal:
            type: integer
            format: int32
            description: "Number of seconds a force shutdown operation waits before timing out and killing itself. If the
              operation does not complete within the configured timeout seconds, the server will shutdown automatically if
              the state of the server at that time was `SHUTTING_DOWN`.\n\nA value of `0` means that the server will wait
              indefinitely for life cycle operation to complete."
          serverStart:
            allOf:
            - $ref: '#/components/schemas/ServerStart'
            description: Returns the ServerStartMBean that can be used to start up this server remotely.
          sessionReplicationOnShutdownEnabled:
            type: boolean
            description: Indicates if session replication on server shutdown is enabled. During server shutdown, any 
              active http and ejb stateful session states will be replicated to a secondary server (if available) in the
              cluster.
          singleSignOnServices:
            allOf:
            - $ref: '#/components/schemas/SingleSignOnServices'
            description: Gets the Single Sign-On Services MBean
          sitConfigPollingInterval:
            type: integer
            format: int32
            description: Returns the current polling interval for finding the situational config file in the filesystem
          sitConfigRequired:
            type: boolean
            description: Returns whether situational config files are required and WebLogic Server should fail to boot 
              if situational config files are not present.
          stagingDirectoryName:
            type: string
            description: "The directory path on the Managed Server where all staged (prepared) applications are placed.\n\n\
              If an absolute directory name is not specified, the path is relative to the root directory \"/\". Once configured,
              you cannot change the staging directory name. Remove all applications from the server prior to changing this
              attribute. The default staging directory is \"stage\", relative to the server root."
            x-weblogic-restart-needed: true
          stagingMode:
            type: string
            enum:
            - 
            description: "The mode that specifies whether an application's files are copied from a source on the Administration
              Server to the Managed Server's staging area during application preparation.\n\nDuring application preparation,
              the application's files are copied from the source on the Administration Server to the Managed Server's staging
              area. If you specify `nostage` or `external_stage`, the copy will not occur. This is useful when the staging
              area is a shared directory, already containing the application files, or if this is a single server domain.
              The administrator must ensure that the Managed Server's staging directory is set appropriately. Deployment errors
              will result if the application is not available during the preparation or activation of the application. Each
              application can override the staging mode specified here."
            x-weblogic-restart-needed: true
          startupMode:
            type: string
            description: "The state in which this server should be started. If you specify `STANDBY`, you must also enable
              the domain-wide administration port.\n\nIf you specify `INACTIVE`, the server will not be started and is just
              a placeholder server. To bring up this server we need to change startupMode to other value.\n\nIn the `RUNNING`
              state, a server offers its services to clients and can operate as a full member of a cluster. In the `ADMIN`
              state, the server is up and running, but available only for administration operations, allowing you to perform
              server and application-level administration tasks without risk to running applications. In the `STANDBY` state,
              a server instance does not process any request; its regular Listen Port is closed. The Administration Port is
              open. It only accepts life cycle commands that transition the server instance to either the `RUNNING` or the
              `SHUTDOWN` state. Other Administration requests are not accepted. A `STANDBY` server's only purpose is to resume
              into the `RUNNING` state quickly; it saves server startup time."
          startupTimeout:
            type: integer
            format: int32
            description: "Timeout value for server start and resume operations. If the server fails to start in the timeout
              period, it will force shutdown.\n\nA value of `0` means that the server will wait indefinitely for the operation
              to complete."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          synchronizedSessionTimeoutEnabled:
            type: boolean
            description: Indicates whether to also invalidate all the other sessions when one of the sessions that share
              the same ID expires.
          systemPasswordEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: "The password required to access administrative functions on this server.\n\nTo set this attribute,
              use `weblogic.management.EncryptionHelper.encrypt()` to encrypt the value. Then set this attribute to the output
              of the encrypt() method.\n\nTo compare a password that a user enters with the encrypted value of this attribute,
              go to the same WebLogic Server instance that you used to set and encrypt this attribute and use `weblogic.management.EncryptionHelper.encrypt()`
              to encrypt the user-supplied password. Then compare the encrypted values."
            x-weblogic-restart-needed: true
          TGIOPEnabled:
            type: boolean
            description: Specifies whether this server supports Tuxedo GIOP (TGIOP) requests. (Requires you to configure
              WebLogic Tuxedo Connector (WTC) for this server.)
            x-weblogic-restart-needed: true
          transactionLogFilePrefix:
            type: string
            description: "The path prefix for the server's JTA transaction log files. If the pathname is not absolute, the
              path is assumed to be relative to the server's root directory.\n\nFor a clustered server, if you plan to be
              able to migrate the Transaction Recovery Service from this server if it fails to another server (backup server)
              in the same cluster, you must store transaction log files on persistent storage, such as a Storage Area Network
              (SAN) device or a dual-ported disk, available to both servers.\n\nDo not use an NFS file system to store transaction
              log files. Because of the caching scheme in NFS, transaction log files on disk may not always be current. Using
              transaction log files stored on an NFS device for recovery may cause data corruption."
            x-weblogic-restart-needed: true
          transactionLogFileWritePolicy:
            type: string
            enum:
            - Cache-Flush
            - Direct-Write
            description: "The policy that determines how transaction log file entries are written to disk. This policy can
              affect transaction performance. (Note: To be transactionally safe, the Direct-Write policy may require additional
              OS or environment changes on some Windows systems.)\n\nWebLogic Server supports the following policies:\n\n\
              - \n\nCache-Flush. Flushes operating system and on-disk caches after each write.\n\n- \n- \n\nDirect-Write.
              Tells the operating system to write directly to disk with each write. Direct-Write performs better than Cache-Flush.\n\
              \n- \n\nIf Direct-Write is not supported on the host platform, the policy becomes Cache-Flush and a log message
              is printed.\n\nNote: On Windows, the \"Direct-Write\" policy may leave transaction data in the on-disk cache
              without writing it to disk immediately. This is not transactionally safe because a power failure can cause loss
              of on-disk cache data. For transactionally safe writes using \"Direct-Write\" on Windows, either disable all
              write caching for the disk (enabled by default), or use a disk with a battery-backed cache.\n\nThe on-disk cache
              for a hard-drive on Windows can be disabled through system administration: Control-Panel -> System -> Hardware-tab
              -> Device-Manager-button -> Disk-Drives -> name-of-drive -> Policies-tab -> \"Enable write caching on the disk\"\
              \ check-box. Some file systems do not allow this value to be changed. For example, a RAID system that has a
              reliable cache."
            x-weblogic-restart-needed: true
          transactionLogJDBCStore:
            allOf:
            - $ref: '#/components/schemas/TransactionLogJDBCStore'
            description: The JDBC TLOG store used for transaction logging.
          transactionPrimaryChannelName:
            type: string
            description: Returns the name of the server network channel to derive the default URL used for internal JTA 
              communication with this server.
            x-weblogic-restart-needed: true
          transactionPublicChannelName:
            type: string
            description: Returns the name of the server network channel to derive the public URL used for internal JTA 
              communication with this server.
            x-weblogic-restart-needed: true
          transactionPublicSecureChannelName:
            type: string
            description: Returns the name of the server network channel to derive the public secure URL used for 
              internal JTA communication with this server.
            x-weblogic-restart-needed: true
          transactionSecureChannelName:
            type: string
            description: Returns the name of the server network channel to derive the secure URL used for internal JTA 
              communication with this server.
            x-weblogic-restart-needed: true
          tunnelingClientPingSecs:
            type: integer
            format: int32
            description: "The interval (in seconds) at which to check a tunneled client to see if it is still alive.\n\nIf
              you create network channels for this server, each channel can override this setting."
          tunnelingClientTimeoutSecs:
            type: integer
            format: int32
            description: "The amount of time (in seconds) after which a missing tunneled client is considered dead.\n\nIf
              you create network channels for this server, each channel can override this setting."
          tunnelingEnabled:
            type: boolean
            description: "Specifies whether tunneling for the T3, T3S, HTTP, HTTPS, IIOP, and IIOPS protocols should be enabled
              for this server.\n\nIf you create network channels for this server, each channel can override this setting."
          uploadDirectoryName:
            type: string
            description: "The directory path on the Administration Server where all uploaded applications are placed.\n\n\
              If an absolute directory name is not specified, the path is relative to the root directory \"/\". The default
              staging directory is \"stage\", relative to the server root. On the Managed Server this returns null, and is
              not configurable."
          useFusionForLLR:
            type: boolean
            description: "Enables the use of the `ADM_DDL ` store procedure for LLR. The default value is `false` (not enabled).\
              \ \n\nWhen enabled, a `WLS_` prefix and `_DYD` suffix is is automatically added to the LLR table name at runtime
              so the LLR table name in server configuration is not consistent with the actual table name in database."
            x-weblogic-restart-needed: true
          webServer:
            allOf:
            - $ref: '#/components/schemas/WebServer'
            description: Returns the web server for this server. A server has exactly one WebServer. A server may also 
              have one or more VirtualHosts. A VirtualHost is a subclass of WebServer.
          webService:
            allOf:
            - $ref: '#/components/schemas/WebService'
            description: Gets Web service configuration for this server
          weblogicPluginEnabled:
            type: boolean
            description: "Specifies whether this server uses the proprietary `WL-Proxy-Client-IP` header.\n\nSet this attribute
              to `true` to specify that this server instance uses the proprietary `WL-Proxy-Client-IP` header, which is recommended
              if the server instance will receive requests from a proxy plug-in. If the server instance is a member of a cluster
              that will receive proxied requests, enable the WebLogic plug-in at the cluster level. For servers that are members
              of a cluster, the setting at the cluster level overrides the server's setting. When the WebLogic plug-in is
              enabled at the cluster level, a call to `getRemoteAddr` will return the address of the browser client from the
              proprietary `WL-Proxy-Client-IP` header instead of the Web server.\n\nSet this attrbute to `false` to disable
              the `weblogic-plugin-enabled` parameter, `weblogic-plugin-enabled=false`, in the `config.xml` file.\n\nNote:
              If you are using Oracle HTTP Server, the WebLogic Proxy Plug-In, or Oracle Traffic Director to distribute client
              requests to a Managed Server or a cluster, Oracle recommends setting this attribute to `true`."
            x-weblogic-restart-needed: true
          XMLEntityCache:
            type: array
            items:
              type: string
            description: The server's XML entity cache, which is used to configure the behavior of JAXP (Java API for 
              XML Parsing).
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          XMLRegistry:
            type: array
            items:
              type: string
            description: The server's XML registry, which is used to configure the behavior of JAXP (Java API for XML 
              Parsing).
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          serverTemplate:
            type: array
            items:
              type: string
            description: The template used to configure this server.
            x-weblogic-restart-needed: true
      description: This class represents a individual WebLogic Server. A WebLogic Server is a Java process that is a 
        container for Java EE applications.
    Cluster:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "This bean represents a cluster in the domain. Servers join a cluster by calling ServerMBean.setCluster
          with the logical name of the cluster. A configuration may define zero or more clusters. They may be looked up by
          logical name.\n\nThe name of a cluster denotes its logical cluster name."
        properties:
          name:
            type: string
            description: "The user-specified name of this MBean instance.\n\nThis name is included as one of the key properties
              in the MBean's `javax.management.ObjectName`:\n\n`Name=user-specified-name`"
            x-weblogic-restart-needed: true
          type:
            type: string
            description: Returns the type of the MBean.
          dynamicallyCreated:
            type: boolean
            description: Return whether the MBean was created dynamically or is persisted to config.xml
          id:
            type: integer
            format: int64
            description: Return the unique id of this MBean instance
          notes:
            type: string
            description: "Optional information that you can include to describe this configuration.\n\nWebLogic Server saves
              this note in the domain's configuration file (`config.xml`) as XML PCDATA. All left angle brackets (<) are converted
              to the XML entity `&lt;`. Carriage returns/line feeds are preserved.\n\nNote: If you create or edit a note from
              the Administration Console, the Administration Console does not preserve carriage returns/line feeds."
          tags:
            type: array
            items:
              type: string
            description: Return all tags on this Configuration MBean
          additionalAutoMigrationAttempts:
            type: integer
            format: int32
            description: "A migratable server could fail to come up on every possible configured machine. This attribute controls
              how many further attempts, after the first one, should be tried.\n\nNote that each attempt specified here indicates
              another full circuit of migrations amongst all the configured machines. So for a 3-server cluster, and the default
              value of 3, a total of 9 migrations will be attempted.\n\nIf it is set to -1, migrations will go on forever
              until the server starts."
            x-weblogic-restart-needed: true
          asyncSessionQueueTimeout:
            type: integer
            format: int32
            description: Interval in seconds until the producer thread will wait for the AsyncSessionQueue to become 
              unblocked. Should be similar to the RequestTimeOut as that will determine the longest that the queue 
              should remain full.
          autoMigrationTableCreationDDLFile:
            type: string
            description: "The absolute file path of a custom DDL file for creating the automatic migration database table.\n\
              \nThis setting applies only if the `MigrationBasis` attribute is set to `database`, the `AutoMigrationTableCreationPolicy`
              attribute is set to `Always`, and the table name specified by the `AutoMigrationTableName` attribute does not
              already exist in the database.\n\nIf the above conditions apply, and this setting is set to the default, then
              the system will try to find a default DDL file for the creating the leasing database table in `WL_HOME/server/db/DB_TYPE/leasing.ddl`.\n\
              \nNote that the system ignores (skips) any `DROP` commands in the DDL file, and substitutes the value configured
              in the `AutoMigrationTableName` attribute for all occurrences of the word `ACTIVE` in the file."
            x-weblogic-restart-needed: true
          autoMigrationTableCreationPolicy:
            type: string
            enum:
            - Disabled
            - Always
            description: "Control automatic leasing table creation behavior.\n\nThis setting applies only if the `MigrationBasis`
              attribute is set to `database`.\n\n- `Disabled` \n\nDisables automatic leasing table creation. The behavior
              is same as manual table creation. Any singletons dependent on cluster leasing will fail to start unless the
              table defined by the `AutoMigrationTableName` already exists in the database.\n\n- \n- `Always` \n\nForce automatic
              leasing table creation if the table is not found. The default table name is \"ACTIVE\" and can be customized
              using the `AutoMigrationTableName` attribute. The SQL used to create the table when it is not found can be customized
              using the `AutoMigrationTableCreationDDLFile` attribute.\n\n-"
            x-weblogic-restart-needed: true
          autoMigrationTableName:
            type: string
            description: "Return the name of the table to be used for server migration.\n\nThis setting applies only if the
              `MigrationBasis` attribute is set to `database`.\n\nIf the `AutoMigrationTableCreationPolicy` is set to `Always`,
              then the table name format must be specified in the form `[[[mycatalog.]myschema.]mytablename`; for example
              `myschema.mytablename`. Each period symbol format is significant, where schema generally corresponds to username
              in many databases.\n\nWhen no table name is specified, the table name is simply `ACTIVE` and the database implicitly
              determines the schema according to the JDBC data source user."
            x-weblogic-restart-needed: true
          candidateMachinesForMigratableServers:
            type: array
            items:
              type: array
              items:
                type: string
            description: "The set of machines (and order of preference) on which Node Manager will restart failed servers.
              (Requires you to enable each server for automatic migration.)\n\nEach server can specify a subset of these cluster-wide
              candidates, which limits the machines on which the server can be restarted. Servers can also specify their own
              order of preference."
            x-weblogic-restart-needed: true
          clientCertProxyEnabled:
            type: boolean
            description: Specifies whether to honor the WL-Proxy-Client-Cert header coming with the request or not.
            x-weblogic-restart-needed: true
          clusterAddress:
            type: string
            description: "The address that forms a portion of the URL a client uses to connect to this cluster, and that is
              used for generating EJB handles and entity EJB failover addresses. (This address may be either a DNS host name
              that maps to multiple IP addresses or a comma-separated list of single address host names or IP addresses.)\n\
              \nDefines the address to be used by clients to connect to this cluster. This address may be either a DNS host
              name that maps to multiple IP addresses or a comma separated list of single address host names or IP addresses.
              If network channels are configured, it is possible to set the cluster address on a per channel basis."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          clusterBroadcastChannel:
            type: string
            description: "Specifies the channel used to handle communications within a cluster. If no channel is specified
              the default channel is used.\n\nClusterBroadcastChannel is only are supported if the unicast messaging type
              is used."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          clusterMessagingMode:
            type: string
            enum:
            - multicast
            - unicast
            description: "Specifies the messaging type used in the cluster.\n\nMulticast messaging is provided for backwards
              compatibility."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          clusterType:
            type: string
            enum:
            - none
            - wan
            - man
            description: "Optimizes cross-cluster replication for the type of network that servers in the clusters use for
              administrative communication.\n\nTo enhance the reliability of HTTP sessions, you can configure servers in one
              cluster to replicate the session data to servers in a different cluster. In such an environment, configure the
              clusters to be one of the following types:\n\n- `man` \n\nIf the clustered servers can send their data through
              a metro area network (man) in which latency is negligible. With this ClusterType value, servers replicate session
              state synchronously and in memory only. For example, when serverA in cluster1 starts an HTTP session, its backup
              server, serverB in cluster2, immediately replicates this session in memory to Server B.\n\n- \n- `wan` \n\n\
              If the clusters are far apart or send their data through a wide area network (wan) that experiences significant
              network latency. With this ClusterType value, a server replicates session state synchronously to the backup
              server in the same cluster and asynchronously to a server in the remote cluster. For example, when serverA in
              cluster1 starts an HTTP session, it sends the data to serverB in cluster1 and then asynchronously sends data
              to serverX in cluster 2. ServerX will persist the session state in the database.\n\nIf you persist session data
              in a replicating database, and if you prefer to use the database to replicate the data instead of WebLogic Server,
              choose a cluster type of `wan` and leave the remote cluster address undefined. WebLogic Server saves the session
              data to the local database and assumes that the database replicates data as needed.\n\n-"
            x-weblogic-restart-needed: true
          coherenceClusterSystemResource:
            type: array
            items:
              type: string
            description: Coherence Cluster associated with this cluster.
            x-weblogic-restart-needed: true
          coherenceTier:
            allOf:
            - $ref: '#/components/schemas/CoherenceTier'
            description: Coherence Tier associated with this WLS cluster.
          concurrentSingletonActivationEnabled:
            type: boolean
            description: Specifies whether to allow the concurrent activation, deactivation, or restart of two or more 
              singleton services.
            x-weblogic-restart-needed: true
          dataSourceForAutomaticMigration:
            type: array
            items:
              type: string
            description: "The data source used by servers in the cluster during migration. (You must configure each Migratable
              Server within the cluster to use this data source.)\n\nThis setting applies only if the `MigrationBasis` attribute
              is set to `database`."
            x-weblogic-restart-needed: true
          dataSourceForJobScheduler:
            type: array
            items:
              type: string
            description: Data source required to support persistence of jobs scheduled with the job scheduler
            x-weblogic-restart-needed: true
          dataSourceForSessionPersistence:
            type: array
            items:
              type: string
            description: To support HTTP Session failover across data centers, a datasource is required to dump session 
              state on disk.
            x-weblogic-restart-needed: true
          databaseLeasingBasisConnectionRetryCount:
            type: integer
            format: int32
            description: The maximum number of times Database Leasing will try to obtain a valid connection from the 
              Data Source.
            x-weblogic-restart-needed: true
          databaseLeasingBasisConnectionRetryDelay:
            type: integer
            format: int64
            description: The length of time, in milliseconds,Database Leasing will wait before attempting to obtain a 
              new connection from the Data Source when a connection has failed.
            x-weblogic-restart-needed: true
          databaseLessLeasingBasis:
            allOf:
            - $ref: '#/components/schemas/DatabaseLessLeasingBasis'
            description: Get attributes associated with database less leasing basis used for server migration and 
              singleton services.
          defaultLoadAlgorithm:
            type: string
            enum:
            - round-robin
            - weight-based
            - random
            - round-robin-affinity
            - weight-based-affinity
            - random-affinity
            description: Defines the algorithm to be used for load-balancing between replicated services if none is 
              specified for a particular service. The `round-robin` algorithm cycles through a list of WebLogic Server 
              instances in order. `Weight-based` load balancing improves on the round-robin algorithm by taking into 
              account a pre-assigned weight for each server. In `random` load balancing, requests are routed to servers 
              at random.
          dynamicServers:
            allOf:
            - $ref: '#/components/schemas/DynamicServers'
            description: DynamicServers associated with this WLS cluster.
          fencingGracePeriodMillis:
            type: integer
            format: int32
            description: During automatic migration, if the Cluster Master determines a server to be dead, it waits for 
              this period of time (in milliseconds) before the Cluster Master migrates the service to another server in 
              the cluster.
            x-weblogic-restart-needed: true
          frontendHTTPPort:
            type: integer
            format: int32
            description: "The name of the HTTP port to which all redirected URLs will be sent.\n\nSets the FrontendHTTPPort
              for the default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure
              that the webapp will always have the correct PORT information, even when the request is coming through a firewall
              or a proxy. If this parameter is configured, the HOST header will be ignored and the information in this parameter
              will be used in its place, when constructing the absolute urls for redirects."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          frontendHTTPSPort:
            type: integer
            format: int32
            description: "The name of the secure HTTP port to which all redirected URLs will be sent.\n\nSets the FrontendHTTPSPort
              for the default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure
              that the webapp will always have the correct PORT information, even when the request is coming through a firewall
              or a proxy. If this parameter is configured, the HOST header will be ignored and the information in this parameter
              will be used in its place, when constructing the absolute urls for redirects."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          frontendHost:
            type: string
            description: "The name of the host to which all redirected URLs will be sent.\n\nSets the HTTP FrontendHost for
              the default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure that
              the webapp will always have the correct HOST information, even when the request is coming through a firewall
              or a proxy. If this parameter is configured, the HOST header will be ignored and the information in this parameter
              will be used in its place, when constructing the absolute urls for redirects."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          greedySessionFlushInterval:
            type: integer
            format: int32
            description: Interval in seconds until HTTP Sessions are periodically flushed to secondary server.
          healthCheckIntervalMillis:
            type: integer
            format: int32
            description: Interval in milliseconds at which Migratable Servers and Cluster Masters prove their liveness 
              via the database.
            x-weblogic-restart-needed: true
          healthCheckPeriodsUntilFencing:
            type: integer
            format: int32
            description: Maximum number of periods that a cluster member will wait before timing out a Cluster Master 
              and also the maximum number of periods the Cluster Master will wait before timing out a Migratable Server.
            x-weblogic-restart-needed: true
          httpTraceSupportEnabled:
            type: boolean
            description: Returns the value of HttpTraceSupportEnabled.
            x-weblogic-restart-needed: true
          idlePeriodsUntilTimeout:
            type: integer
            format: int32
            description: "Maximum number of periods that a cluster member will wait before timing out a member of a cluster.\n\
              \nMaximum number of periods that a cluster member will wait before timing out a member of a cluster."
            x-weblogic-restart-needed: true
          interClusterCommLinkHealthCheckInterval:
            type: integer
            format: int32
            description: If the cluster link between two clusters goes down, a trigger will run periodically to see if 
              the link is restored. The duration is specified in milliseconds.
          JTACluster:
            allOf:
            - $ref: '#/components/schemas/JTACluster'
            description: JTA associated with this WLS cluster.
          jobSchedulerTableName:
            type: string
            description: The table name to use for storing timers active with the job scheduler
            x-weblogic-restart-needed: true
          maxSecondarySelectionAttempts:
            type: integer
            format: int32
            description: This is the max number of attempts at choosing a suitable secondary server for replication.If 
              it is set to 0,secondary server selection for replication will be tried on all servers in the cluster.
          memberDeathDetectorEnabled:
            type: boolean
            description: Enables faster Automatic Service Migration times with Database Leasing Basis.
            x-weblogic-restart-needed: true
          memberWarmupTimeoutSeconds:
            type: integer
            format: int32
            description: Maximum number of seconds that a cluster member will wait to discover and synchronize with 
              other servers in the cluster. Normally, the member will be able to sync in 30 seconds. If the value of 
              this attribute is higher, that does not necessarily mean that it will take longer for the member to 
              warmup. Instead it defines an upper bound on the time that a server will wait to sync with the servers 
              that it has discovered. If the value is set 0, servers will not attempt to discover other running server 
              in the cluster during server initialization
          messageOrderingEnabled:
            type: boolean
            description: Forces unicast messages to be processed in order. There are scenarios where JMS may update JNDI
              very frequently. It will result in a lot of messages over unicast. Due to the close proximity of messages 
              the probability of out of order handling of messages increases which would trigger frequent state dumps. 
              Frequent JNDI tree refresh may result in NameNotFoundException. Use this property to prevent out of order 
              handling of messages.
            x-weblogic-restart-needed: true
          migratableTargets:
            type: array
            items:
              type: array
              items:
                type: string
            description: Returns all the MigratableTargets for this cluster
          migrationBasis:
            type: string
            enum:
            - database
            - consensus
            description: "Controls the mechanism used for server and service migration.\n\n- Database -- Requires the availability
              of a high-availability database, such as Oracle RAC, to store leasing information. Requires also configuring
              the `DataSourceForAutomaticMigration` attribute. Optionally also configure `AutoMigrationTableName` (default
              is \"ACTIVE\"), `AutoMigrationTableCreationPolicy`, and `AutoMigrationTableCreationDDLFile`.\n- \n- Consensus
              -- Stores the leasing information in-memory within a cluster member. This option requires Node Manager to be
              configured and running.\n- \n\nNote: Within a WebLogic Server installation, you can only use one type of leasing.
              Although it is possible to implement multiple features that use leasing within your environment, each must use
              the same kind of leasing."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          millisToSleepBetweenAutoMigrationAttempts:
            type: integer
            format: int64
            description: Controls how long of a pause there should be between the migration attempts described in 
              getAdditionalAutoMigrationAttempts(). Note that this delay only happens when the server has failed to come
              up on every machine.
            x-weblogic-restart-needed: true
          multicastAddress:
            type: string
            description: "The multicast address used by cluster members to communicate with each other.\n\nThe valid range
              is from from 224.0.0.0 to 239.255.255.255. The default value used by WebLogic Server is 239.192.0.0. You should
              avoid using multicast addresses in the range x.0.0.1\n\nThis address should be unique to this cluster and should
              not be shared by other applications."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          multicastBufferSize:
            type: integer
            format: int32
            description: "The multicast socket send/receive buffer size (at least 64 kilobytes).\n\nReturns the multicast
              socket send/receive buffer size."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          multicastDataEncryption:
            type: boolean
            description: Enables multicast data to be encrypted. Only the multicast data is encrypted. Multicast header 
              information is not encrypted.
            x-weblogic-restart-needed: true
          multicastPort:
            type: integer
            format: int32
            description: "The multicast port (between 1 and 65535) used by cluster members to communicate with each other.\n\
              \nDefines the multicast port used by cluster members to communicate with each other."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          multicastSendDelay:
            type: integer
            format: int32
            description: "The amount of time (between 0 and 250 milliseconds) to delay sending message fragments over multicast
              in order to avoid OS-level buffer overflow.\n\nDefines the number of milliseconds to delay sending message fragments
              over multicast in order to avoid OS-level buffer overflow."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          multicastTTL:
            type: integer
            format: int32
            description: "The number of network hops (between 1 and 255) that a cluster multicast message is allowed to travel.\n\
              \nDefines the number of network hops that a cluster multicast message is allowed to travel. 1 restricts the
              cluster to one subnet."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          numberOfServersInClusterAddress:
            type: integer
            format: int32
            description: Number of servers to be listed from this cluster when generating a cluster address 
              automatically. This setting has no effect if Cluster Address is explicitly set.
            x-weblogic-restart-needed: true
          oneWayRmiForReplicationEnabled:
            type: boolean
            description: Indicates if one-way RMI is being used for replication. One-way RMI also requires configuring 
              replication ports on each server in the cluster.
            x-weblogic-restart-needed: true
          overloadProtection:
            allOf:
            - $ref: '#/components/schemas/OverloadProtection'
            description: Get attributes related to server overload protection. The default values for all cluster 
              members are set here. Individual servers can override them as needed.
          persistSessionsOnShutdown:
            type: boolean
            description: "When shutting down servers, sessions are not updated. If the primary and secondary servers of a
              session are shut down with no session updates, the session will be lost. Turning on PersistSessionsOnShutdown
              will save any active sessions to the database specified in ClusterMBean.getDataSourceForSessionPersistence()
              when a server is shutdown. The sessions will not be written at any other time. (For example, they are not saved
              via this mechanism if there is a server crash.)\n\nThis attribute is applicable both to session persistence
              on server shutdown or session persistence across a WAN.\n\nRolling upgrade can potentially have a bad interaction
              with traditional in-memory session replication. As managed servers are shutdown and upgraded, in-memory servlet
              sessions will be lost if both primary and secondary are rebooted before a new request arrives for the session."
            x-weblogic-restart-needed: true
          rebalanceDelayPeriods:
            type: integer
            format: int32
            description: 'Gets the number of the Rebalance periods to wait to rebalance cluster targeted JMS instances in
              an idle system (typically 10 seconds per period). Note: This setting only applies when a JMS artifact is cluster-targeted,
              its Rebalance Enabled is set to `true`, and its Migration Policy is set to `On-Failure` or `Always`.'
          remoteClusterAddress:
            type: string
            description: Set the foreign cluster. Cluster infrastructure uses this address to connect to foreign cluster
              for HTTP Session WAN/MAN failover.
            x-weblogic-restart-needed: true
          replicationChannel:
            type: string
            description: "The channel name to be used for replication traffic. Cluster infrastructure uses this channel to
              send updates for HTTP sessions and stateful session beans. If none is set then the default channel will be used.\n\
              \nIn order for this feature to work, the named channel must exist on all members of the cluster and must be
              configured to use the same protocol. It is valid for the selected channel to be configured to use a secure protocol."
            x-weblogic-restart-needed: true
          replicationTimeoutEnabled:
            type: boolean
            description: Indicates if timeout should be applied to session replication calls.
            x-weblogic-restart-needed: true
          replicationTimeoutMillis:
            type: integer
            format: int32
            description: Interval in milliseconds at which Migratable Servers and Cluster Masters prove their liveness 
              via the database.
            x-weblogic-restart-needed: true
          secureReplicationEnabled:
            type: boolean
            description: "Servers in a cluster replicate session data. If a replication channel is defined then the session
              data will be sent using the replication channel protocol and secured replication settings will be ignored. If
              no replication channel is defined and secured replication is enabled then session data for in-memory replication
              will be sent over SSL using the default secured channel. However, this added security for replication traffic
              comes with a significant cluster performance degradation. It should only be enabled if security is of greater
              concern than performance degradation.\n\nThe default value for this attribute is true if all cluster members
              have SSL enabled, and either secure mode is enabled or no plaintext replication channel is available. Otherwise,
              the default is false."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          servers:
            type: array
            items:
              type: array
              items:
                type: string
            description: The servers which have declared membership in this cluster.
          serviceActivationRequestResponseTimeout:
            type: integer
            format: int32
            description: The maximum time, in milliseconds seconds, for services to wait for response from cluster 
              members.
            x-weblogic-restart-needed: true
          serviceAgeThresholdSeconds:
            type: integer
            format: int32
            description: "The number of seconds (between 0 and 65534) by which the age of two conflicting services must differ
              before one is considered older than the other.\n\nDefines the number of seconds by which the age of two conflicting
              services must differ before one is considered older than the other."
          sessionFlushInterval:
            type: integer
            format: int32
            description: Interval in seconds until HTTP Sessions are periodically flushed to the backup cluster to dump 
              session state on disk.
          sessionFlushThreshold:
            type: integer
            format: int32
            description: When number of sessions to be flushed reaches this threshold limit, sessions will be flushed to
              the backup cluster before the flush interval. This helps the server to flush sessions faster under load.
          sessionLazyDeserializationEnabled:
            type: boolean
            description: Enables increased efficiency with session replication. Enabling this attribute should be used 
              only when configuring a WebLogic domain for Oracle Exalogic.
          sessionStateQueryProtocolEnabled:
            type: boolean
            description: Indicates if session state query protocol is enabled. The Session State Query protocol will 
              query the local cluster for the location of a session state instance if a request arrives at a server that
              is neither the primary or secondary server.
          sessionStateQueryRequestTimeout:
            type: integer
            format: int32
            description: The maximum time, in seconds, for session state query request to wait for response from cluster
              members.
          singletonServiceRequestTimeout:
            type: integer
            format: int32
            description: "The maximum time, in milliseconds, for service activation requests will wait for response from cluster
              members. \n\nA value of `0` means that the request will wait indefinitely to complete."
          siteName:
            type: string
            description: The name of the site this cluster is associated with.
          txnAffinityEnabled:
            type: boolean
            description: If enabled, a server's transaction requests go to servers in the cluster that are already 
              participating in the global transaction.
            x-weblogic-restart-needed: true
          unicastReadTimeout:
            type: integer
            format: int32
            description: The specified read timeout, in milliseconds, on a unicast connection. A timeout of zero is 
              interpreted as an infinite timeout, that is blocking read forever.
            x-weblogic-restart-needed: true
          WANSessionPersistenceTableName:
            type: string
            description: Return the name of the table to be used for WAN session persistence.
            x-weblogic-restart-needed: true
          weblogicPluginEnabled:
            type: boolean
            description: "Specifies if this cluster will receive requests from a proxy plug-in or `HttpClusterServlet`.\n\n\
              Set this attribute to `true` if the cluster will receive requests from a proxy plug-in or `HttpClusterServlet`.
              A call to `getRemoteAddr` will return the address of the browser client from the proprietary `WL-Proxy-Client-IP`
              header instead of the Web server.\n\nSet this attribute to `false` to disable the `weblogic-plugin-enabled`
              parameter, `weblogic-plugin-enabled=false`, in the `config.xml`file.\n\nNote: If you are using Oracle HTTP Server,
              the WebLogic Proxy Plug-In, or Oracle Traffic Director to distribute client requests to a Managed Server or
              a cluster, Oracle recommends setting this attribute to `true`."
            x-weblogic-restart-needed: true
      description: "This bean represents a cluster in the domain. Servers join a cluster by calling ServerMBean.setCluster
        with the logical name of the cluster. A configuration may define zero or more clusters. They may be looked up by logical
        name.\n\nThe name of a cluster denotes its logical cluster name."
    JDBCSystemResource:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This bean defines a system-level JDBC resource. It links a separate descriptor that specifies the 
          definition.
        properties:
          name:
            type: string
            description: "The user-specified name of this MBean instance.\n\nThis name is included as one of the key properties
              in the MBean's `javax.management.ObjectName`:\n\n`Name=user-specified-name`"
            x-weblogic-restart-needed: true
          type:
            type: string
            description: Returns the type of the MBean.
          dynamicallyCreated:
            type: boolean
            description: Return whether the MBean was created dynamically or is persisted to config.xml
          id:
            type: integer
            format: int64
            description: Return the unique id of this MBean instance
          notes:
            type: string
            description: "Optional information that you can include to describe this configuration.\n\nWebLogic Server saves
              this note in the domain's configuration file (`config.xml`) as XML PCDATA. All left angle brackets (<) are converted
              to the XML entity `&lt;`. Carriage returns/line feeds are preserved.\n\nNote: If you create or edit a note from
              the Administration Console, the Administration Console does not preserve carriage returns/line feeds."
          tags:
            type: array
            items:
              type: string
            description: Return all tags on this Configuration MBean
          compatibilityName:
            type: string
            description: "This is only set for beans created as a result of conversion from an 8.1 application configured
              using ApplicationMBean and ComponentMBean. \n\nStandalone modules in 8.1 have both an ApplicationMBean name
              and ComponentMBean name. This attribute stores the name of the latter, to be used when the server creates the
              transient ComponentMBean for backward compatibility."
            x-weblogic-restart-needed: true
          moduleType:
            type: string
            description: The type of the module (ear, jar, war, or rar)
            x-weblogic-restart-needed: true
          targets:
            type: array
            items:
              type: array
              items:
                type: string
            description: You must select a target on which an MBean will be deployed from this list of the targets in 
              the current domain on which this item can be deployed. Targets must be either servers or clusters. The 
              deployment will only occur once if deployments overlap.
          deploymentOrder:
            type: integer
            format: int32
            description: "An integer value that indicates when this unit is deployed, relative to other deployable units on
              a server, during startup.\n\nUnits with lower values are deployed before those with higher values."
            x-weblogic-restart-needed: true
          deploymentPrincipalName:
            type: string
            description: A string value that indicates the principal that should be used when deploying the file or 
              archive during startup and shutdown. This principal will be used to set the current subject when calling 
              out into application code for interfaces such as ApplicationLifecycleListener. If no principal name is 
              specified, then the anonymous principal will be used.
            x-weblogic-restart-needed: true
          sourcePath:
            type: string
            x-weblogic-restart-needed: true
          subDeployments:
            type: array
            items:
              $ref: '#/components/schemas/SubDeployment'
            description: Targeting for subcomponents that differs from targeting for the component.
          descriptorFileName:
            type: string
            description: "The name of the file containing this configuration. This is a relative name rooted at `DOMAIN_DIR/config`.
              By default the file resides in the `jdbc` subdirectory and derives its name from the bean name using the following
              pattern:\n\n`<beanName>.xml`\n\nNote that this is a read-only property that can only be set when the bean is
              created."
          JDBCResource:
            $ref: '#/components/schemas/JDBCDataSourceBean'
      description: This bean defines a system-level JDBC resource. It links a separate descriptor that specifies the 
        definition.
    JDBCDataSourceBean:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "The top of the JDBC data source bean tree. \n\nJDBC data sources all have a JDBCDataSourceBean as their
          root bean (a bean with no parent). The schema namespace that corresponds to this bean is \"http://xmlns.oracle.com/weblogic/jdbc-data-source\""
        properties:
          datasourceType:
            type: string
            enum:
            - GENERIC
            - MDS
            - AGL
            - UCP
            - PROXY
            description: "The data source type. Valid types are: \n\n- GENERIC - generic data source\n- \n- MDS - multi data
              source\n- \n- AGL - Active GridLink data source\n- \n- UCP - Universal Connection Pool data source\n- \n- PROXY
              - proxy for multiple tenant data sources\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          id:
            type: integer
            format: int64
            description: Gets the Id value
          internalProperties:
            allOf:
            - $ref: '#/components/schemas/JDBCPropertiesBean'
            description: Internal Use only, applications must not attempt to configure or use this.
          JDBCConnectionPoolParams:
            allOf:
            - $ref: '#/components/schemas/JDBCConnectionPoolParamsBean'
            description: "Gets the connection pool parameters of this data source \n\nConfiguration parameters for this data
              source's connection pool are specified using the connection pool parameters bean."
          JDBCDataSourceParams:
            allOf:
            - $ref: '#/components/schemas/JDBCDataSourceParamsBean'
            description: "Gets the basic usage parameters of this data source \n\nConfiguration parameters for the basic usage
              of this data source are specified using the data source parameters bean."
          JDBCDriverParams:
            allOf:
            - $ref: '#/components/schemas/JDBCDriverParamsBean'
            description: "Gets the driver parameters of this data source \n\nConfiguration parameters for the JDBC Driver
              used by this data source are specified using the driver parameters bean."
          JDBCOracleParams:
            allOf:
            - $ref: '#/components/schemas/JDBCOracleParamsBean'
            description: "Gets the Oracle-related parameters of this data source \n\nConfiguration parameters for this data
              source's Oracle-related behavior are specified using the Oracle parameters bean."
          JDBCXAParams:
            allOf:
            - $ref: '#/components/schemas/JDBCXAParamsBean'
            description: "Gets the XA-related parameters of this data source \n\nConfiguration parameters for this data source's
              XA-related behavior are specified using the XA parameters bean."
          name:
            type: string
            description: A unique name that identifies this data source in the WebLogic domain.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          version:
            type: string
            description: Gets the "version" attribute
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
      description: "The top of the JDBC data source bean tree. \n\nJDBC data sources all have a JDBCDataSourceBean as their
        root bean (a bean with no parent). The schema namespace that corresponds to this bean is \"http://xmlns.oracle.com/weblogic/jdbc-data-source\""
    JDBCDataSourceParamsBean:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Contains the basic usage parameters of a data source. \n\nConfiguration parameters for the basic usage
          of a data source are specified using a data source parameters bean."
        properties:
          algorithmType:
            type: string
            enum:
            - Load-Balancing
            - Failover
            description: "The algorithm determines the connection request processing for the multi data source.\n\nYou can
              specify one of the following algorithm types:\n\n- Failover \n\nConnection requests are sent to the first data
              source in the list; if the request fails, the request is sent to the next data source in the list, and so forth.
              The process is repeated until a valid connection is obtained, or until the end of the list is reached, in which
              case an exception is thrown.\n\n- \n- Load balancing \n\nThe multi data source distributes connection requests
              evenly to its member data sources. With this algorithm, the multi data source also provides failover processing.
              That is, if a request fails, the multi data source sends the request to the next data source in the list until
              a valid connection is obtained, or until the end of the list is reached, in which case an exception is thrown.\n\
              \n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          connectionPoolFailoverCallbackHandler:
            type: string
            description: "The name of the application class to handle the callback sent when a multi data source is ready
              to failover or fail back connection requests to another data source within the multi data source.\n\nThe name
              must be the absolute name of an application class that implements the `weblogic.jdbc.extensions.ConnectionPoolFailoverCallback`
              interface."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          dataSourceList:
            type: string
            description: The list of data sources to which the multi data source will route connection requests. The 
              order of data sources in the list determines the failover order.
          failoverRequestIfBusy:
            type: boolean
            description: For multi data sources with the `failover` algorithm, enables the multi data source to failover
              connection requests to the next data source if all connections in the current data source are in use.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          globalTransactionsProtocol:
            type: string
            enum:
            - TwoPhaseCommit
            - LoggingLastResource
            - EmulateTwoPhaseCommit
            - OnePhaseCommit
            - None
            description: "Determines the transaction protocol (global transaction processing behavior) for the data source.
              Options include:\n\n- \n\nTwoPhaseCommit - Standard XA transaction processing. Requires an XA driver.\n\n- \n\
              - \n\nLoggingLastResource - A performance enhancement for one non-XA resource.\n\n- \n- \n\nEmulateTwoPhaseCommit
              - Enables one non-XA resource to participate in a global transaction, but has some risk to data.\n\n- \n- \n\
              \nOnePhaseCommit - One-phase XA transaction processing using a non-XA driver. This is the default setting.\n\
              \n- \n- \n\nNone - Support for local transactions only.\n\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          JNDINames:
            type: array
            items:
              type: string
            description: "The JNDI path for this Data Source. By default, the JNDI name is the name of the data source.\n\n\
              Applications that look up the JNDI path get a `javax.sql.DataSource` instance that corresponds to this data
              source."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          keepConnAfterGlobalTx:
            type: boolean
            description: "Enables WebLogic Server to keep the physical database connection associated with the logical connection
              when committing a global transaction instead releasing it and getting another physical connection when needed.\n\
              \nSetting this option to true may require additional connections to be configured on the database.\n\nUse this
              setting to work around specific problems with JDBC XA drivers."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          proxySwitchingCallback:
            type: string
            description: "The name of the switching callback class for a Proxy data source.\n\nThis class implements the `weblogic.jdbc.extensions.DataSourceSwitchingCallback`
              interface."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          proxySwitchingProperties:
            type: string
            description: Specifies the switching properties passed to the switching callback method for a Proxy data 
              source.
          scope:
            type: string
            enum:
            - Global
            - Application
            description: "Specifies the scoping of the data source.\n\nYou can specify one of the following scopes:\n\n- Global\
              \ \n\nSpecifies that the data source is bound in the cluster-wide JNDI tree with the JNDIName specified so that
              the data source is available for use to any JDBC client across the cluster.\n\nThis is the default setting.\n\
              \n- \n- Application \n\nSpecifies that the data source is bound in the application's local namespace with the
              JNDIName specified so that the data source is available for use only by JDBC clients within the application.
              This can only be used for packaged datasources and is ignored for JDBC System resources.\n\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
      description: "Contains the basic usage parameters of a data source. \n\nConfiguration parameters for the basic usage
        of a data source are specified using a data source parameters bean."
    JDBCDriverParamsBean:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Contains the driver parameters of a data source.\n\nConfiguration parameters for the JDBC Driver used
          by a data source are specified using a driver parameters bean."
        properties:
          driverName:
            type: string
            description: "The full package name of JDBC driver class used to create the physical database connections in the
              connection pool in the data source.\n\nFor example: `oracle.jdbc.OracleDriver`\n\nThe driver must be the name
              of a class that implements the `java.sql.Driver` interface. Check the driver documentation to find the full
              pathname.\n\nNote that the driver class must be in the classpath of any server to which the data source is deployed."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          password:
            type: string
            description: "The password attribute passed to the JDBC driver when creating physical database connections.\n\n\
              The value is stored in an encrypted form in the descriptor file and when displayed in an administration console."
          passwordEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: The encrypted database password as set with `setPassword()`, `setPasswordEncrypted(byte[] 
              bytes)`, or as a key=value pair in the list of JDBC driver properties.
          properties:
            allOf:
            - $ref: '#/components/schemas/JDBCPropertiesBean'
            description: "The list of properties passed to the JDBC driver when creating physical database connections.\n\n\
              To enable driver-level features, add the driver property and its value to the Properties list. WebLogic Server
              sets driver-level properties in the Properties list on the driver's `ConnectionPoolDataSource` object.\n\nNote:
              For Security reasons, when WebLogic Server is running in Production mode, you cannot specify database passwords
              in this properties list. Data source deployment will fail if a password is specified in the properties list.
              To override this security check, use the command line argument `weblogic.management.allowClearTextPasswords`
              when starting the server."
          url:
            type: string
            description: "The URL of the database to connect to. The format of the URL varies by JDBC driver.\n\nThe URL is
              passed to the JDBC driver to create the physical database connections."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          usePasswordIndirection:
            type: boolean
            description: Specifies whether the database credentials are to be obtained from the credential mapper using 
              the "user" property as the key. When true, the credentials are obtained from the credential mapper. When 
              false, the database user name and password are obtained from the "user" property and Password element, 
              respectively.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          useXaDataSourceInterface:
            type: boolean
            description: "Specifies that WebLogic Server should use the XA interface of the JDBC driver.\n\nIf the JDBC driver
              class used to create database connections implements both XA and non-XA versions of a JDBC driver, you can set
              this attribute to indicate that WebLogic Server should treat the JDBC driver as an XA driver or as a non-XA
              driver."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
      description: "Contains the driver parameters of a data source.\n\nConfiguration parameters for the JDBC Driver used
        by a data source are specified using a driver parameters bean."
    JDBCConnectionPoolParamsBean:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Contains the connection pool parameters of a data source.\n\nConfiguration parameters for a data source's
          connection pool are specified using the connection pool parameters bean."
        properties:
          connectionCreationRetryFrequencySeconds:
            type: integer
            format: int32
            description: "The number of seconds between attempts to establish connections to the database.\n\nIf you do not
              set this value, data source creation fails if the database is unavailable. If set and if the database is unavailable
              when the data source is created, WebLogic Server will attempt to create connections in the pool again after
              the number of seconds you specify, and will continue to attempt to create the connections until it succeeds.\n\
              \nWhen set to `0`, connection retry is disabled."
          connectionHarvestMaxCount:
            type: integer
            format: int32
            description: The maximum number of connections that may be harvested when the connection harvesting occurs. 
              The range of valid values is 1 to MaxCapacity.
          connectionHarvestTriggerCount:
            type: integer
            format: int32
            description: "Specifies the number of available connections (trigger value) used to determine when connection
              harvesting occurs.\n\n- Harvesting occurs when the number of available connections is below the trigger value
              for a connection pool.\n- \n- The range of valid values is -1 to `MaxCapacity`.\n- \n- Default value is `-1`.\n\
              - \n- Setting the value to `-1` disables connection harvesting.\n-"
          connectionLabelingCallback:
            type: string
            description: The class name of the connection labeling callback. This is automatically passed to 
              registerConnectionLabelingCallback when the datasource is created. The class must implement 
              `oracle.ucp.ConnectionLabelingCallback`.
            x-weblogic-restart-needed: true
          connectionReserveTimeoutSeconds:
            type: integer
            format: int32
            description: "The number of seconds after which a call to reserve a connection from the connection pool will timeout.\n\
              \nWhen set to `0`, a call will never timeout.\n\nWhen set to `-1`, a call will timeout immediately."
          countOfRefreshFailuresTillDisable:
            type: integer
            format: int32
            description: Specifies the number of reconnect failures allowed before WebLogic Server disables a connection
              pool to minimize the delay in handling the connection request caused by a database failure. Zero means it 
              is disabled.
          countOfTestFailuresTillFlush:
            type: integer
            format: int32
            description: Specifies the number of test failures allowed before WebLogic Server closes all unused 
              connections in a connection pool to minimize the delay caused by further database testing. Zero means it 
              is disabled.
          credentialMappingEnabled:
            type: boolean
            description: "Enables Set Client ID on connection for the data source. When an application requests a database
              connection, WebLogic Server sets a light-weight client ID on the database connection.\n\nBy default, it uses
              the credential mapping to map WebLogic Server user IDs to database user IDs. However, if use-database-credentials
              is set to true, then the credential mapping is not done and the ID is used directly as a database user ID.\n\
              \nIt is currently supported for IBM DB2 driver and Oracle thin driver. Support for this feature will be dropped
              in a future Oracle thin driver release. Oracle recommends using proxy authentication instead of this feature."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          driverInterceptor:
            type: string
            description: "Specifies the absolute name of the application class used to intercept method calls to the JDBC
              driver. The application specified must implement the weblogic.jdbc.extensions.DriverInterceptor interface. \n\
              \nWeblogic Server will invoke the preInvokeCallback(), postInvokeExceptionCallback(), and postInvokeCallback()
              methods of the registered application before and after invoking any method inside the JDBC driver. You can use
              this feature to profile JDBC driver usage and monitor:\n\n- Methods being executed\n- \n- Any exceptions thrown\n\
              - \n- Time spent inside the driver executing methods\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          fatalErrorCodes:
            type: string
            description: "Specifies a comma-separated list of error codes that are treated as fatal errors. These errors include
              deployment errors that cause a server to fail to boot and connection errors that prevent a connection from being
              put back in the connection pool.\n\nThis optional attribute is used to define fatal error codes, that when specified
              as the exception code within a `SQLException` (retrieved by `sqlException.getErrorCode()`), indicate that a
              fatal error has occurred and the connection is no longer usable. For Oracle databases the following fatal error
              codes are predefined within WLS and do not need to be placed in the configuration file: \n\n- 3113: \"end-of-file
              on communication channel\" \n- \n- 3114: \"not connected to ORACLE\" \n- \n- 1033: \"ORACLE initialization or
              shutdown in progress\" \n- \n- 1034: \"ORACLE not available\" \n- \n- 1089: \"immediate shutdown in progress
              - no operations are permitted\"\n- \n- 1090: \"shutdown in progress - connection is not permitted\" \n- \n-
              17002: \"I/O exception\" \n-"
            x-weblogic-restart-needed: true
          highestNumWaiters:
            type: integer
            format: int32
            description: The maximum number of connection requests that can concurrently block threads while waiting to 
              reserve a connection from the data source's connection pool.
          identityBasedConnectionPoolingEnabled:
            type: boolean
            description: "Enables identity-based-connection-pooling for the data source. When an application requests a database
              connection, WebLogic Server picks or creates a physical connection with requested DBMS identity based on a map
              of WebLogic user IDs and database IDs.\n\nYou must also specify the map of WebLogic Server user IDs to database
              user IDs (credential mapping)."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          ignoreInUseConnectionsEnabled:
            type: boolean
            description: Enables the data source to be shutdown even if connections obtained from the pool are still in 
              use.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          inactiveConnectionTimeoutSeconds:
            type: integer
            format: int32
            description: "The number of inactive seconds on a reserved connection before WebLogic Server reclaims the connection
              and releases it back into the connection pool.\n\nYou can use the Inactive Connection Timeout feature to reclaim
              leaked connections - connections that were not explicitly closed by the application. Note that this feature
              is not intended to be used in place of properly closing connections.\n\nWhen set to `0`, the feature is disabled."
          initSql:
            type: string
            description: "SQL statement to execute that will initialize newly created physical database connections. Start
              the statement with SQL followed by a space.\n\nIf the Init SQL value begins with `\"SQL \"`, then the rest of
              the string following that leading token will be taken as a literal SQL statement that will be used to initialize
              database connections. If the Init SQL value does not begin with \"SQL \", the value will be treated as the name
              of a table and the following SQL statement will be used to initialize connections:\n\n`\"select count(*) from
              InitSQL\"`\n\nThe table `InitSQL` must exist and be accessible to the database user for the connection. Most
              database servers optimize this SQL to avoid a table scan, but it is still a good idea to set `InitSQL` to the
              name of a table that is known to have few rows, or even no rows."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          initialCapacity:
            type: integer
            format: int32
            description: The number of physical connections to create when creating the connection pool in the data 
              source. If unable to create this number of connections, creation of the data source will fail.
          invokeBeginEndRequest:
            type: boolean
            description: When true, and when a JDBC 4.3 compatible driver is used, the connection pool will invoke 
              Connection.beginRequest() prior to returning the connection to the application, and will invoke 
              Connection.endRequest() before the connection is released to the pool.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          JDBCXADebugLevel:
            type: integer
            format: int32
            description: Specifies level of JDBC debugging for XA drivers, where larger values in the range provide more
              debugging information.
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          loginDelaySeconds:
            type: integer
            format: int32
            description: "The number of seconds to delay before creating each physical database connection. This delay supports
              database servers that cannot handle multiple connection requests in rapid succession.\n\nThe delay takes place
              both during initial data source creation and during the lifetime of the data source whenever a physical database
              connection is created."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          maxCapacity:
            type: integer
            format: int32
            description: The maximum number of physical connections that this connection pool can contain.
          minCapacity:
            type: integer
            format: int32
            description: "The minimum number of physical connections that this connection pool can contain after it is initialized.\n\
              \n- Default: InitialCapacity\n- \n- Used only for connection pool shrinking calculations. \n- \n- For compatibility,
              `InitialCapacity` is used if `MinCapacity` is not configured.\n- \n- Once a data source has gone through a suspend/resume,
              the larger value of either `MinCapacity` or `InitialCapacity` is used.\n-"
          pinnedToThread:
            type: boolean
            description: "Enables an option to improve performance by enabling execute threads to keep a pooled database connection
              even after the application closes the logical connection.\n\nWhen enabled:\n\n- WebLogic Server pins a database
              connection from the connection pool to an execution thread the first time an application uses the thread to
              reserve a connection. When the application finishes using the connection and calls `connection.close()`, WebLogic
              Server keeps the connection with the execute thread and does not return it to the connection pool. When an application
              subsequently requests a connection using the same execute thread, WebLogic Server provides the connection already
              reserved by the thread.\n- \n- There is no locking contention on the connection pool that occurs when multiple
              threads attempt to reserve a connection at the same time. There is no contention for threads that attempt to
              reserve the same connection from a limited number of database connections.\n- \n- If an application concurrently
              reserves more than one connection from the connection pool using the same execute thread, WebLogic Server creates
              additional database connections and pins them to the thread.\n- \n- The maximum capacity of the connection pool
              (maximum number of database connections created in the connection pool) becomes the number of execute threads
              used to request a connection multiplied by the number of concurrent connections each thread reserves. This may
              exceed the `Maximum Capacity` specified for the connection pool. You may need to consider this larger number
              of connections in your system design and ensure that your database allows for additional associated resources.
              If your system cannot handle the additional resource requirements or if you see database resource errors after
              enabling `PinnedToThread`, Oracle recommends not using `PinnedToThread`. See Using Pinned-To-Thread Property
              to Increase Performance.\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          profileConnectionLeakTimeoutSeconds:
            type: integer
            format: int32
            description: "The number of seconds that an inactive JDBC connection needs to be held by an application before
              triggering a connection leak diagnostic profiling record.\n\nWhen set to `0`, the timeout is disabled. This
              attribute only applies when the connection leak diagnostic profiling option is enabled."
          profileHarvestFrequencySeconds:
            type: integer
            format: int32
            description: "The number of seconds between when WebLogic Server harvests profile data.\n\nWhen set to `0`, harvesting
              of data is disabled."
          profileType:
            type: integer
            format: int32
            description: "Specifies the type of profile data to be collected for the JDBC subsystem. To enable a multiple
              profiling options, the value should be set to the sum of each option's numeric value. For example, to enable
              the `Connection Usage`, `Connection Leak` and `Connection Unwrap Usage` options the value would be set to 261
              (1 + 4 + 256) or 0x105 (0x001 + 0x004 + 0x100).\n\nYou can specify combinations of the following profile types:\n\
              \n- None (0/0x000): Disable profiling for the data source.\n- \n- Connection Usage (1/0x001): Profile threads
              currently using connections from the pool of connections in the data source. \n- \n- Connection Reserve Wait
              (2/0x002): Profile threads currently waiting to reserve a connection from the data source.\n- \n- Connection
              Leak (4/0x004): Profile threads that have reserved a connection from the data source and the connection leaked
              (was not properly returned to the pool of connections).\n- \n- Connection Reserve Fail (8/0x008): Profile threads
              that attempt to reserve a connection from the data source but fail.\n- \n- Statement Cache Entry (16/0x010):
              Profile prepared and callable statements added to the statement cache, and profile the threads that originated
              the cached statements.\n- \n- Statement Usage (32/0x020): Profile threads currently executing SQL statements
              from the statement cache.\n- \n- Connection Last Usage (64/0x040): Profile the previous thread that last used
              the connection. This information is useful when debugging problems with connections infected with pending transactions
              that cause subsequent XA operations on the connections to fail.\n- \n- Connection Multi-thread Usage (128/0x080):
              Profile threads that erroneously use a connection previously obtained by a different thread.\n- \n- Connection
              Unwrap Usage (256/0x100): Profile threads that have obtained the JDBC delegate object by invoking unwrap or
              weblogic.common.wrapper.Wrapper.getVendorObj on the connection.\n- \n- Connection Local Transaction Leak (512/0x200):
              Profile threads that close JDBC connections that have an active local database transaction.\n- \n- Closed Usage
              (1024/0x400): Profile threads that attempt to use a closed connection, statement or result set.\n-"
          removeInfectedConnections:
            type: boolean
            description: "Specifies whether a connection will be removed from the connection pool after the application uses
              the underlying vendor connection object.\n\nIf you disable removing infected connections, you must make sure
              that the database connection is suitable for reuse by other applications.\n\nWhen set to `true` (the default),
              the physical connection is not returned to the connection pool after the application closes the logical connection.
              Instead, the physical connection is closed and recreated.\n\nWhen set to `false`, when the application closes
              the logical connection, the physical connection is returned to the connection pool and can be reused by the
              application or by another application."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          secondsToTrustAnIdlePoolConnection:
            type: integer
            format: int32
            description: "The number of seconds within a connection use that WebLogic Server trusts that the connection is
              still viable and will skip the connection test, either before delivering it to an application or during the
              periodic connection testing process.\n\nThis option is an optimization that minimizes the performance impact
              of connection testing, especially during heavy traffic."
          shrinkFrequencySeconds:
            type: integer
            format: int32
            description: "The number of seconds to wait before shrinking a connection pool that has incrementally increased
              to meet demand.\n\nWhen set to `0`, shrinking is disabled."
          statementCacheSize:
            type: integer
            format: int32
            description: "The number of prepared and callable statements stored in the cache. (This may increase server performance.)\n\
              \nWebLogic Server can reuse statements in the cache without reloading the statements, which can increase server
              performance. Each connection in the connection pool has its own cache of statements.\n\nSetting the size of
              the statement cache to 0 turns off statement caching."
          statementCacheType:
            type: string
            enum:
            - LRU
            - FIXED
            description: "The algorithm used for maintaining the prepared statements stored in the statement cache.\n\nOptions
              are: \n\n- LRU - when a new prepared or callable statement is used, the least recently used statement is replaced
              in the cache.\n- \n- FIXED - the first fixed number of prepared and callable statements are cached.\n-"
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          statementTimeout:
            type: integer
            format: int32
            description: "The time after which a statement currently being executed will time out.\n\nStatementTimeout relies
              on underlying JDBC driver support. WebLogic Server passes the time specified to the JDBC driver using the `java.sql.Statement.setQueryTimeout()`
              method. If your JDBC driver does not support this method, it may throw an exception and the timeout value is
              ignored.\n\nA value of `-1` disables this feature.\n\nA value of `0` means that statements will not time out."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          testConnectionsOnReserve:
            type: boolean
            description: "Enables WebLogic Server to test a connection before giving it to a client. (Requires that you specify
              a Test Table Name.)\n\nThe test adds a small delay in serving the client's request for a connection from the
              pool, but ensures that the client receives a viable connection."
          testFrequencySeconds:
            type: integer
            format: int32
            description: "The number of seconds a WebLogic Server instance waits between attempts when testing unused connections.
              (Requires that you specify a Test Table Name.) Connections that fail the test are closed and reopened to re-establish
              a valid physical connection. If the test fails again, the connection is closed.\n\nIn the context of multi data
              sources, this attribute controls the frequency at which WebLogic Server checks the health of data sources it
              had previously marked as unhealthy.\n\nWhen set to `0`, the feature is disabled."
          testTableName:
            type: string
            description: "The name of the database table to use when testing physical database connections. This name is required
              when you specify a Test Frequency and enable Test Reserved Connections.\n\nThe default SQL code used to test
              a connection is `select count(*) from TestTableName`\n\nMost database servers optimize this SQL to avoid a table
              scan, but it is still a good idea to set the Test Table Name to the name of a table that is known to have few
              rows, or even no rows.\n\nIf the Test Table Name begins with `SQL`, then the rest of the string following that
              leading token will be taken as a literal SQL statement that will be used to test connections instead of the
              standard query. For example: `SQL BEGIN; Null; END; `\n\nFor an Oracle database, you can reduce the overhead
              of connection testing by setting Test Table Name to `SQL PINGDATABASE` which uses the `pingDatabase()` method
              to test the Oracle connection. For any JDBC 4.0 database, it is possible to use \"SQL ISVALID\" to use the `isValid()`
              method on the connection."
          wrapJdbc:
            type: boolean
            description: "By default, SQL objects for `CallableStatement`, `PreparedStatement`, `ResultSet`, `Statement`,
              and `DatabaseMetaData` are wrapped with a WebLogic wrapper. Wrapping allows features like debugging and connection
              usage to be performed by the server.\n\nWhen `false`, wrapping is disabled. This improves performance, in some
              cases significantly, and allows for the application to use the native driver objects directly. A value of `false`
              also disables data type wrapping."
            x-weblogic-restart-needed: true
          wrapTypes:
            type: boolean
            description: "By default, data type objects for Array, Blob, Clob, NClob, Ref, SQLXML, and Struct, plus ParameterMetaData
              and ResultSetMetaData objects are wrapped with a WebLogic wrapper. This allows for features like debugging and
              connection usage to be done by the server.\n\nThe wrapping can be turned off by setting this value to false.
              This improves performance, in some cases significantly, and allows for the application to use the native driver
              objects directly."
            x-weblogic-restart-needed: true
      description: "Contains the connection pool parameters of a data source.\n\nConfiguration parameters for a data source's
        connection pool are specified using the connection pool parameters bean."
    ServerLifeCycleRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Provides methods that transition servers from one state to another. This class is instantiated only
          on the Administration Server, but you can use it to transition the states of Managed Servers as well as Administration
          Servers.\n\nYou cannot use it to start an Administration Server, and if you want to use it to start Managed Servers,
          you must first set up a Node Manager on each Managed Server's host machine.\n\nIf you want to use the methods that
          transition a server into the `ADMIN` state, you must first set up an administration channel for that server."
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          middlewareHome:
            type: string
            description: The Oracle Middleware installation directory.
            readOnly: true
          nodeManagerRestartCount:
            type: integer
            format: int32
            description: Number of times the server has been restarted using the NodeManager since creation. The first 
              start does not count. The count is valid only if the NodeManager is used to start and restart the server 
              everytime.
            readOnly: true
          state:
            type: string
            enum:
            - ACTIVATE_LATER
            - ADMIN
            - DISCOVERED
            - FAILED
            - FAILED_MIGRATABLE
            - FAILED_NOT_RESTARTABLE
            - FAILED_RESTARTING
            - FORCE_SHUTTING_DOWN
            - FORCE_SUSPENDING
            - RESTART_REQUIRED
            - RESUMING
            - RUNNING
            - SHUTDOWN
            - SHUTDOWN_IN_PROCESS
            - SHUTDOWN_PENDING
            - SHUTTING_DOWN
            - STANDBY
            - STARTING
            - SUSPENDING
            - UNKNOWN
            description: The current state of the server.
            readOnly: true
          tasks:
            type: array
            items:
              $ref: '#/components/schemas/ServerLifeCycleTaskRuntime'
            description: Get preexisting Server Lifecycle Tasks
            readOnly: true
          weblogicHome:
            type: string
            description: The directory where the WebLogic Server instance (server) is installed, without the trailing 
              "/server".
            readOnly: true
      description: "Provides methods that transition servers from one state to another. This class is instantiated only on
        the Administration Server, but you can use it to transition the states of Managed Servers as well as Administration
        Servers.\n\nYou cannot use it to start an Administration Server, and if you want to use it to start Managed Servers,
        you must first set up a Node Manager on each Managed Server's host machine.\n\nIf you want to use the methods that
        transition a server into the `ADMIN` state, you must first set up an administration channel for that server."
    ChangeManagerState:
      type: object
      description: "Edit-session state. Returned by `GET /edit/changeManager`.\n"
      properties:
        locked:
          type: boolean
          description: Whether someone currently holds the edit lock.
        lockOwner:
          type: string
          description: 'User holding the lock, when `locked: true`.'
        hasChanges:
          type: boolean
        mergeNeeded:
          type: boolean
          description: True when the global config has advanced under the session.
        editSession:
          type: string
          example: default
