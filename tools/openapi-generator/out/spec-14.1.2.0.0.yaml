            format: int32
            description: Provides the servlet reload check seconds as it is configured in weblogic.xml.
            readOnly: true
          servletSessionsMonitoringIds:
            type: array
            items:
              type: string
            description: This method returns an array of monitoring IDs for HTTP sessions. By default, the monitoring ID
              for a given HTTP session is a random string (not the same as session ID for security reasons). If the 
              value of the element monitoring-attribute-name in session-descriptor of weblogic.xml is set, the 
              monitoring ID will be the toString() of the attribute value in the session, using 
              monitoring-attribute-name as the key.
            readOnly: true
          servlets:
            type: array
            items:
              $ref: '#/components/schemas/ServletRuntime'
            description: "Provides an array of ServletRuntimeMBeans associated with this module.\n\nReturns an array of ServletRuntimeMBeans
              associated with this component."
            readOnly: true
          sessionCookieComment:
            type: string
            description: By default, all applications on WebLogic Server specify "WebLogic Session Tracking Cookie" as 
              the cookie comment. To provide a more specific comment, edit your application's `weblogic.xml` deployment 
              descriptor.
            readOnly: true
          sessionCookieDomain:
            type: string
            description: "By default, clients can return cookies only to the server that issued the cookie. You can change
              this default behavior by editing your application's `weblogic.xml` deployment descriptor.\n\nFor more information,
              see the servlet specification."
            readOnly: true
          sessionCookieMaxAgeSecs:
            type: integer
            format: int32
            description: Provides the life span of the session cookie, in seconds, after which it expires on the client.
              If the value is 0, the cookie expires immediately. If set to -1, the cookie expires when the user exits 
              the browser.
            readOnly: true
          sessionCookieName:
            type: string
            description: By default, all applications on WebLogic Server specify "JSESSIONID" as the cookie name. To 
              provide a more specific name, edit your application's `weblogic.xml` deployment descriptor.
            readOnly: true
          sessionCookiePath:
            type: string
            description: Provides the path name to which clients send cookies.
            readOnly: true
          sessionIDLength:
            type: integer
            format: int32
            description: Provides the session ID length configured for HTTP sessions.
            readOnly: true
          sessionInvalidationIntervalSecs:
            type: integer
            format: int32
            description: Provides the invalidation check timer interval configured for HTTP sessions.
            readOnly: true
          sessionMonitoringEnabled:
            type: boolean
            description: Provides the session monitoring indicator as it is configured in weblogic.xml.
            readOnly: true
          sessionTimeoutSecs:
            type: integer
            format: int32
            description: Provides the timeout configured for HTTP sessions.
            readOnly: true
          sessionsOpenedTotalCount:
            type: integer
            format: int32
            description: Provides a count of the total number of sessions opened.
            readOnly: true
          singleThreadedServletPoolSize:
            type: integer
            format: int32
            description: Provides the single threaded servlet pool size as it is configured in weblogic.xml.
            readOnly: true
          sourceInfo:
            type: string
            description: "Provides an informative string about the module's source.\n\nReturns an informative string about
