              (HttpClusterServlet) instance.
            readOnly: true
          wseeWsrmRuntime:
            allOf:
            - $ref: '#/components/schemas/WseeWsrmRuntime'
            description: Get statistics for web services reliable messaging across the entire server if any web service 
              is deployed that employs reliable messaging. This MBean is null otherwise.
            readOnly: true
      description: Provides methods for retrieving runtime information about a server instance and for transitioning a 
        server from one state to another.
    ThreadPoolRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This bean is used to monitor the self-tuning queue
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          completedRequestCount:
            type: integer
            format: int64
            description: The number of completed requests in the priority queue.
            readOnly: true
          executeThreadIdleCount:
            type: integer
            format: int32
            description: The number of idle threads in the pool. This count does not include standby threads and stuck 
              threads. The count indicates threads that are ready to pick up new work when it arrives
            readOnly: true
          executeThreadTotalCount:
            type: integer
            format: int32
            description: The total number of threads in the pool.
            readOnly: true
          healthState:
            allOf:
            - $ref: '#/components/schemas/HealthState'
            description: The health state of this pool.
            readOnly: true
          hoggingThreadCount:
            type: integer
            format: int32
            description: The threads that are being held by a request right now. These threads will either be declared 
              as stuck after the configured timeout or will return to the pool before that. The self-tuning mechanism 
              will backfill if necessary.
            readOnly: true
          minThreadsConstraintsCompleted:
            type: integer
            format: int64
            description: Number of requests with min threads constraint picked up out of order for execution immediately
              since their min threads requirement was not met. This does not include the case where threads are idle 
              during schedule.
            readOnly: true
          minThreadsConstraintsPending:
            type: integer
            format: int32
            description: Number of requests that should be executed now to satisfy the min threads requirement.
            readOnly: true
          overloadRejectedRequestsCount:
            type: integer
            format: int32
            description: Number of requests rejected due to configured Shared Capacity for work managers have been 
              reached.
            readOnly: true
          pendingUserRequestCount:
            type: integer
            format: int32
            description: The number of pending user requests in the priority queue. The priority queue contains requests
              from internal subsystems and users. This is just the count of all user requests.
            readOnly: true
          queueLength:
            type: integer
            format: int32
            description: The number of pending requests in the priority queue. This is the total of internal system 
              requests and user requests.
            readOnly: true
          sharedCapacityForWorkManagers:
            type: integer
            format: int32
            description: Maximum amount of requests that can be accepted in the priority queue. Note that a request with
              higher priority will be accepted in place of a lower priority request already in the queue even after the 
              threshold is reached. The lower priority request is kept waiting in the queue till all high priority 
              requests are executed. Also note that further enqueues of the low priority requests are rejected right 
              away.
            readOnly: true
          standbyThreadCount:
            type: integer
            format: int32
            description: The number of threads in the standby pool. Threads that are not needed to handle the present 
              work load are designated as standby and added to the standby pool. These threads are activated when more 
              threads are needed.
            readOnly: true
          stuckThreadCount:
            type: integer
            format: int32
            description: Number of stuck threads in the thread pool.
            readOnly: true
          suspended:
            type: boolean
            description: Indicates if the RequestManager is suspended. A suspended manager will not dequeue work and 
              dispatch threads till it is resumed.
            readOnly: true
          throughput:
            type: number
            format: double
            description: The mean number of requests completed per second.
            readOnly: true
      description: This bean is used to monitor the self-tuning queue
    JVMRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Provides methods for retrieving information about the Java Virtual Machine (JVM) within with the current
          server instance is running. You cannot change the JVM's operating parameters while the JVM is active. Instead, use
          the startup options that are described in the JVM's documentation.\n\nThe WebLogic JVM contains only one of these
          Runtime MBeans:\n\n- \n\nIf the JVM is an instance of a JRockit JDK, then the JVM contains `JRockitRuntime MBean`.\n\
          \n- \n- \n\nOtherwise, it contains the `JVMRuntimeMBean`.\n\n-"
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          heapFreeCurrent:
            type: integer
            format: int64
            description: The current amount of memory (in bytes) that is available in the JVM heap.
            readOnly: true
          heapFreePercent:
            type: integer
            format: int32
            description: Percentage of the maximum memory that is free.
            readOnly: true
          heapSizeCurrent:
            type: integer
            format: int64
            description: The current size (in bytes) of the JVM heap.
            readOnly: true
          heapSizeMax:
            type: integer
            format: int64
            description: The maximum free memory configured for this JVM.
            readOnly: true
          javaVMVendor:
            type: string
            description: "Returns the vendor of the JVM.\n\nThe vendor of the JVM that this server runs.\n\nsystem property
              java.vm.vendor is returned"
            readOnly: true
          javaVendor:
            type: string
            description: "Returns the vendor of Java.\n\nThe vendor of Java that this server runs."
            readOnly: true
          javaVendorVersion:
            type: string
            description: "Returns the vendor version of Java.\n\nThe vendor version of Java that this server runs."
            readOnly: true
          javaVersion:
            type: string
            description: The Java version of the JVM.
            readOnly: true
          OSName:
            type: string
            description: "Returns the operating system on which the JVM is running.\n\nThe operating system on which the JVM
              is running."
            readOnly: true
          OSVersion:
            type: string
            description: The version of the operating system on which the JVM is running.
            readOnly: true
          threadStackDump:
            type: string
            description: JVM thread dump. Thread dump is available only on 1.5 VM
            readOnly: true
          uptime:
            type: integer
            format: int64
            description: The number of milliseconds that the Virtual Machine has been running.
            readOnly: true
      description: "Provides methods for retrieving information about the Java Virtual Machine (JVM) within with the current
        server instance is running. You cannot change the JVM's operating parameters while the JVM is active. Instead, use
        the startup options that are described in the JVM's documentation.\n\nThe WebLogic JVM contains only one of these
        Runtime MBeans:\n\n- \n\nIf the JVM is an instance of a JRockit JDK, then the JVM contains `JRockitRuntime MBean`.\n\
        \n- \n- \n\nOtherwise, it contains the `JVMRuntimeMBean`.\n\n-"
    JDBCServiceRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This class is used for monitoring a WebLogic JDBC service. It maps to a JDBCResource JMO.
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          healthState:
            allOf:
            - $ref: '#/components/schemas/HealthState'
            description: The health state of the JDBC subsystem.
            readOnly: true
          JDBCDataSourceRuntimeMBeans:
            type: array
            items:
              $ref: '#/components/schemas/JDBCDataSourceRuntime'
            description: The list of JDBCDataSourceRuntimeMBeans created in this domain.
            readOnly: true
          JDBCDriverRuntimeMBeans:
            type: array
            items:
              $ref: '#/components/schemas/JDBCDriverRuntime'
            description: The list of JDBCDriverRuntimeMBeans created in this domain.
            readOnly: true
          JDBCMultiDataSourceRuntimeMBeans:
            type: array
            items:
              $ref: '#/components/schemas/JDBCMultiDataSourceRuntime'
            description: The list of JDBCMultiDataSourceRuntimeMBeans created in this domain.
            readOnly: true
      description: This class is used for monitoring a WebLogic JDBC service. It maps to a JDBCResource JMO.
    JDBCDataSourceRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This class is used for monitoring a WebLogic JDBC Data Source and its associated connection pool.
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          deploymentState:
            type: integer
            format: int32
            enum:
            - 0
            - 1
            - 2
            - 3
            description: "The current deployment state of the module.\n\nA module can be in one and only one of the following
              states. State can be changed via deployment or administrator console.\n\n- UNPREPARED. State indicating at this
              module is neither prepared or active.\n- \n- PREPARED. State indicating at this module of this application is
              prepared, but not active. The classes have been loaded and the module has been validated.\n- \n- ACTIVATED.
              State indicating at this module is currently active.\n- \n- NEW. State indicating this module has just been
              created and is being initialized.\n-"
            readOnly: true
          moduleId:
            type: string
            description: "Returns the identifier for this Component. The identifier is unique within the application.\n\n\
              Typical modules will use the URI for their id. Web Modules will return their context-root since the web-uri
              may not be unique within an EAR."
            readOnly: true
          workManagerRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/WorkManagerRuntime'
            description: Get the runtime mbeans for all work managers defined in this component
            readOnly: true
          activeConnectionsAverageCount:
            type: integer
            format: int32
            description: "Average number of active connections in this instance of the data source.\n\nActive connections
              are connections in use by an application. This value is only valid if the resource is configured to allow shrinking."
            readOnly: true
          activeConnectionsCurrentCount:
            type: integer
            format: int32
            description: The number of connections currently in use by applications.
            readOnly: true
          activeConnectionsHighCount:
            type: integer
            format: int32
            description: "Highest number of active database connections in this instance of the data source since the data
              source was instantiated. \n\nActive connections are connections in use by an application."
            readOnly: true
          commitOutcomeRetryTotalCount:
            type: integer
            format: int64
            description: The cumulative total number of commit outcome query retries conducted before resolving the 
              outcome or exceeding the retry seconds in this data source since the data source was deployed.
            readOnly: true
          connectionDelayTime:
            type: integer
            format: int32
            description: "The average amount of time, in milliseconds, that it takes to create a physical connection to the
              database.\n\nThe value is calculated as summary of all times to connect divided by the total number of connections."
            readOnly: true
          connectionsTotalCount:
            type: integer
            format: int32
            description: The cumulative total number of database connections created in this data source since the data 
              source was deployed.
            readOnly: true
          currCapacity:
            type: integer
            format: int32
            description: The current count of JDBC connections in the connection pool in the data source.
            readOnly: true
          currCapacityHighCount:
            type: integer
            format: int32
            description: Highest number of database connections available or in use (current capacity) in this instance 
              of the data source since the data source was deployed.
            readOnly: true
          databaseProductName:
            type: string
            description: The product name of the database that this data source is connected to.
            readOnly: true
          databaseProductVersion:
            type: string
            description: The product version of the database that this data source is connected to.
            readOnly: true
          driverName:
            type: string
            description: The product name of the JDBC driver that this data source is configured to use.
            readOnly: true
          driverVersion:
            type: string
            description: The version of the JDBC driver that this data source is configured to use.
            readOnly: true
          enabled:
            type: boolean
            description: "Indicates whether the data source is enabled or disabled:\n\n- `true` if the data source is enabled.\n\
              - \n- `false` if the data source is disabled.\n-"
            readOnly: true
          failedRepurposeCount:
            type: integer
            format: int64
            description: The number of repurpose errors that have occurred since the datasource was deployed.
            readOnly: true
          failedReserveRequestCount:
            type: integer
            format: int64
            description: The cumulative, running count of requests for a connection from this data source that could not
              be fulfilled.
            readOnly: true
          failuresToReconnectCount:
            type: integer
            format: int32
            description: "The number of times that the data source attempted to refresh a database connection and failed.\n\
              \nFailures may occur when the database is unavailable or when the network connection to the database is interrupted."
            readOnly: true
          highestNumAvailable:
            type: integer
            format: int32
            description: Highest number of database connections that were idle and available to be used by an 
              application at any time in this instance of the data source since the data source was deployed.
            readOnly: true
          highestNumUnavailable:
            type: integer
            format: int32
            description: Highest number of database connections that were in use by applications or being tested by the 
              system in this instance of the data source since the data source was deployed.
            readOnly: true
          JDBCDriverRuntime:
            allOf:
            - $ref: '#/components/schemas/JDBCDriverRuntime'
            description: Gets the JDBCDriverRuntimeMBean associated with this data source.
            readOnly: true
          JDBCReplayStatisticsRuntimeMBean:
            allOf:
            - $ref: '#/components/schemas/JDBCReplayStatisticsRuntime'
            description: Get the statistics for replay only if the datasource is using an Oracle replay driver for 
              12.1.0.2 and later. Otherwise, null is returned. The statistics are a snapshort. To update the snapshot, 
              call refreshStatistics() on the mbean.
            readOnly: true
          lastTask:
            type: array
            items:
              type: string
            description: Get the last datasource Task
            readOnly: true
          leakedConnectionCount:
            type: integer
            format: int32
            description: The number of leaked connections. A leaked connection is a connection that was reserved from 
              the data source but was not returned to the data source by calling `close()`.
            readOnly: true
          numAvailable:
            type: integer
            format: int32
            description: The number of database connections that are currently idle and available to be used by 
              applications in this instance of the data source.
            readOnly: true
          numUnavailable:
            type: integer
            format: int32
            description: The number of connections currently in use by applications or being tested in this instance of 
              the data source.
            readOnly: true
          prepStmtCacheAccessCount:
            type: integer
            format: int64
            description: The cumulative, running count of the number of times that the statement cache was accessed.
            readOnly: true
          prepStmtCacheAddCount:
            type: integer
            format: int64
            description: "The cumulative, running count of the number of statements added to the statement cache.\n\nEach
              connection in the connection pool has its own cache of statements. This number is the sum of the number of statements
              added to the caches for all connections in the connection pool."
            readOnly: true
          prepStmtCacheCurrentSize:
            type: integer
            format: int32
            description: "The number of prepared and callable statements currently cached in the statement cache.\n\nEach
              connection in the connection pool has its own cache of statements. This number is the sum of the number of statements
              in the caches for all connections in the connection pool."
            readOnly: true
          prepStmtCacheDeleteCount:
            type: integer
            format: int64
            description: "The cumulative, running count of statements discarded from the cache.\n\nEach connection in the
              connection pool has its own cache of statements. This number is the sum of the number of statements that were
              discarded from the caches for all connections in the connection pool."
            readOnly: true
          prepStmtCacheHitCount:
            type: integer
            format: int32
            description: The cumulative, running count of the number of times that statements from the cache were used.
            readOnly: true
          prepStmtCacheMissCount:
            type: integer
            format: int32
            description: The number of times that a statement request could not be satisfied with a statement from the 
              cache.
            readOnly: true
          properties:
            type: object
            description: "The list of properties for a data source that are passed to the JDBC driver when creating database
              connections.\n\nThis is a privileged operation that can only be invoked by an authorized user."
            readOnly: true
          repurposeCount:
            type: integer
            format: int64
            description: The number of times connections have been repurposed since the datasource was deployed.
            readOnly: true
          reserveRequestCount:
            type: integer
            format: int64
            description: The cumulative, running count of requests for a connection from this data source.
            readOnly: true
          resolvedAsCommittedTotalCount:
            type: integer
            format: int64
            description: The cumulative total number of commit outcomes successfully resolved as committed in this data 
              source since the data source was deployed. This does not refer to the number of outcome query retries used
              to resolve the outcomes.
            readOnly: true
          resolvedAsNotCommittedTotalCount:
            type: integer
            format: int64
            description: The cumulative total number of commit outcomes successfully resolved as not committed in this 
              data source since the data source was deployed. This does not refer to the number of outcome query retries
              used to resolve the outcomes.
            readOnly: true
          state:
            type: string
            enum:
            - Running
            - Suspended
            - Shutdown
            - Unhealthy
            - Overloaded
            - Unknown
            description: "The current state of the data source.\n\nPossible states are:\n\n- `Running` - the data source is
              enabled (deployed and not `Suspended`). This is the normal state of the data source. This state includes conditions
              when the database server is not available and the data source is created (creation retry must be enabled) or
              when all connections have failed connection tests (on creation, on reserve, or periodic testing).\n- \n- `Suspended`
              - the data source has been disabled.\n- \n- `Shutdown` - the data source is shutdown and all database connections
              have been closed.\n- \n- `Overloaded` - all resources in pool are in use.\n- \n- `Unknown` - the data source
              state is unknown.\n-"
            readOnly: true
          tasks:
            type: array
            items:
              $ref: '#/components/schemas/JDBCDataSourceTaskRuntime'
            description: Get preexisting datasource Tasks
            readOnly: true
          unresolvedTotalCount:
            type: integer
            format: int64
            description: The cumulative total number of commit outcomes unsuccessfully resolved in this data source 
              since the data source was deployed. This does not refer to the number of outcome query retries used to 
              resolve the outcomes.
            readOnly: true
          versionJDBCDriver:
            type: string
            description: The driver class name of the JDBC driver used to create database connections.
            readOnly: true
          waitSecondsHighCount:
            type: integer
            format: int32
            description: "The highest number of seconds that an application waited for a connection (the longest connection
              reserve wait time) from this instance of the connection pool since the connection pool was instantiated.\n\n\
              This value is updated when a completed `getConnection` request takes longer to return a connection than any
              previous request."
            readOnly: true
          waitingForConnectionCurrentCount:
            type: integer
            format: int32
            description: The number of connection requests waiting for a database connection.
            readOnly: true
          waitingForConnectionFailureTotal:
            type: integer
            format: int64
            description: "The cumulative, running count of requests for a connection from this data source that had to wait
              before getting a connection and eventually failed to get a connection.\n\nWaiting connection requests can fail
              for a variety of reasons, including waiting for longer than the ConnectionReserveTimeoutSeconds."
            readOnly: true
          waitingForConnectionHighCount:
            type: integer
            format: int32
            description: Highest number of application requests concurrently waiting for a connection from this instance
              of the data source.
            readOnly: true
          waitingForConnectionSuccessTotal:
            type: integer
            format: int64
            description: The cumulative, running count of requests for a connection from this data source that had to 
              wait before getting a connection and eventually succeeded in getting a connection.
            readOnly: true
          waitingForConnectionTotal:
            type: integer
            format: int64
            description: The cumulative, running count of requests for a connection from this data source that had to 
              wait before getting a connection, including those that eventually got a connection and those that did not 
              get a connection.
            readOnly: true
      description: This class is used for monitoring a WebLogic JDBC Data Source and its associated connection pool.
    ApplicationRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "An application represents a Java EE enterprise application packaged in an EAR file or EAR exploded directory.
          The EAR file or directory contains a set of components such as WAR, EJB, and RAR connector components, each of which
          can be deployed on one or more targets. A target is a server or a cluster. Modules in the application can have one
          of the following states:\n\n- UNPREPARED - Indicates that none of the modules in this application are currently
          prepared or active.\n- \n- PREPARED - Indicates that none of the modules in this application are currently prepared
          or active.\n- \n- ACTIVATED - Indicates that at least one module in this application is currently active.\n- \n\n\
          ApplicationRuntimeMBean encapsulates runtime information about a deployed enterprise application."
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          activeVersionState:
            type: integer
            format: int32
            description: "Specifies whether this application version is the currently active version.\n\nAn application can
              be the only version currently deployed, or it can have more than one version currently deployed, using the side-by-side
              deployment feature. If more than one version is deployed, only one version can be active. This attribute specifies
              the state the current application version is in.\n\nAn application can be in an INACTIVE state, which means
              that it has not been activated yet, or that there is more than one version of the application deployed (using
              side-by-side deployment) and this version is retiring.\n\nAn application can be in ACTIVE_ADMIN state, which
              means that it is the currently active version for administrative channel requests.\n\nAn application can be
              in ACTIVE state, which means that it is the currently active version for normal (non-administrative) channel
              requests."
            readOnly: true
          applicationName:
            type: string
            description: The name of the application.
            readOnly: true
          applicationVersion:
            type: string
            description: "The application's version identifier.\n\nThis is particularly useful, when using the side-by-side
              deployment feature, to differentiate between two different versions of the same application that are deployed
              at the same time."
            readOnly: true
          classLoaderRuntime:
            allOf:
            - $ref: '#/components/schemas/ClassLoaderRuntime'
            description: Get statistics for system-level class loading.
            readOnly: true
          classRedefinitionRuntime:
            allOf:
            - $ref: '#/components/schemas/ClassRedefinitionRuntime'
            description: If the class FastSwap feature is enabled for the application, returns the runtime MBean to 
              monitor and control the class FastSwap within the application.
            readOnly: true
          coherenceClusterRuntime:
            allOf:
            - $ref: '#/components/schemas/CoherenceClusterRuntime'
            description: Returns the Coherence Cluster related runtime MBean.
            readOnly: true
          componentRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ComponentRuntime'
            description: Returns the list of component runtime instances for each Java EE component (such as an EJB or a
              web application) that is contained in this enterprise application.
            readOnly: true
          healthState:
            allOf:
            - $ref: '#/components/schemas/HealthState'
            description: The HealthState MBean for the application.
            readOnly: true
          internal:
            type: boolean
            description: Indicates whether this application is an internal application. Such applications are not 
              displayed in the console or persisted in the config.xml.
            readOnly: true
          libraryRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/LibraryRuntime'
            description: Returns the list of library runtime instances for each Java EE library that is contained in 
              this enterprise application.
            readOnly: true
          managedExecutorServiceRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedExecutorServiceRuntime'
            description: Returns the list of managed executor service runtime instances for each application-scoped 
              managed executor service that is associated with this enterprise application.
            readOnly: true
          managedScheduledExecutorServiceRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedScheduledExecutorServiceRuntime'
            description: Returns the list of managed scheduled executor service runtime instances for each 
              application-scoped managed scheduled executor service that is associated with this enterprise application.
            readOnly: true
          managedThreadFactoryRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedThreadFactoryRuntime'
            description: Returns the list of managed thread factory runtime instances for each application-scoped 
              managed thread factory that is associated with this enterprise application.
            readOnly: true
          maxThreadsConstraintRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/MaxThreadsConstraintRuntime'
            description: Get the runtime MBeans for all MaxThreadsConstraints defined at the application level.
            readOnly: true
          minThreadsConstraintRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/MinThreadsConstraintRuntime'
            description: Get the runtime MBeans for all MinThreadsConstraints defined at the application level.
            readOnly: true
          optionalPackageRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/LibraryRuntime'
            description: Returns the list of optional package runtime instances for each Java EE optional package that 
              is contained in this enterprise application.
            readOnly: true
          overallHealthState:
            allOf:
            - $ref: '#/components/schemas/HealthState'
            description: The overall health of the application including that of some of the components that report 
              health. Currently, only connector modules report health status and are the only ones considered in the 
              overall health state of the application.
            readOnly: true
          persistenceUnitRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/PersistenceUnitRuntime'
            description: Provides an array of PersistenceUnitRuntimeMBean objects for this EAR module.
            readOnly: true
          queryCacheRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/QueryCacheRuntime'
            description: Returns a list of QueryCacheRuntimeMBeans configured for this application.
            readOnly: true
          requestClassRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/RequestClassRuntime'
            description: Get the runtime MBeans for all request classes defined at the application level.
            readOnly: true
          workManagerRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/WorkManagerRuntime'
            description: Returns the list of work manager runtime instances for each application-scoped work manager 
              that is associated with this enterprise application.
            readOnly: true
          wseeV2Runtimes:
            type: array
            items:
              $ref: '#/components/schemas/WseeV2Runtime'
            description: Returns the list of Web Service runtime instances that are contained at the application scope 
              of this enterprise application. This can happen when javax.xml.ws.Endpoint.publish() is called from within
              an application lifecycle listener.
            readOnly: true
      description: "An application represents a Java EE enterprise application packaged in an EAR file or EAR exploded directory.
        The EAR file or directory contains a set of components such as WAR, EJB, and RAR connector components, each of which
        can be deployed on one or more targets. A target is a server or a cluster. Modules in the application can have one
        of the following states:\n\n- UNPREPARED - Indicates that none of the modules in this application are currently prepared
        or active.\n- \n- PREPARED - Indicates that none of the modules in this application are currently prepared or active.\n\
        - \n- ACTIVATED - Indicates that at least one module in this application is currently active.\n- \n\nApplicationRuntimeMBean
        encapsulates runtime information about a deployed enterprise application."
    ComponentRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: Base class for all runtime mbeans that provide status of running modules.
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          deploymentState:
            type: integer
            format: int32
            enum:
            - 0
            - 1
            - 2
            - 3
            description: "The current deployment state of the module.\n\nA module can be in one and only one of the following
              states. State can be changed via deployment or administrator console.\n\n- UNPREPARED. State indicating at this
              module is neither prepared or active.\n- \n- PREPARED. State indicating at this module of this application is
              prepared, but not active. The classes have been loaded and the module has been validated.\n- \n- ACTIVATED.
              State indicating at this module is currently active.\n- \n- NEW. State indicating this module has just been
              created and is being initialized.\n-"
            readOnly: true
          moduleId:
            type: string
            description: "Returns the identifier for this Component. The identifier is unique within the application.\n\n\
              Typical modules will use the URI for their id. Web Modules will return their context-root since the web-uri
              may not be unique within an EAR."
            readOnly: true
          workManagerRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/WorkManagerRuntime'
            description: Get the runtime mbeans for all work managers defined in this component
            readOnly: true
      description: Base class for all runtime mbeans that provide status of running modules.
    WebAppComponentRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: Describes a servlet component (servlet context).
        properties:
          name:
            type: string
            description: Provides the name of this MBean.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          deploymentState:
            type: integer
            format: int32
            enum:
            - 0
            - 1
            - 2
            - 3
            description: "The current deployment state of the module.\n\nA module can be in one and only one of the following
              states. State can be changed via deployment or administrator console.\n\n- UNPREPARED. State indicating at this
              module is neither prepared or active.\n- \n- PREPARED. State indicating at this module of this application is
              prepared, but not active. The classes have been loaded and the module has been validated.\n- \n- ACTIVATED.
              State indicating at this module is currently active.\n- \n- NEW. State indicating this module has just been
              created and is being initialized.\n-"
            readOnly: true
          moduleId:
            type: string
            description: "Returns the identifier for this Component. The identifier is unique within the application.\n\n\
              Typical modules will use the URI for their id. Web Modules will return their context-root since the web-uri
              may not be unique within an EAR."
            readOnly: true
          workManagerRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/WorkManagerRuntime'
            description: Get the runtime mbeans for all work managers defined in this component
            readOnly: true
          managedExecutorServiceRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedExecutorServiceRuntime'
            description: Get the runtime mbeans for all ManagedExecutorServices defined in this component
            readOnly: true
          managedScheduledExecutorServiceRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedScheduledExecutorServiceRuntime'
            description: Get the runtime mbeans for all ManagedScheduledExecutorServices defined in this component
            readOnly: true
          managedThreadFactoryRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/ManagedThreadFactoryRuntime'
            description: Get the runtime mbeans for all ManagedThreadFactorys defined in this component
            readOnly: true
          applicationIdentifier:
            type: string
            description: Provides the identifier of the application that contains the web module.
            readOnly: true
          coherenceClusterRuntime:
            allOf:
            - $ref: '#/components/schemas/CoherenceClusterRuntime'
            description: Returns the Coherence Cluster related runtime MBean for this component.
            readOnly: true
          componentName:
            type: string
            description: Provides the name of this component.
            readOnly: true
          configuredContextRoot:
            type: string
            description: "Returns the context root (context path) configured in weblogic-application.xml or web.xml file,
              or determined by name of the war file. \n\nFor web application deployed in partition scope, this configured
              context root does not include uriPrefix of the virtual target. The getContextRoot() method returns value which
              includes the uriPrefix of the virtual target. \n\nFor web application deployed in domain scope, this method
              returns same value as getContextRoot() method."
            readOnly: true
          contextRoot:
            type: string
            description: Returns the context root (context path) for the web application.
            readOnly: true
          EJBRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/EJBRuntime'
            description: Provides an array of EJBRuntimeMBean objects for this module. The EJBRuntimeMBean instances can
              be cast to their appropriate subclass (EntityEJBRuntimeMBean, StatelessEJBRuntimeMBean, 
              StatefulEJBRuntimeMBean or MessageDrivenEJBRuntimeMBean) to access additional runtime information for the 
              particular EJB.
            readOnly: true
          filterDispatchedRequestsEnabled:
            type: boolean
            description: Indicates whether the dispatched requests are filtered as configured in weblogic.xml.
            readOnly: true
          indexDirectoryEnabled:
            type: boolean
            description: Provides the directory indexing indicator as it is configured in weblogic.xml.
            readOnly: true
          JSPCompileCommand:
            type: string
            description: Provides the JSP's compileCommand value as it is configured in weblogic.xml.
            readOnly: true
          JSPDebug:
            type: boolean
            description: Provides the JSP's debug/linenumbers parameter value as it is configured in weblogic.xml.
            readOnly: true
          JSPKeepGenerated:
            type: boolean
            description: Provides the JSP's KeepGenerated parameter value as it is configured in weblogic.xml.
            readOnly: true
          JSPPageCheckSecs:
            type: integer
            format: int64
            description: Provides the JSP's PageCheckSecs value as it is configured in weblogic.xml.
            readOnly: true
          JSPVerbose:
            type: boolean
            description: Provides the JSP's verbose parameter value as it is configured in weblogic.xml.
            readOnly: true
          jaxRsApplications:
            type: array
            items:
              $ref: '#/components/schemas/JaxRsApplicationRuntime'
            description: Provides an array of JaxRsApplicationMBeans associated with this module.
            readOnly: true
          libraryRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/LibraryRuntime'
            description: Returns the list of library runtime instances for each Java EE library that is contained in 
              this enterprise application.
            readOnly: true
          logFilename:
            type: string
            description: Returns the log filename as configured in the "logging/log-filename" element in weblogic.xml.
            readOnly: true
          logRuntime:
            allOf:
            - $ref: '#/components/schemas/LogRuntime'
            description: Returns the log runtime associated with the Java EE web application log.
            readOnly: true
          moduleURI:
