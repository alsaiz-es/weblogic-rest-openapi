          messagesPendingCount:
            type: integer
            format: int64
            description: "The current number of messages pending (unacknowledged or uncommitted) stored on this JMS server.\n\
              \nPending messages are over and above the current number of messages."
            readOnly: true
          messagesReceivedCount:
            type: integer
            format: int64
            description: The number of messages received on this destination since the last reset.
            readOnly: true
          messagesThresholdTime:
            type: integer
            format: int64
            description: The amount of time in the threshold condition since the last reset.
            readOnly: true
          pagingAllocatedIoBufferBytes:
            type: integer
            format: int64
            description: See PersistentStoreRuntimeMBean.AllocatedIoBufferBytes
            readOnly: true
          pagingAllocatedWindowBufferBytes:
            type: integer
            format: int64
            description: See PersistentStoreRuntimeMBean.AllocatedWindowBufferBytes
            readOnly: true
          pagingPhysicalWriteCount:
            type: integer
            format: int64
            description: See PersistentStoreRuntimeMBean.PhysicalWriteCount
            readOnly: true
          pendingTransactions:
            type: array
            items:
              type: string
            description: Returns an array of Xids representing transaction branches that exist onthis JMS server in the 
              pending state, i.e. branches that have been prepared by the transaction manager but not yet committed or 
              rolled back.
            readOnly: true
          productionPaused:
            type: boolean
            description: Returns the current production paused state of the JMSServer as boolean value.
            readOnly: true
          productionPausedState:
            type: string
            enum:
            - Production-Enabled
            - Production-Pausing
            - Production-Paused
            description: Returns the current production paused state of the JMSServer as string value.
            readOnly: true
          sessionPoolRuntimes:
            type: array
            items:
              $ref: '#/components/schemas/JMSSessionPoolRuntime'
            description: The session pools running on this JMS server.
            readOnly: true
          sessionPoolsCurrentCount:
            type: integer
            format: int64
            description: The current number of session pools instantiated on this JMS server.
            readOnly: true
          sessionPoolsHighCount:
            type: integer
            format: int64
            description: The peak number of session pools instantiated on this JMS server since the last reset.
            readOnly: true
          sessionPoolsTotalCount:
            type: integer
            format: int64
            description: The number of session pools instantiated on this JMS server since the last reset.
            readOnly: true
          transactions:
            type: array
            items:
              type: string
            description: Returns an array of Xids representing transaction branches that exist on this JMS server in any
              state.
            readOnly: true
      description: This class is used for monitoring a WebLogic JMS server.
    Server:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This class represents a individual WebLogic Server. A WebLogic Server is a Java process that is a 
          container for Java EE applications.
        properties:
          name:
            type: string
            description: "An alphanumeric name for this server instance. (Spaces are not valid.)\n\nThe name must be unique
              for all configuration objects in the domain. Within a domain, each server, machine, cluster, JDBC connection
              pool, virtual host, and any other resource type must be named uniquely and must not use the same name as the
              domain.\n\nFor more information on server naming conventions, see Domain and Server Name Restrictions in Understanding
              Domain Configuration for Oracle WebLogic Server.\n\nThe server name is not used as part of the URL for applications
              that are deployed on the server. It is for your identification purposes only. The server name displays in the
              Administration Console, and if you use WebLogic Server command-line utilities or APIs, you use this name to
              identify the server.\n\nAfter you have created a server, you cannot change its name. Instead, clone the server
              and provide a new name for the clone."
            x-weblogic-restart-needed: true
          type:
            type: string
            description: Returns the type of the MBean.
          dynamicallyCreated:
            type: boolean
            description: Return whether the MBean was created dynamically or is persisted to config.xml
          id:
            type: integer
            format: int64
            description: Return the unique id of this MBean instance
          notes:
            type: string
            description: "Optional information that you can include to describe this configuration.\n\nWebLogic Server saves
              this note in the domain's configuration file (`config.xml`) as XML PCDATA. All left angle brackets (<) are converted
              to the XML entity `&lt;`. Carriage returns/line feeds are preserved.\n\nNote: If you create or edit a note from
              the Administration Console, the Administration Console does not preserve carriage returns/line feeds."
          tags:
            type: array
            items:
              type: string
            description: Return all tags on this Configuration MBean
          addWorkManagerThreadsByCpuCount:
            type: boolean
            description: "Enables increased efficiency of the self-tuning thread pool by aligning it with the Exalogic processor
              architecture threading capabilities. Use only when configuring a WebLogic domain for Oracle Exalogic. \n\n-
              Enabling this attribute increases efficiency during I/O in environments with high network throughput.\n- \n\
              - Disabling this attribute allows the thread pool to self-tune to match the demand of the workload at the expense
              of longer ramp up time.\n-"
            x-weblogic-restart-needed: true
          administrationProtocol:
            type: string
            enum:
            - t3s
            - https
            - iiops
            - t3
            - http
            - iiop
            deprecated: true
            description: "Returns the protocol to be used for administrative connections when none is specified.\n\n_Deprecated_:
              14.1.2.0.0"
            x-weblogic-restart-needed: true
          allowShrinkingPriorityRequestQueue:
            type: boolean
            description: Specifies whether self-tuning should allow shrinking of its priority based queue for pending 
              requests after it has grown in size due to busy workload, and whether it should try to purge work requests
              that have already been picked up for processing due to minimum threads constraints before growing the 
              queue. Setting this to true would help reduce memory footprint after the busy work period has ended, at 
              the expense of the overhead of growing the request queue again at the next period of busy workload. It 
              would also help to reduce the amount of memory allocated for the request queue, at the expense of the 
              overhead required in purging already processed work requests from the queue.
            x-weblogic-restart-needed: true
          completeMessageTimeout:
            type: integer
            format: int32
            description: "The maximum number of seconds that this server waits for a complete message to be received. If you
              configure network channels for this server, each channel can override this message timeout.\n\nThis timeout
              helps guard against a denial of service attack in which a caller indicates that it will be sending a message
              of a certain size which it never finishes sending.\n\nCompleteMessageTimeout affects the HTTP Response, such
              that if WebLogic Server discovers sockets inactive for longer than the CompleteMessageTimeout, the server will
              close these sockets."
          completeWriteTimeout:
            type: integer
            format: int32
            description: "The maximum number of seconds that this server waits for a complete HTTP response to be sent.\n\n\
              A value of `0` disables the complete write timeout. The default value is derived from the CompleteHTTPMessageTimeout.
              If it is `-1`, then the CompleteMessageTimeout value is used for the default value."
            x-weblogic-restart-needed: true
          connectTimeout:
            type: integer
            format: int32
            description: The amount of time that this server should wait to establish an outbound socket connection 
              before timing out. A value of `0` disables server connect timeout.
          DGCIdlePeriodsUntilTimeout:
            type: integer
            format: int32
            description: The number of idle periods allowed before the object is collected.
            x-weblogic-restart-needed: true
          defaultProtocol:
            type: string
            enum:
            - t3
            - t3s
            - http
            - https
            - iiop
            - iiops
            description: The protocol to use for connections when none is specified.
            x-weblogic-restart-needed: true
          defaultSecureProtocol:
            type: string
            enum:
            - t3s
            - https
            - iiops
            description: The protocol to use for secure connections when none is specified.
            x-weblogic-restart-needed: true
          eagerThreadLocalCleanup:
            type: boolean
            description: Specifies whether to clean up all ThreadLocals storage from self-tuning thread pool threads 
              after they have finished processing each work request. By default, the self-tuning thread pool only cleans
              up ThreadLocal storage in its threads after an application is undeployed to avoid ClassLoader memory leak.
            x-weblogic-restart-needed: true
          executeQueues:
            type: array
            items:
              $ref: '#/components/schemas/ExecuteQueue'
            description: Returns the execute queues configured for this server.
          gatheredWritesEnabled:
            type: boolean
            description: Enables gathered writes over NIO socket channels. Enabling this attribute increases efficiency 
              during I/O in environments with high network throughput and should be used only when configuring a 
              WebLogic domain for Oracle Exalogic.
            x-weblogic-restart-needed: true
          IIOP:
            allOf:
            - $ref: '#/components/schemas/IIOP'
            description: Returns the kernel's IIOP configuration. An IIOP MBean is always linked to a particular kernel 
              and cannot be changed. Individual attributes on the IIOP MBean may be changed, as documented, but the 
              MBean itself may not.
          idleConnectionTimeout:
            type: integer
            format: int32
            description: "The maximum number of seconds that a connection is allowed to be idle before it is closed by the
              server. The T3 and T3S protocols ignore this attribute. If you configure network channels for this server, each
              channel can override this idle connection message timeout.\n\nThis timeout helps guard against server deadlock
              through too many open connections."
          idlePeriodsUntilTimeout:
            type: integer
            format: int32
            description: The number of idle periods until peer is considered unreachable.
            x-weblogic-restart-needed: true
          instrumentStackTraceEnabled:
            type: boolean
            description: "Specifies whether the server returns stack traces for RMI calls that generate exceptions.\n\nWith
              RMI stack tracking enabled, if a client issues an RMI call to a server subsystem or to a module running within
              the server, and if the subsystem or module generates an exception that includes a stack trace, the server will
              return the exception as well as the stack trace. With it disabled, the server will return the exception without
              the stack trace details."
          log:
            allOf:
            - $ref: '#/components/schemas/Log'
            description: Returns the log settings for this kernel. A Log MBean is always linked to a particular kernel 
              and cannot be changed. Individual attributes on the Log MBean may be changed, as documented, but the MBean
              itself may not.
          logCriticalRemoteExceptionsEnabled:
            type: boolean
            description: Specifies whether the server message log includes only critical exceptions that are raised in 
              remote systems. Non-critical exceptions, such as javax.management.InstanceNotFoundException and 
              javax.management.AttributeNotFoundException, will not be included in the message log.
          logRemoteExceptionsEnabled:
            type: boolean
            description: Specifies whether the server message log includes exceptions that are raised in remote systems.
          maxMessageSize:
            type: integer
            format: int32
            description: "The maximum number of bytes allowed in messages that are received over all supported protocols,
              unless overridden by a protocol-specific setting or a custom channel setting.\n\nThe order of precedence for
              setting message size maximums is as follows:\n\n- \n\nA channel-wide maximum in a custom network channel.\n\n\
              - \n- \n\nA protocol-specific setting in the default network channel.\n\nSee\n\n- getMaxCOMMessageSize()\n-\
              \ \n- getMaxHTTPMessageSize()\n- \n- getMaxIIOPMessageSize()\n- \n- getMaxT3MessageSize()\n- \n\n- \n- \n\n\
              The message maximum in this attribute.\n\n- \n\nThis maximum message size helps guard against a denial of service
              attack in which a caller attempts to force the server to allocate more memory than is available thereby keeping
              the server from responding quickly to other requests.\n\nA client can set this value using the `-Dweblogic.MaxMessageSize`
              property."
          maxOpenSockCount:
            type: integer
            format: int32
            description: "The maximum number of open sockets allowed in server at a given point of time.\n\nWhen the maximum
              threshold is reached, the server stops accepting new requests until the number of sockets drops below the threshold.\n\
              \nA value less than `0` indicates an unlimited size."
          muxerClass:
            type: string
            description: "Non-blocking IO is enabled by default on the server side.\n\nThe default value is `weblogic.socket.NIOSocketMuxer`.\
              \ \n\nThe Certicom SSL implementation is not supported with NIOSocketMuxer. If you need to secure internet communication,
              Oracle recommends enabling JSSE (Java Secure Socket Extension)."
            x-weblogic-restart-needed: true
          nativeIOEnabled:
            type: boolean
            description: Specifies whether native I/O is enabled for the server.
            x-weblogic-restart-needed: true
          outboundEnabled:
            type: boolean
            description: "Specifies whether new server-to-server connections may consider the default server channel when
              initiating a connection. This is only relevant if the connection needs to be bound to the default listen address.
              This will only work for binary protocols that support both outbound and inbound traffic.\n\nWhen this feature
              is not enabled, connections are initiated using a local address selected by the underlying hardware. For the
              default channel this is usually what is wanted for IP-routing to be effective. Note that since the default is
              false, other outbound channels will be considered in preference to the default channel.\n\nDefault administration
              channels, created when the domain-wide administration port is turned on, are always considered and bound when
              initiating an administrative connection. To allow IP-routing for administration traffic create custom admin
              with NetworkAccessPointMBean.isOutboundEnabled set to false instead of enabling the domain-wide ADMIN port."
          outboundPrivateKeyEnabled:
            type: boolean
            description: Specifies whether the SSL identity specified by SSLMBean.getServerPrivateKeyAlias() for this 
              server should be used for outbound SSL connections on the default server channel. In normal circumstances 
              the outbound identity is determined by the caller's environment.
          periodLength:
            type: integer
            format: int32
            description: The time interval in milliseconds of the heartbeat period. A value of 0 indicates that 
              heartbeats are turned off.
            x-weblogic-restart-needed: true
          printStackTraceInProduction:
            type: boolean
            description: Specifies whether the server message log includes exception stack trace that are raised in 
              remote systems.
          RMIDeserializationMaxTimeLimit:
            type: integer
            format: int64
            description: "Sets the maximum time limit, in milliseconds, before a deserialization process is terminated. This
              time limit helps guard against a denial of service attack.\n\nEnter a value of 100 ms or greater to enable.
              If set to 0, the RMIDeserializationMaxTimeLimit attribute is disabled and there is no maximum time limit."
          reverseDNSAllowed:
            type: boolean
            description: Specifies whether the kernel is allowed to perform reverse DNS lookups.
          SSL:
            allOf:
            - $ref: '#/components/schemas/SSL'
            description: Returns the kernel's SSL configuration. An SSL MBean is always linked to a particular kernel 
              and cannot be changed. Individual attributes on the SSL MBean may be changed, as documented, but the MBean
              itself may not.
          scatteredReadsEnabled:
            type: boolean
            description: Enables scattered reads over NIO socket channels. Enabling this attribute increases efficiency 
              during I/O in environments with high network throughput and should be used only when configuring a 
              WebLogic domain for Oracle Exalogic.
            x-weblogic-restart-needed: true
          selfTuningThreadPoolSizeMax:
            type: integer
            format: int32
            description: "Sets the maximum thread pool size of the self-tuning thread pool.\n\nThe self-tuning thread pool
              starts with the default size of 1. It grows and shrinks automatically as required. Setting this attribute changes
              the default maximum pool size. The active thread count will never increase beyond this value. This value defines
              the maximum number of threads permitted in the server. Note that the server will add threads only if it improves
              throughput. Measurements are taken every two seconds and the decision to increase or decrease the thread count
              is based on the current throughput measurement versus past values. \n\nThis attribute is used only when setUse81StyleExecuteQueues
              is turned off which is the default."
            x-weblogic-restart-needed: true
          selfTuningThreadPoolSizeMin:
            type: integer
            format: int32
            description: "Get the minimum thread pool size of the self-tuning thread pool.\n\nThe self-tuning thread pool
              starts with the default size of 1. It grows and shrinks automatically as required. Setting this attribute changes
              the default minimum pool size. The thread count will never shrink below this value. It can add threads to improve
              throughput but will never decrease below the set minimum. \n\nThis attribute is used only when setUse81StyleExecuteQueues
              is turned off which is the default."
            x-weblogic-restart-needed: true
          socketBufferSizeAsChunkSize:
            type: boolean
            description: "Specifies whether the server's buffer size for sending or receiving data through a raw socket should
              be set to 4KB. \n\nOtherwise, the server does not impose a limit to the buffer size and defers to the operating
              system. This option is useful only on some operating systems for improving performance. It should be disabled
              in most environments."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          socketReaders:
            type: integer
            format: int32
            description: The number of socket reader threads.
            x-weblogic-restart-needed: true
          stuckThreadTimerInterval:
            type: integer
            format: int32
            description: The number of seconds after which WebLogic Server periodically scans threads to see if they 
              have been continually working for the configured maximum length of time.
            x-weblogic-restart-needed: true
          threadPoolPercentSocketReaders:
            type: integer
            format: int32
            description: The percentage of execute threads from the default queue that can be used as socket readers.
          use81StyleExecuteQueues:
            type: boolean
            description: Backward compatibility mode to switch to 8.1 execute queues instead of WorkManagers. Each of 
              the WorkManagers is converted to an individual execute queue. Setting this attribute requires a server 
              restart.
            x-weblogic-restart-needed: true
          useConcurrentQueueForRequestManager:
            type: boolean
            description: Reduces lock contention by using concurrent buffer queue to park incoming requests. Enabling 
              this attribute increases throughput as requests are scheduled without acquiring any locks.
            x-weblogic-restart-needed: true
          useDetailedThreadName:
            type: boolean
            description: Specifies whether to includes detailed information in self-tuning thread pool thread names. 
              Setting this flag as true would include additional information, such as the name of the Work Manager for 
              which the execute thread is executing the task, but at the expense of overhead in keeping the thread name 
              updated with such information.
          useEnhancedIncrementAdvisor:
            type: boolean
            description: Specifies whether self-tuning should use the enhanced IncrementAdvisor implementation that uses
              a different algorithm to adjust the size of the self-tuning thread pool.
            x-weblogic-restart-needed: true
          useEnhancedPriorityQueueForRequestManager:
            type: boolean
            description: "Reduces lock contention by using the enhanced ConcurrentCalendarQueue as the priority based queue
              for pending requests that are waiting for a thread. \n\nThis attribute should be enabled only in an Oracle Exalogic
              environment."
            x-weblogic-restart-needed: true
          virtualThreadEnableOption:
            type: string
            enum:
            - disabled
            - enabled
            description: Get the configuration settings for the virtual thread enable option.
            x-weblogic-restart-needed: true
          acceptBacklog:
            type: integer
            format: int32
            description: "The number of backlogged, new TCP connection requests that should be allowed for this server's regular
              and SSL ports.\n\nSetting the backlog to `0` may prevent this server from accepting any incoming connection
              on some operating systems."
          adminReconnectIntervalSeconds:
            type: integer
            format: int32
            description: The number of seconds between reconnection attempts to the admin server. When the admin server 
              fails the managed server will periodically try to connect back to it.
          administrationPort:
            type: integer
            format: int32
            description: "The secure administration port for the server. This port requires that you enable the domain's administration
              port and that SSL is configured and enabled.\n\nBy default, the server uses the administration port that is
              specified at the domain level. To override the domain-level administration port for the current server instance,
              set this server's administration port."
            x-weblogic-restart-needed: true
          autoMigrationEnabled:
            type: boolean
            description: Specifies whether Node Manager can automatically restart this server and its services on 
              another machine if the server fails.
            x-weblogic-restart-needed: true
          autoRestart:
            type: boolean
            description: Specifies whether the Node Manager can automatically restart this server if it crashes or 
              otherwise goes down unexpectedly.
          COM:
            allOf:
            - $ref: '#/components/schemas/COM'
            deprecated: true
            description: "Returns the server's COM configuration.\n\n_Deprecated_: 12.2.1.2.0"
          COMEnabled:
            type: boolean
            deprecated: true
            description: "Specifies whether COM support is enabled on the regular (non-SSL) port. COM is not supported on
              the SSL port. (The remaining fields on this page are relevant only if you check this box.)\n\n_Deprecated_:
              12.2.1.2.0"
            x-weblogic-restart-needed: true
          candidateMachines:
            type: array
            items:
              type: array
              items:
                type: string
            description: "Limits the list of candidate machines that the cluster specifies. (Requires you to enable this server
              for automatic migration and to configure the cluster with a set of candidate machines.)\n\nIf this server fails
              and if it is enabled for automatic migration, Node Manager automatically restarts it. By default, Node Manager
              restarts the server on any of the candidate machines that the cluster specifies (in order of preference that
              you configured in the cluster). To change the default, you use this server's list of candidate machines to create
              a subset of the cluster-wide candidates. You can also change the order of preference."
            x-weblogic-restart-needed: true
          classpathServletDisabled:
            type: boolean
            description: "The ClasspathServlet will serve any class file in the classpath and is registered by default in
              every Web application (including management). It does not need to be turned on for many applications though,
              and represents a security hole if unchecked while the ClassPathServletSecureModeEnabled is also set to false.\n\
              \nWLS components such as JDBC and JMS rely on the ClasspathServlet. If the servlet can not be disabled, then
              set the ClassPathServletSecureModeEnabled to true."
            x-weblogic-restart-needed: true
          classpathServletSecureModeEnabled:
            type: boolean
            description: "If secure mode is enabled, the ClasspathServlet will serve only class files from wellknown packages
              required for JDBC and JMS functionality. If secure mode is disabled, it represents a security hole if unchecked
              as the ClassPatchServlet will serve any class in the classpath and is registered by default in every Web application
              (including management).\n\nIf set to true, the ClasspathServlet will not be disabled by the DefaultInternalServletsDisabled
              value of true."
            x-weblogic-restart-needed: true
          cleanupOrphanedSessionsEnabled:
            type: boolean
            description: Indicates if replication service should cleanup orphaned http and ejb sessions. Orphaned 
              sessions are http and ejb session instances that are not referenced by the replication service.
          clientCertProxyEnabled:
            type: boolean
            description: "Specifies whether the `HttpClusterServlet` proxies the client certificate in a special header.\n\
              \nBy default (or if you specify `false`), the `weblogic.xml` deployment descriptor for each web application
              that is deployed on this server determines whether the web application trusts certificates sent from the proxy
              server plugin. By default (or if the deployment descriptor specifies `false`), users cannot log in to the web
              application from a proxy server plugin.\n\nA value of `true` causes proxy-server plugins to pass identity certifications
              from clients to all web applications that are deployed on this server instance. A proxy-server plugin encodes
              each identify certification in the `WL-Proxy-Client-Cert` header and passes the header to WebLogic Server instances.
              A WebLogic Server instance takes the certificate information from the header, trusting that it came from a secure
              source, and uses that information to authenticate the user.\n\nIf you specify `true`, use a `weblogic.security.net.ConnectionFilter`
              to ensure that this WebLogic Server instance accepts connections only from the machine on which the proxy-server
              plugin is running. Specifying `true` without using a connection filter creates a security vulnerability because
              the `WL-Proxy-Client-Cert` header can be spoofed.\n\nA cluster can also specify whether the `HttpClusterServlet`
              proxies the client certificate in a special header. The cluster-level setting overrides the setting in individual
              servers that are part of the cluster."
            x-weblogic-restart-needed: true
          cluster:
            type: array
            items:
              type: string
            description: "The cluster, or group of WebLogic Server instances, to which this server belongs.\n\nIf set, the
              server will listen for cluster multicast events."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          clusterWeight:
            type: integer
            format: int32
            description: "The proportion of the load that this server will bear, relative to other servers in a cluster.\n\
              \nIf all servers have the default weight or the same weight, each bears an equal proportion of the load. If
              one server has weight 50 and all other servers have weight 100, the 50-weight server will bear half as much
              load as any other server."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          coherenceClusterSystemResource:
            type: array
            items:
              type: string
            description: The system-level Coherence cluster resource associated with this server.
            x-weblogic-restart-needed: true
          coherenceMemberConfig:
            allOf:
            - $ref: '#/components/schemas/CoherenceMemberConfig'
            description: Returns the Coherence Operational Config overrides associated with this Server.
          customIdentityKeyStoreFileName:
            type: string
            description: "The source of the identity keystore. For a JKS or PKCS12 keystore, the source is the path and file
              name. For an Oracle Key Store Service (KSS) keystore, the source is the KSS URI.\n\nIf using a JKS or PKCS12
              keystore, the keystore path name must either be absolute or relative to where the server was booted.\n\nIf using
              a KSS keystore, the keystore URI must be of the form:\n\n`kss://system/keystorename`\n\nwhere `keystorename`
              is the name of the keystore registered in KSS.\n\nThe value in this attribute is only used if `KeyStores` is
              `CUSTOM_IDENTITY_AND_JAVA_STANDARD_TRUST`, `CUSTOM_IDENTITY_AND_CUSTOM_TRUST` or `CUSTOM_IDENTITY_AND_COMMAND_LINE_TRUST`."
          customIdentityKeyStorePassPhrase:
            type: string
            description: "The encrypted custom identity keystore's passphrase. If empty or null, then the keystore will be
              opened without a passphrase.\n\nThis attribute is only used if KeyStores is `CUSTOM_IDENTITY_AND_JAVA_STANDARD_TRUST`,
              `CUSTOM_IDENTITY_AND_CUSTOM_TRUST` or `CUSTOM_IDENTITY_AND_COMMAND_LINE_TRUST`.\n\nWhen you get the value of
              this attribute, WebLogic Server does the following:\n\n- Retrieves the value of the `CustomIdentityKeyStorePassPhraseEncrypted`
              attribute.\n- \n- Decrypts the value and returns the unencrypted password as a String.\n- \n\nWhen you set the
              value of this attribute, WebLogic Server does the following:\n\n- Encrypts the value.\n- \n- Sets the value
              of the `CustomIdentityKeyStorePassPhraseEncrypted` attribute to the encrypted value.\n- \n\nUsing this attribute
              (`CustomIdentityKeyStorePassPhrase`) is a potential security risk because the String object (which contains
              the unencrypted password) remains in the JVM's memory until garbage collection removes it and the memory is
              reallocated. Depending on how memory is allocated in the JVM, a significant amount of time could pass before
              this unencrypted data is removed from memory.\n\nInstead of using this attribute, use `CustomIdentityKeyStorePassPhraseEncrypted`."
            x-weblogic-restart-needed: true
          customIdentityKeyStorePassPhraseEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: Returns encrypted pass phrase defined when creating the keystore.
          customIdentityKeyStoreType:
            type: string
            description: "The type of the keystore. Generally, this is `JKS` or `PKCS12`. If using the Oracle Key Store Service,
              this is `KSS`\n\nIf empty or null, then the JDK's default keystore type (specified in `java.security`) is used.
              The custom identity key store type is only used if `KeyStores` is `CUSTOM_IDENTITY_AND_JAVA_STANDARD_TRUST`,
              `CUSTOM_IDENTITY_AND_CUSTOM_TRUST` or `CUSTOM_IDENTITY_AND_COMMAND_LINE_TRUST`."
          customTrustKeyStoreFileName:
            type: string
            description: "The source of the custom trust keystore. For a JKS or PKCS12 keystore, the source is the path and
              file name. For an Oracle Key Store Service (KSS) keystore, the source is the KSS URI.\n\nIf using a JKS or PKCS12
              keystore, the keystore path name must either be absolute or relative to where the server was booted.\n\nIf using
              a KSS keystore, the keystore URI must be of the form:\n\n`kss://system/keystorename`\n\nwhere `keystorename`
              is the name of the keystore registered in KSS.\n\nThe value in this attribute is only used if `KeyStores` is
              `CUSTOM_IDENTITY_AND_CUSTOM_TRUST`."
          customTrustKeyStorePassPhrase:
            type: string
            description: "The custom trust keystore's passphrase. If empty or null, then the keystore will be opened without
              a passphrase.\n\nThis attribute is only used if KeyStores is CUSTOM_IDENTITY_AND_CUSTOM_TRUST.\n\nWhen you get
              the value of this attribute, WebLogic Server does the following:\n\n- Retrieves the value of the `CustomTrustKeyStorePassPhraseEncrypted`
              attribute.\n- \n- Decrypts the value and returns the unencrypted password as a String.\n- \n\nWhen you set the
              value of this attribute, WebLogic Server does the following:\n\n- Encrypts the value.\n- \n- Sets the value
              of the `CustomTrustKeyStorePassPhraseEncrypted` attribute to the encrypted value.\n- \n\nUsing this attribute
              (`CustomTrustKeyStorePassPhrase`) is a potential security risk because the String object (which contains the
              unencrypted password) remains in the JVM's memory until garbage collection removes it and the memory is reallocated.
              Depending on how memory is allocated in the JVM, a significant amount of time could pass before this unencrypted
              data is removed from memory.\n\nInstead of using this attribute, use `CustomTrustKeyStorePassPhraseEncrypted`."
            x-weblogic-restart-needed: true
          customTrustKeyStorePassPhraseEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: "The custom trust keystore's encrypted passphrase. If empty or null, then the keystore will be opened
              without a passphrase.\n\nThis attribute is only used if KeyStores is CUSTOM_IDENTITY_AND_CUSTOM_TRUST.\n\nTo
              set this attribute, use `weblogic.management.EncryptionHelper.encrypt()` to encrypt the value. Then set this
              attribute to the output of the encrypt() method. \n\nTo compare a password that a user enters with the encrypted
              value of this attribute, use the same WebLogic Server instance that you used to set and encrypt this attribute
              and use `weblogic.management.EncryptionHelper.encrypt()` to encrypt the user-supplied password. Then compare
              the encrypted values."
          customTrustKeyStoreType:
            type: string
            description: "The type of the keystore. Generally, this is `JKS` or `PKCS12`. If using the Oracle Key Store Service,
              this is `KSS`\n\nIf empty or null, then the JDK's default keystore type (specified in `java.security`) is used.
              This keystore type is only used if KeyStores is CUSTOM_IDENTITY_AND_CUSTOM_TRUST."
