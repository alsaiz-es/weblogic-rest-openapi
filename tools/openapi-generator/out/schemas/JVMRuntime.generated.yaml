JVMRuntime:
  type: object
  description: "Provides methods for retrieving information about the Java Virtual Machine (JVM) within with the current server
    instance is running. You cannot change the JVM's operating parameters while the JVM is active. Instead, use the startup
    options that are described in the JVM's documentation.\n\nThe WebLogic JVM contains only one of these Runtime MBeans:\n\
    \n- \n\nIf the JVM is an instance of a JRockit JDK, then the JVM contains `JRockitRuntime MBean`.\n\n- \n- \n\nOtherwise,
    it contains the `JVMRuntimeMBean`.\n\n-"
  properties:
    name:
      type: string
      description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
        configuration.
      readOnly: true
    type:
      type: string
      description: Returns the type of the MBean.
      readOnly: true
    heapFreeCurrent:
      type: integer
      format: int64
      description: The current amount of memory (in bytes) that is available in the JVM heap.
      readOnly: true
    heapFreePercent:
      type: integer
      format: int32
      description: Percentage of the maximum memory that is free.
      readOnly: true
    heapSizeCurrent:
      type: integer
      format: int64
      description: The current size (in bytes) of the JVM heap.
      readOnly: true
    heapSizeMax:
      type: integer
      format: int64
      description: The maximum free memory configured for this JVM.
      readOnly: true
    javaVMVendor:
      type: string
      description: "Returns the vendor of the JVM.\n\nThe vendor of the JVM that this server runs.\n\nsystem property java.vm.vendor
        is returned"
      readOnly: true
    javaVendor:
      type: string
      description: "Returns the vendor of Java.\n\nThe vendor of Java that this server runs."
      readOnly: true
    javaVendorVersion:
      type: string
      description: "Returns the vendor version of Java.\n\nThe vendor version of Java that this server runs."
      readOnly: true
    javaVersion:
      type: string
      description: The Java version of the JVM.
      readOnly: true
    OSName:
      type: string
      description: "Returns the operating system on which the JVM is running.\n\nThe operating system on which the JVM is
        running."
      readOnly: true
    OSVersion:
      type: string
      description: The version of the operating system on which the JVM is running.
      readOnly: true
    threadStackDump:
      type: string
      description: JVM thread dump. Thread dump is available only on 1.5 VM
      readOnly: true
    uptime:
      type: integer
      format: int64
      description: The number of milliseconds that the Virtual Machine has been running.
      readOnly: true
