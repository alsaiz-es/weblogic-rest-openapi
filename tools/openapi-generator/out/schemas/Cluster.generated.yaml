Cluster:
  type: object
  description: "This bean represents a cluster in the domain. Servers join a cluster by calling ServerMBean.setCluster with
    the logical name of the cluster. A configuration may define zero or more clusters. They may be looked up by logical name.\n\
    \nThe name of a cluster denotes its logical cluster name."
  properties:
    name:
      type: string
      default:
        derivedDefault: true
      description: "The user-specified name of this MBean instance.\n\nThis name is included as one of the key properties
        in the MBean's `javax.management.ObjectName`:\n\n`Name=user-specified-name`"
      x-weblogic-restart-needed: true
    type:
      type: string
      description: Returns the type of the MBean.
    dynamicallyCreated:
      type: boolean
      default:
        value:
          value: false
      description: Return whether the MBean was created dynamically or is persisted to config.xml
    id:
      type: integer
      format: int64
      description: Return the unique id of this MBean instance
    notes:
      type: string
      description: "Optional information that you can include to describe this configuration.\n\nWebLogic Server saves this
        note in the domain's configuration file (`config.xml`) as XML PCDATA. All left angle brackets (<) are converted to
        the XML entity `&lt;`. Carriage returns/line feeds are preserved.\n\nNote: If you create or edit a note from the Administration
        Console, the Administration Console does not preserve carriage returns/line feeds."
    tags:
      type: array
      items:
        type: string
      description: Return all tags on this Configuration MBean
    additionalAutoMigrationAttempts:
      type: integer
      format: int32
      default:
        value:
          value: 3
      description: "A migratable server could fail to come up on every possible configured machine. This attribute controls
        how many further attempts, after the first one, should be tried.\n\nNote that each attempt specified here indicates
        another full circuit of migrations amongst all the configured machines. So for a 3-server cluster, and the default
        value of 3, a total of 9 migrations will be attempted.\n\nIf it is set to -1, migrations will go on forever until
        the server starts."
      x-weblogic-restart-needed: true
    asyncSessionQueueTimeout:
      type: integer
      format: int32
      default:
        value:
          value: 30
      description: Interval in seconds until the producer thread will wait for the AsyncSessionQueue to become 
        unblocked. Should be similar to the RequestTimeOut as that will determine the longest that the queue should 
        remain full.
    autoMigrationTableCreationDDLFile:
      type: string
      default:
        value:
          value:
      description: "The absolute file path of a custom DDL file for creating the automatic migration database table.\n\nThis
        setting applies only if the `MigrationBasis` attribute is set to `database`, the `AutoMigrationTableCreationPolicy`
        attribute is set to `Always`, and the table name specified by the `AutoMigrationTableName` attribute does not already
        exist in the database.\n\nIf the above conditions apply, and this setting is set to the default, then the system will
        try to find a default DDL file for the creating the leasing database table in `WL_HOME/server/db/DB_TYPE/leasing.ddl`.\n\
        \nNote that the system ignores (skips) any `DROP` commands in the DDL file, and substitutes the value configured in
        the `AutoMigrationTableName` attribute for all occurrences of the word `ACTIVE` in the file."
      x-weblogic-restart-needed: true
    autoMigrationTableCreationPolicy:
      type: string
      enum:
      - Disabled
      - Always
      default:
        value:
          value: Disabled
      description: "Control automatic leasing table creation behavior.\n\nThis setting applies only if the `MigrationBasis`
        attribute is set to `database`.\n\n- `Disabled` \n\nDisables automatic leasing table creation. The behavior is same
        as manual table creation. Any singletons dependent on cluster leasing will fail to start unless the table defined
        by the `AutoMigrationTableName` already exists in the database.\n\n- \n- `Always` \n\nForce automatic leasing table
        creation if the table is not found. The default table name is \"ACTIVE\" and can be customized using the `AutoMigrationTableName`
        attribute. The SQL used to create the table when it is not found can be customized using the `AutoMigrationTableCreationDDLFile`
        attribute.\n\n-"
      x-weblogic-restart-needed: true
    autoMigrationTableName:
      type: string
      default:
        value:
          value: ACTIVE
      description: "Return the name of the table to be used for server migration.\n\nThis setting applies only if the `MigrationBasis`
        attribute is set to `database`.\n\nIf the `AutoMigrationTableCreationPolicy` is set to `Always`, then the table name
        format must be specified in the form `[[[mycatalog.]myschema.]mytablename`; for example `myschema.mytablename`. Each
        period symbol format is significant, where schema generally corresponds to username in many databases.\n\nWhen no
        table name is specified, the table name is simply `ACTIVE` and the database implicitly determines the schema according
        to the JDBC data source user."
      x-weblogic-restart-needed: true
    candidateMachinesForMigratableServers:
      type: array
      items:
        type: array
        items:
          type: string
      description: "The set of machines (and order of preference) on which Node Manager will restart failed servers. (Requires
        you to enable each server for automatic migration.)\n\nEach server can specify a subset of these cluster-wide candidates,
        which limits the machines on which the server can be restarted. Servers can also specify their own order of preference."
      x-weblogic-restart-needed: true
    clientCertProxyEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Specifies whether to honor the WL-Proxy-Client-Cert header coming with the request or not.
      x-weblogic-restart-needed: true
    clusterAddress:
      type: string
      description: "The address that forms a portion of the URL a client uses to connect to this cluster, and that is used
        for generating EJB handles and entity EJB failover addresses. (This address may be either a DNS host name that maps
        to multiple IP addresses or a comma-separated list of single address host names or IP addresses.)\n\nDefines the address
        to be used by clients to connect to this cluster. This address may be either a DNS host name that maps to multiple
        IP addresses or a comma separated list of single address host names or IP addresses. If network channels are configured,
        it is possible to set the cluster address on a per channel basis."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    clusterBroadcastChannel:
      type: string
      description: "Specifies the channel used to handle communications within a cluster. If no channel is specified the default
        channel is used.\n\nClusterBroadcastChannel is only are supported if the unicast messaging type is used."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    clusterMessagingMode:
      type: string
      enum:
      - multicast
      - unicast
      default:
        value:
          value: unicast
      description: "Specifies the messaging type used in the cluster.\n\nMulticast messaging is provided for backwards compatibility."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    clusterType:
      type: string
      enum:
      - none
      - wan
      - man
      default:
        value:
          value: none
      description: "Optimizes cross-cluster replication for the type of network that servers in the clusters use for administrative
        communication.\n\nTo enhance the reliability of HTTP sessions, you can configure servers in one cluster to replicate
        the session data to servers in a different cluster. In such an environment, configure the clusters to be one of the
        following types:\n\n- `man` \n\nIf the clustered servers can send their data through a metro area network (man) in
        which latency is negligible. With this ClusterType value, servers replicate session state synchronously and in memory
        only. For example, when serverA in cluster1 starts an HTTP session, its backup server, serverB in cluster2, immediately
        replicates this session in memory to Server B.\n\n- \n- `wan` \n\nIf the clusters are far apart or send their data
        through a wide area network (wan) that experiences significant network latency. With this ClusterType value, a server
        replicates session state synchronously to the backup server in the same cluster and asynchronously to a server in
        the remote cluster. For example, when serverA in cluster1 starts an HTTP session, it sends the data to serverB in
        cluster1 and then asynchronously sends data to serverX in cluster 2. ServerX will persist the session state in the
        database.\n\nIf you persist session data in a replicating database, and if you prefer to use the database to replicate
        the data instead of WebLogic Server, choose a cluster type of `wan` and leave the remote cluster address undefined.
        WebLogic Server saves the session data to the local database and assumes that the database replicates data as needed.\n\
        \n-"
      x-weblogic-restart-needed: true
    coherenceClusterSystemResource:
      type: array
      items:
        type: string
      description: Coherence Cluster associated with this cluster.
      x-weblogic-restart-needed: true
    coherenceTier:
      $ref: '#/components/schemas/CoherenceTier'
      description: Coherence Tier associated with this WLS cluster.
    concurrentSingletonActivationEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Specifies whether to allow the concurrent activation, deactivation, or restart of two or more 
        singleton services.
      x-weblogic-restart-needed: true
    dataSourceForAutomaticMigration:
      type: array
      items:
        type: string
      description: "The data source used by servers in the cluster during migration. (You must configure each Migratable Server
        within the cluster to use this data source.)\n\nThis setting applies only if the `MigrationBasis` attribute is set
        to `database`."
      x-weblogic-restart-needed: true
    dataSourceForJobScheduler:
      type: array
      items:
        type: string
      description: Data source required to support persistence of jobs scheduled with the job scheduler
      x-weblogic-restart-needed: true
    dataSourceForSessionPersistence:
      type: array
      items:
        type: string
      description: To support HTTP Session failover across data centers, a datasource is required to dump session state 
        on disk.
      x-weblogic-restart-needed: true
    databaseLeasingBasisConnectionRetryCount:
      type: integer
      format: int32
      default:
        value:
          value: 1
      description: The maximum number of times Database Leasing will try to obtain a valid connection from the Data 
        Source.
      x-weblogic-restart-needed: true
    databaseLeasingBasisConnectionRetryDelay:
      type: integer
      format: int64
      default:
        value:
          value: 1000
      description: The length of time, in milliseconds,Database Leasing will wait before attempting to obtain a new 
        connection from the Data Source when a connection has failed.
      x-weblogic-restart-needed: true
    databaseLessLeasingBasis:
      $ref: '#/components/schemas/DatabaseLessLeasingBasis'
      description: Get attributes associated with database less leasing basis used for server migration and singleton 
        services.
    defaultLoadAlgorithm:
      type: string
      enum:
      - round-robin
      - weight-based
      - random
      - round-robin-affinity
      - weight-based-affinity
      - random-affinity
      default:
        value:
          value: round-robin
      description: Defines the algorithm to be used for load-balancing between replicated services if none is specified 
        for a particular service. The `round-robin` algorithm cycles through a list of WebLogic Server instances in 
        order. `Weight-based` load balancing improves on the round-robin algorithm by taking into account a pre-assigned
        weight for each server. In `random` load balancing, requests are routed to servers at random.
    dynamicServers:
      $ref: '#/components/schemas/DynamicServers'
      description: DynamicServers associated with this WLS cluster.
    fencingGracePeriodMillis:
      type: integer
      format: int32
      default:
        value:
          value: 30000
      description: During automatic migration, if the Cluster Master determines a server to be dead, it waits for this 
        period of time (in milliseconds) before the Cluster Master migrates the service to another server in the 
        cluster.
      x-weblogic-restart-needed: true
    frontendHTTPPort:
      type: integer
      format: int32
      default:
        value:
          value: 0
      description: "The name of the HTTP port to which all redirected URLs will be sent.\n\nSets the FrontendHTTPPort for
        the default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure that the
        webapp will always have the correct PORT information, even when the request is coming through a firewall or a proxy.
        If this parameter is configured, the HOST header will be ignored and the information in this parameter will be used
        in its place, when constructing the absolute urls for redirects."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    frontendHTTPSPort:
      type: integer
      format: int32
      default:
        value:
          value: 0
      description: "The name of the secure HTTP port to which all redirected URLs will be sent.\n\nSets the FrontendHTTPSPort
        for the default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure that
        the webapp will always have the correct PORT information, even when the request is coming through a firewall or a
        proxy. If this parameter is configured, the HOST header will be ignored and the information in this parameter will
        be used in its place, when constructing the absolute urls for redirects."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    frontendHost:
      type: string
      default:
        value:
          value:
      description: "The name of the host to which all redirected URLs will be sent.\n\nSets the HTTP FrontendHost for the
        default webserver (not virtual hosts) for all the servers in the cluster. Provides a method to ensure that the webapp
        will always have the correct HOST information, even when the request is coming through a firewall or a proxy. If this
        parameter is configured, the HOST header will be ignored and the information in this parameter will be used in its
        place, when constructing the absolute urls for redirects."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    greedySessionFlushInterval:
      type: integer
      format: int32
      default:
        value:
          value: 3
      description: Interval in seconds until HTTP Sessions are periodically flushed to secondary server.
    healthCheckIntervalMillis:
      type: integer
      format: int32
      default:
        value:
          value: 10000
      description: Interval in milliseconds at which Migratable Servers and Cluster Masters prove their liveness via the
        database.
      x-weblogic-restart-needed: true
    healthCheckPeriodsUntilFencing:
      type: integer
      format: int32
      default:
        value:
          value: 6
      description: Maximum number of periods that a cluster member will wait before timing out a Cluster Master and also
        the maximum number of periods the Cluster Master will wait before timing out a Migratable Server.
      x-weblogic-restart-needed: true
    httpTraceSupportEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Returns the value of HttpTraceSupportEnabled.
      x-weblogic-restart-needed: true
    idlePeriodsUntilTimeout:
      type: integer
      format: int32
      default:
        value:
          value: 3
      description: "Maximum number of periods that a cluster member will wait before timing out a member of a cluster.\n\n\
        Maximum number of periods that a cluster member will wait before timing out a member of a cluster."
      x-weblogic-restart-needed: true
    interClusterCommLinkHealthCheckInterval:
      type: integer
      format: int32
      default:
        value:
          value: 30000
      description: If the cluster link between two clusters goes down, a trigger will run periodically to see if the 
        link is restored. The duration is specified in milliseconds.
    JTACluster:
      $ref: '#/components/schemas/JTACluster'
      description: JTA associated with this WLS cluster.
    jobSchedulerTableName:
      type: string
      default:
        value:
          value: WEBLOGIC_TIMERS
      description: The table name to use for storing timers active with the job scheduler
      x-weblogic-restart-needed: true
    maxSecondarySelectionAttempts:
      type: integer
      format: int32
      default:
        value:
          value: 0
      description: This is the max number of attempts at choosing a suitable secondary server for replication.If it is 
        set to 0,secondary server selection for replication will be tried on all servers in the cluster.
    memberDeathDetectorEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Enables faster Automatic Service Migration times with Database Leasing Basis.
      x-weblogic-restart-needed: true
    memberWarmupTimeoutSeconds:
      type: integer
      format: int32
      default:
        derivedDefault: true
      description: Maximum number of seconds that a cluster member will wait to discover and synchronize with other 
        servers in the cluster. Normally, the member will be able to sync in 30 seconds. If the value of this attribute 
        is higher, that does not necessarily mean that it will take longer for the member to warmup. Instead it defines 
        an upper bound on the time that a server will wait to sync with the servers that it has discovered. If the value
        is set 0, servers will not attempt to discover other running server in the cluster during server initialization
    messageOrderingEnabled:
      type: boolean
      default:
        value:
          value: true
      description: Forces unicast messages to be processed in order. There are scenarios where JMS may update JNDI very 
        frequently. It will result in a lot of messages over unicast. Due to the close proximity of messages the 
        probability of out of order handling of messages increases which would trigger frequent state dumps. Frequent 
        JNDI tree refresh may result in NameNotFoundException. Use this property to prevent out of order handling of 
        messages.
      x-weblogic-restart-needed: true
    migratableTargets:
      type: array
      items:
        type: array
        items:
          type: string
      description: Returns all the MigratableTargets for this cluster
    migrationBasis:
      type: string
      enum:
      - database
      - consensus
      default:
        value:
          value: database
      description: "Controls the mechanism used for server and service migration.\n\n- Database -- Requires the availability
        of a high-availability database, such as Oracle RAC, to store leasing information. Requires also configuring the `DataSourceForAutomaticMigration`
        attribute. Optionally also configure `AutoMigrationTableName` (default is \"ACTIVE\"), `AutoMigrationTableCreationPolicy`,
        and `AutoMigrationTableCreationDDLFile`.\n- \n- Consensus -- Stores the leasing information in-memory within a cluster
        member. This option requires Node Manager to be configured and running.\n- \n\nNote: Within a WebLogic Server installation,
        you can only use one type of leasing. Although it is possible to implement multiple features that use leasing within
        your environment, each must use the same kind of leasing."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    millisToSleepBetweenAutoMigrationAttempts:
      type: integer
      format: int64
      default:
        value:
          value: 180000
      description: Controls how long of a pause there should be between the migration attempts described in 
        getAdditionalAutoMigrationAttempts(). Note that this delay only happens when the server has failed to come up on
        every machine.
      x-weblogic-restart-needed: true
    multicastAddress:
      type: string
      default:
        value:
          value: 239.192.0.0
      description: "The multicast address used by cluster members to communicate with each other.\n\nThe valid range is from
        from 224.0.0.0 to 239.255.255.255. The default value used by WebLogic Server is 239.192.0.0. You should avoid using
        multicast addresses in the range x.0.0.1\n\nThis address should be unique to this cluster and should not be shared
        by other applications."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    multicastBufferSize:
      type: integer
      format: int32
      default:
        value:
          value: 64
      description: "The multicast socket send/receive buffer size (at least 64 kilobytes).\n\nReturns the multicast socket
        send/receive buffer size."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    multicastDataEncryption:
      type: boolean
      default:
        value:
          value: false
      description: Enables multicast data to be encrypted. Only the multicast data is encrypted. Multicast header 
        information is not encrypted.
      x-weblogic-restart-needed: true
    multicastPort:
      type: integer
      format: int32
      default:
        value:
          value: 7001
      description: "The multicast port (between 1 and 65535) used by cluster members to communicate with each other.\n\nDefines
        the multicast port used by cluster members to communicate with each other."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    multicastSendDelay:
      type: integer
      format: int32
      default:
        value:
          value: 3
      description: "The amount of time (between 0 and 250 milliseconds) to delay sending message fragments over multicast
        in order to avoid OS-level buffer overflow.\n\nDefines the number of milliseconds to delay sending message fragments
        over multicast in order to avoid OS-level buffer overflow."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    multicastTTL:
      type: integer
      format: int32
      default:
        value:
          value: 1
      description: "The number of network hops (between 1 and 255) that a cluster multicast message is allowed to travel.\n\
        \nDefines the number of network hops that a cluster multicast message is allowed to travel. 1 restricts the cluster
        to one subnet."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    numberOfServersInClusterAddress:
      type: integer
      format: int32
      default:
        value:
          value: 3
      description: Number of servers to be listed from this cluster when generating a cluster address automatically. 
        This setting has no effect if Cluster Address is explicitly set.
      x-weblogic-restart-needed: true
    oneWayRmiForReplicationEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Indicates if one-way RMI is being used for replication. One-way RMI also requires configuring 
        replication ports on each server in the cluster.
      x-weblogic-restart-needed: true
    overloadProtection:
      $ref: '#/components/schemas/OverloadProtection'
      description: Get attributes related to server overload protection. The default values for all cluster members are 
        set here. Individual servers can override them as needed.
    persistSessionsOnShutdown:
      type: boolean
      description: "When shutting down servers, sessions are not updated. If the primary and secondary servers of a session
        are shut down with no session updates, the session will be lost. Turning on PersistSessionsOnShutdown will save any
        active sessions to the database specified in ClusterMBean.getDataSourceForSessionPersistence() when a server is shutdown.
        The sessions will not be written at any other time. (For example, they are not saved via this mechanism if there is
        a server crash.)\n\nThis attribute is applicable both to session persistence on server shutdown or session persistence
        across a WAN.\n\nRolling upgrade can potentially have a bad interaction with traditional in-memory session replication.
        As managed servers are shutdown and upgraded, in-memory servlet sessions will be lost if both primary and secondary
        are rebooted before a new request arrives for the session."
      x-weblogic-restart-needed: true
    rebalanceDelayPeriods:
      type: integer
      format: int32
      default:
        value:
          value: 2
      description: 'Gets the number of the Rebalance periods to wait to rebalance cluster targeted JMS instances in an idle
        system (typically 10 seconds per period). Note: This setting only applies when a JMS artifact is cluster-targeted,
        its Rebalance Enabled is set to `true`, and its Migration Policy is set to `On-Failure` or `Always`.'
    remoteClusterAddress:
      type: string
      description: Set the foreign cluster. Cluster infrastructure uses this address to connect to foreign cluster for 
        HTTP Session WAN/MAN failover.
      x-weblogic-restart-needed: true
    replicationChannel:
      type: string
      default:
        value:
          value: ReplicationChannel
      description: "The channel name to be used for replication traffic. Cluster infrastructure uses this channel to send
        updates for HTTP sessions and stateful session beans. If none is set then the default channel will be used.\n\nIn
        order for this feature to work, the named channel must exist on all members of the cluster and must be configured
        to use the same protocol. It is valid for the selected channel to be configured to use a secure protocol."
      x-weblogic-restart-needed: true
    replicationTimeoutEnabled:
      type: boolean
      default:
        value:
          value: true
      description: Indicates if timeout should be applied to session replication calls.
      x-weblogic-restart-needed: true
    replicationTimeoutMillis:
      type: integer
      format: int32
      default:
        derivedDefault: true
      description: Interval in milliseconds at which Migratable Servers and Cluster Masters prove their liveness via the
        database.
      x-weblogic-restart-needed: true
    secureReplicationEnabled:
      type: boolean
      default:
        derivedDefault: true
      description: "Servers in a cluster replicate session data. If a replication channel is defined then the session data
        will be sent using the replication channel protocol and secured replication settings will be ignored. If no replication
        channel is defined and secured replication is enabled then session data for in-memory replication will be sent over
        SSL using the default secured channel. However, this added security for replication traffic comes with a significant
        cluster performance degradation. It should only be enabled if security is of greater concern than performance degradation.\n\
        \nThe default value for this attribute is true if all cluster members have SSL enabled, and either secure mode is
        enabled or no plaintext replication channel is available. Otherwise, the default is false."
      x-weblogic-restart-needed: true
      x-weblogic-redeploy-needed: true
    servers:
      type: array
      items:
        type: array
        items:
          type: string
      description: The servers which have declared membership in this cluster.
    serviceActivationRequestResponseTimeout:
      type: integer
      format: int32
      default:
        value:
          value: 0
      description: The maximum time, in milliseconds seconds, for services to wait for response from cluster members.
      x-weblogic-restart-needed: true
    serviceAgeThresholdSeconds:
      type: integer
      format: int32
      default:
        value:
          value: 180
      description: "The number of seconds (between 0 and 65534) by which the age of two conflicting services must differ before
        one is considered older than the other.\n\nDefines the number of seconds by which the age of two conflicting services
        must differ before one is considered older than the other."
    sessionFlushInterval:
      type: integer
      format: int32
      default:
        value:
          value: 180
      description: Interval in seconds until HTTP Sessions are periodically flushed to the backup cluster to dump 
        session state on disk.
    sessionFlushThreshold:
      type: integer
      format: int32
      default:
        value:
          value: 10000
      description: When number of sessions to be flushed reaches this threshold limit, sessions will be flushed to the 
        backup cluster before the flush interval. This helps the server to flush sessions faster under load.
    sessionLazyDeserializationEnabled:
      type: boolean
      default:
        derivedDefault: true
      description: Enables increased efficiency with session replication. Enabling this attribute should be used only 
        when configuring a WebLogic domain for Oracle Exalogic.
    sessionStateQueryProtocolEnabled:
      type: boolean
      default:
        value:
          value: false
      description: Indicates if session state query protocol is enabled. The Session State Query protocol will query the
        local cluster for the location of a session state instance if a request arrives at a server that is neither the 
        primary or secondary server.
    sessionStateQueryRequestTimeout:
      type: integer
      format: int32
      default:
        value:
          value: 30
      description: The maximum time, in seconds, for session state query request to wait for response from cluster 
        members.
    singletonServiceRequestTimeout:
      type: integer
      format: int32
      default:
        value:
          value: 30000
      description: "The maximum time, in milliseconds, for service activation requests will wait for response from cluster
