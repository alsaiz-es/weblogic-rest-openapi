ThreadPoolRuntime:
  type: object
  description: This bean is used to monitor the self-tuning queue
  properties:
    name:
      type: string
      description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
        configuration.
      readOnly: true
    type:
      type: string
      description: Returns the type of the MBean.
      readOnly: true
    completedRequestCount:
      type: integer
      format: int64
      description: The number of completed requests in the priority queue.
      readOnly: true
    executeThreadIdleCount:
      type: integer
      format: int32
      description: The number of idle threads in the pool. This count does not include standby threads and stuck 
        threads. The count indicates threads that are ready to pick up new work when it arrives
      readOnly: true
    executeThreadTotalCount:
      type: integer
      format: int32
      description: The total number of threads in the pool.
      readOnly: true
    healthState:
      $ref: '#/components/schemas/HealthState'
      description: The health state of this pool.
    hoggingThreadCount:
      type: integer
      format: int32
      description: The threads that are being held by a request right now. These threads will either be declared as 
        stuck after the configured timeout or will return to the pool before that. The self-tuning mechanism will 
        backfill if necessary.
      readOnly: true
    minThreadsConstraintsCompleted:
      type: integer
      format: int64
      description: Number of requests with min threads constraint picked up out of order for execution immediately since
        their min threads requirement was not met. This does not include the case where threads are idle during 
        schedule.
      readOnly: true
    minThreadsConstraintsPending:
      type: integer
      format: int32
      description: Number of requests that should be executed now to satisfy the min threads requirement.
      readOnly: true
    overloadRejectedRequestsCount:
      type: integer
      format: int32
      description: Number of requests rejected due to configured Shared Capacity for work managers have been reached.
      readOnly: true
    pendingUserRequestCount:
      type: integer
      format: int32
      description: The number of pending user requests in the priority queue. The priority queue contains requests from 
        internal subsystems and users. This is just the count of all user requests.
      readOnly: true
    queueLength:
      type: integer
      format: int32
      description: The number of pending requests in the priority queue. This is the total of internal system requests 
        and user requests.
      readOnly: true
    sharedCapacityForWorkManagers:
      type: integer
      format: int32
      description: Maximum amount of requests that can be accepted in the priority queue. Note that a request with 
        higher priority will be accepted in place of a lower priority request already in the queue even after the 
        threshold is reached. The lower priority request is kept waiting in the queue till all high priority requests 
        are executed. Also note that further enqueues of the low priority requests are rejected right away.
      readOnly: true
    standbyThreadCount:
      type: integer
      format: int32
      description: The number of threads in the standby pool. Threads that are not needed to handle the present work 
        load are designated as standby and added to the standby pool. These threads are activated when more threads are 
        needed.
      readOnly: true
    stuckThreadCount:
      type: integer
      format: int32
      description: Number of stuck threads in the thread pool.
      readOnly: true
    suspended:
      type: boolean
      description: Indicates if the RequestManager is suspended. A suspended manager will not dequeue work and dispatch 
        threads till it is resumed.
      readOnly: true
    throughput:
      type: number
      format: double
      description: The mean number of requests completed per second.
      readOnly: true
