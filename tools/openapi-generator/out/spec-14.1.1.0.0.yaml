          servlets:
            type: array
            items:
              $ref: '#/components/schemas/ServletRuntime'
            description: "Provides an array of ServletRuntimeMBeans associated with this module.\n\nReturns an array of ServletRuntimeMBeans
              associated with this component."
            readOnly: true
          sessionCookieComment:
            type: string
            description: By default, all applications on WebLogic Server specify "WebLogic Session Tracking Cookie" as 
              the cookie comment. To provide a more specific comment, edit your application's `weblogic.xml` deployment 
              descriptor.
            readOnly: true
          sessionCookieDomain:
            type: string
            description: "By default, clients can return cookies only to the server that issued the cookie. You can change
