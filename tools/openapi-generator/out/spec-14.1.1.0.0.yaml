          javaCompiler:
            type: string
            description: The Java compiler to use for all applications hosted on this server that need to compile Java 
              code.
          javaCompilerPostClassPath:
            type: string
            description: The options to append to the Java compiler classpath when compiling Java code.
            x-weblogic-restart-needed: true
          javaCompilerPreClassPath:
            type: string
            description: The options to prepend to the Java compiler classpath when compiling Java code.
            x-weblogic-restart-needed: true
          javaStandardTrustKeyStorePassPhrase:
            type: string
            description: "The password for the Java Standard Trust keystore. This password is defined when the keystore is
              created.\n\nIf empty or null, then the keystore will be opened without a passphrase.\n\nThis attribute is only
              used if KeyStores is CUSTOM_IDENTITY_AND_JAVA_STANDARD_TRUST or DEMO_IDENTITY_AND_DEMO_TRUST.\n\nWhen you get
              the value of this attribute, WebLogic Server does the following:\n\n- Retrieves the value of the `JavaStandardTrustKeyStorePassPhraseEncrypted`
              attribute.\n- \n- Decrypts the value and returns the unencrypted password as a String.\n- \n\nWhen you set the
              value of this attribute, WebLogic Server does the following:\n\n- Encrypts the value.\n- \n- Sets the value
              of the `JavaStandardTrustKeyStorePassPhraseEncrypted` attribute to the encrypted value.\n- \n\nUsing this attribute
              (`JavaStandardTrustKeyStorePassPhrase`) is a potential security risk because the String object (which contains
              the unencrypted password) remains in the JVM's memory until garbage collection removes it and the memory is
              reallocated. Depending on how memory is allocated in the JVM, a significant amount of time could pass before
              this unencrypted data is removed from memory.\n\nInstead of using this attribute, use `JavaStandardTrustKeyStorePassPhraseEncrypted`."
            x-weblogic-restart-needed: true
          javaStandardTrustKeyStorePassPhraseEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: "The encrypted password for the Java Standard Trust keystore. This password is defined when the keystore
              is created.\n\nTo set this attribute, use `weblogic.management.EncryptionHelper.encrypt()` to encrypt the value.
              Then set this attribute to the output of the encrypt() method.\n\nTo compare a password that a user enters with
              the encrypted value of this attribute, go to the same WebLogic Server instance that you used to set and encrypt
              this attribute and use `weblogic.management.EncryptionHelper.encrypt()` to encrypt the user-supplied password.
              Then compare the encrypted values."
          keyStores:
            type: string
            enum:
            - DemoIdentityAndDemoTrust
            - CustomIdentityAndJavaStandardTrust
            - CustomIdentityAndCustomTrust
            - CustomIdentityAndCommandLineTrust
            - DomainKeystores
            description: Which configuration rules should be used for finding the server's identity and trust keystores?
          listenAddress:
            type: string
            description: "The IP address or DNS name this server uses to listen for incoming connections. For example, enter
              `12.34.5.67` or `mymachine`, respectively.\n\nNote that the value you specify for the listen address is not
              the URL to the host machine and it does not include the communication protocol, listen port, or channel.\n\n\
              Servers can be reached through the following URL:\n\n`protocol://listen-address:listen-port`\n\nAny network
              channel that you configure for this server can override this listen address.\n\nIf a server's listen address
              is undefined, clients can reach the server through an IP address of the computer that hosts the server, a DNS
              name that resolves to the host, or the localhost string. The localhost string can be used only for requests
              from clients that are running on the same computer as the server.\n\nIf you want to limit the valid addresses
              for a server instance, specify one of the following:\n\n- \n\nIP address. If you provide an IP address, clients
              can specify either the IP address or a DNS name that maps to the IP address. Clients that specify an IP address
              and attempt to connect through an SSL port must disable hostname verification.\n\n- \n- \n\nDNS name. If you
              provide a DNS name, clients can specify either the DNS name or the corresponding IP address.\n\n- \n\nDo not
              leave the listen address undefined on a computer that uses multiple IP address (a multihomed computer). On such
              a computer, the server will bind to all available IP addresses.\n\nNote also that if you are using the demo
              certificates in a multi-server domain, Managed Server instances will fail to boot if you specify the fully-qualified
              DNS name. For information about this limitation and suggested workarounds, see \"Limitation on CertGen Usage\"\
              \ in Administering Security for Oracle WebLogic Server."
            x-weblogic-restart-needed: true
          listenPort:
            type: integer
            format: int32
            description: "The default TCP port that this server uses to listen for regular (non-SSL) incoming connections.\n\
              \nAdministrators must have the right privileges before binding to a port or else this operation will not be
              successful and it will render the console un-reachable.\n\nIf this port is disabled, the SSL port must be enabled.
              Additional ports can be configured using network channels. The cluster (multicast) port is configured separately."
          listenPortEnabled:
            type: boolean
            description: "Specifies whether this server can be reached through the default plain-text (non-SSL) listen port.\n\
              \nIf you disable this listen port, you must enable the default SSL listen port.\n\nYou can define additional
              listen ports for this server by configuring network channels."
          listenThreadStartDelaySecs:
