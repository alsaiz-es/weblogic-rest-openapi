          replicationPorts:
            type: string
            description: When WLS is running on Exalogic machines, cluster replication traffic could go over multiple 
              replication channels. However multiple replication channels need not be configured on each clustered 
              server instance. Only one replication channel with explicit IP-Address needs to be configured for each 
              server and replicationPorts range can be specified for each server. For eg. range 7001-7010 will create 10
              replication channels with ports 7001 to 7010 for the given server. These channels inherits all the 
              properties of the configured replication channel except the listen port.Names of these channels will be 
              derived from the configured replication channel with suffic {x} added where x could be 1,2.. as per the 
              number of ports specified. Public ports are same as the listen port for these additional channels.
            x-weblogic-restart-needed: true
          resolveDNSName:
            type: boolean
            description: Resolve the listen address to use for all T3 communication
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          restartDelaySeconds:
            type: integer
            format: int32
            description: "The number of seconds the Node Manager should wait before restarting this server.\n\nAfter killing
              a server process, the system might need several seconds to release the TCP port(s) the server was using. If
              Node Manager attempts to restart the Managed Server while its ports are still active, the startup attempt fails.\n\
              \nIf AutoMigration is enabled and RestartDelaySeconds is 0, the RestartDelaySeconds is automatically set to
