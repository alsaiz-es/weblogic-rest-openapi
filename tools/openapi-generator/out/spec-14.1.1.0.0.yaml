            description: "Number of seconds a graceful shutdown operation waits before forcing a shut down. A graceful shutdown
              gives WebLogic Server subsystems time to complete certain application processing currently in progress. If subsystems
              are unable to complete processing within the number of seconds that you specify here, then the server will force
