  ? /management/weblogic/{version}/domainRuntime/serverRuntimes/{serverName}/JMSRuntime/JMSServers/{JMSServerName}/sessionPoolRuntimes/{sessionPoolName}/JMSServer/pauseInsertion
  : post:
      operationId: pauseInsertion__domainRuntime_serverRuntimes__JMSServer_pauseInsertion_592d9014
      tags: *id004
      summary: pauseInsertion on JMSServerRuntime
      description: "Pauses the appearance of any messages on all the destinations of the JMSServer, that are result of the
        in-flight work completion on all the destinations hosted by this JMSServer.\n Definition of In-Flight work\n The definitions
        below are based on the current implementation of WebLogic JMS subsystem.\nIn-flight messages associated with Producers\n\
        \       UN-BORN MESSAGES\nMessages that are produced by the producer, with\n        &quot;birth time&quot; (TimeToDeliver)
        set in\n        future are called un-born messages and are counted\n        as &quot;pending&quot; messages in the
        destination\n        statistics and are not available for consumers yet.\n       UN-COMMITTED MESSAGES\nThese are
        the messages that are produced by the\n        producer as part of the transaction (using either\n        user transaction
        or transacted session) and the\n        transaction is still not committed or rolled back.\n        These messages
        are also counted as &quot;pending&quot;\n        messages in the destination statistics and are not\n        available
        for consumption.\n       QUOTA BLOCKING SEND\nThese are the messages that are produced by the\n         producers
        but are not able reach the destination\n         because of (either message or byte or both) quota\n         limit
        on the destination and the producers are\n         willing to block for a specific period of time for\n         the
        quota to be available. These messages are\n         invisible to the system and are not counted against\n        \
        \ any of the destination statistics.\nIn-flight messages associated with Consumers\n       UN-ACKNOWLEDGED (CLIENT
        ACK PENDING) MESSAGES\nThese are the messages that are successfully\n        consumed by the clients using a &quot;client\n\
        \        acknowledge&quot; session, and are awaiting\n        acknowledgements from the clients. These are\n     \
        \   &quot;pending messages&quot; which will be removed\n        from the destination/system when the acknowledgement\n\
        \        is received.\n       UN-COMMITTED MESSAGES\nThese are the messages that are consumed (received)\n       \
        \ by the clients within a transaction (using either\n        user transaction or transacted session) and the\n   \
        \     transaction is still not committed or rolled back.\n        When the clients successfully commit the transaction\n\
        \        the messages get removed from the system.\n       ROLLED BACK MESSAGES\nThese are the messages that are put
        back on the\n        destination because of a successful rollback of\n        transactional receive by the consumers.
        These messages\n        might or might not be ready for consumption (re-delivered)\n        to the clients immediately,
        depending on the redelivery\n        parameters, RedeliveryDelay and/or RedeliveryDelayOverride\n        and RedeliveryLimit
        configured on the associated\n        JMSConnectionFactory and JMSDestination respectively.\nIf there is a redelivery
        delay configured, then\n        for that &quot;delay&quot; duration, the messages\n        are not available for consumption
        and are counted\n        as &quot;pending&quot; in the destination statistics\n        and after the &quot;delay&quot;
        period, if the redelivery\n        limit is not exceeded, then they are delivered (made\n        available for consumption)
        on that destination and are\n        counted as &quot;current&quot; messages in the\n        destination statistics.
        If the redelivery limit exceeds,\n        then those messages will be moved to the ErrorDestination,\n        if one
        configured.\nAnother parameter that controls the availability of\n        the rolled back messages is RedeliveryLimit.\n\
        \       RECOVERED MESSAGES\nThese messages are similar to ROLLED BACK MESSAGES\n        except that these messages
        appear on the\n        queue because of an explicit call to session\n        &quot;recover&quot; by the client.\n\
        \       REDELIVERED MESSAGES\nThese are again similar to ROLLED BACK MESSAGES\n        except that these messages
        may re-appear on the destination\n        because of an un-successful delivery attempt to the client\n        (consumer
        crash, close etc.)."
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
