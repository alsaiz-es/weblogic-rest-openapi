          type: integer
          format: int32
        messages:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum:
                - SUCCESS
                - INFO
                - WARNING
                - ERROR
                - FAILURE
              message:
                type: string
    HealthSymptom:
      type: object
      description: "A single symptom contributing to a subsystem's health state.\nField set inferred from the `weblogic.health.Symptom`
        Java\nAPI; the REST serialization may downcase the `severity`\nvalues to match the lowercase tokens used elsewhere
        on\n`HealthState`.\n"
      properties:
        severity:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
        cause:
          type: string
          description: Short description of the contributing cause.
        mitigationMessages:
          type: array
          items:
            type: string
        panicMessage:
          type: string
          nullable: true
    HealthState:
      type: object
      description: "Composite health state reported by a subsystem or server. The\n`state` field is the coarse roll-up; `symptoms`
        provides the\nunderlying contributing conditions when available.\n"
      required:
      - state
      properties:
        state:
          type: string
          enum:
          - ok
          - warning
          - critical
          - failed
          - overloaded
          - unknown
          description: "**Quirk — lowercase serialization.** Oracle's\n`weblogic.health.HealthState` Java API documents the
            constants as\n`HEALTH_OK`, `HEALTH_WARN`, `HEALTH_CRITICAL`, `HEALTH_FAILED`,\n`HEALTH_OVERLOADED`, `HEALTH_UNKNOWN`.
            The REST serialization\n**downcases** them to `ok`, `warning`, `critical`, `failed`,\n`overloaded`, `unknown`.
            Note the `WARN` → `warning` expansion.\nVerified on 12.2.1.4 and 14.1.2."
          x-weblogic-quirks:
          - id: healthstate-lowercase
            doc: docs/QUIRKS.md#1-casing-inconsistencies-across-runtimes
        subsystemName:
          type: string
          description: "Name of the subsystem reporting this health state.\n\n**Quirk — null on aggregate health.** When `HealthState`
            is returned\nas the top-level health roll-up of a server (`ServerRuntime.healthState`,\n`overallHealthState`),
            `subsystemName` is **null**. Only when\n`HealthState` is returned for a specific subsystem (e.g. as part of a\n\
            multi-subsystem `health` payload, where each entry names its\nsubsystem) does this field carry a value. Treat
            null as \"this is a\ncomposite/aggregate health, no single subsystem owns it\" rather than\nas an error."
          nullable: true
          x-weblogic-quirks:
          - id: healthstate-subsystemname-null
            doc: docs/QUIRKS.md
        partitionName:
          type: string
          nullable: true
        symptoms:
          type: array
          items:
            $ref: '#/components/schemas/HealthSymptom'
    EditErrorDetail:
      type: object
      required:
      - type
      - title
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
      description: "**Quirk — distinct envelope, namespaced field, version-divergent detail.**\nEdit-session validation failures
        use this richer envelope, distinct\nfrom the standard `ErrorResponse`. The `wls:errorsDetails` field\ncarries one
        or more nested errors. The colon in the property name is\nreal — JSON-valid but unfortunate for clients that auto-generate\n\
        Java/TypeScript/Go types: most generators silently rewrite `:` to\n`_`.\n\nCross-version difference: **WLS 12.2.1.4**
        keeps the fully-qualified\nJava exception class name in each `detail` (e.g.\n`weblogic.management.provider.EditNotEditorException:
        Not edit\nlock owner`). **14.1.2** strips the FQCN and keeps only the\nmessage. Same pattern visible in JDBC validation
        errors.\n\nClients consuming `/edit/` errors must branch on the presence of\n`wls:errorsDetails` to distinguish edit-tree
        errors from the\nstandard `ErrorResponse`. String comparison on `detail` text breaks\nacross versions; either match
        the trailing fragment or normalize."
      x-weblogic-quirks:
      - id: edit-error-envelope-fqcn
        doc: docs/QUIRKS.md#4-edit-tree-validation-errors-use-a-different-envelope
    EditErrorResponse:
      type: object
      description: "Edit-tree validation error envelope. Carries `wls:errorsDetails`\nwith one or more nested errors. Distinct
        from `ErrorResponse`.\n\n**Quirk — distinct envelope, namespaced field, version-divergent detail.**\nEdit-session
        validation failures use this richer envelope, distinct\nfrom the standard `ErrorResponse`. The `wls:errorsDetails`
        field\ncarries one or more nested errors. The colon in the property name is\nreal — JSON-valid but unfortunate for
        clients that auto-generate\nJava/TypeScript/Go types: most generators silently rewrite `:` to\n`_`.\n\nCross-version
        difference: **WLS 12.2.1.4** keeps the fully-qualified\nJava exception class name in each `detail` (e.g.\n`weblogic.management.provider.EditNotEditorException:
        Not edit\nlock owner`). **14.1.2** strips the FQCN and keeps only the\nmessage. Same pattern visible in JDBC validation
        errors.\n\nClients consuming `/edit/` errors must branch on the presence of\n`wls:errorsDetails` to distinguish edit-tree
        errors from the\nstandard `ErrorResponse`. String comparison on `detail` text breaks\nacross versions; either match
        the trailing fragment or normalize."
      required:
      - status
      - title
      properties:
        status:
          type: integer
          format: int32
        type:
          type: string
          format: uri
        title:
          type: string
        wls:errorsDetails:
          type: array
          items:
            $ref: '#/components/schemas/EditErrorDetail'
      x-weblogic-quirks:
      - id: edit-error-envelope-fqcn
        doc: docs/QUIRKS.md#4-edit-tree-validation-errors-use-a-different-envelope
