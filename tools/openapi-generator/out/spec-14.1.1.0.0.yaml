    ThreadPoolRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This bean is used to monitor the self-tuning queue
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          completedRequestCount:
            type: integer
            format: int64
            description: The number of completed requests in the priority queue.
            readOnly: true
          executeThreadIdleCount:
            type: integer
            format: int32
            description: The number of idle threads in the pool. This count does not include standby threads and stuck 
              threads. The count indicates threads that are ready to pick up new work when it arrives
            readOnly: true
          executeThreadTotalCount:
            type: integer
            format: int32
            description: The total number of threads in the pool.
            readOnly: true
          healthState:
            allOf:
            - $ref: '#/components/schemas/HealthState'
            description: The health state of this pool.
            readOnly: true
          hoggingThreadCount:
            type: integer
            format: int32
            description: The threads that are being held by a request right now. These threads will either be declared 
              as stuck after the configured timeout or will return to the pool before that. The self-tuning mechanism 
              will backfill if necessary.
            readOnly: true
          minThreadsConstraintsCompleted:
            type: integer
            format: int64
            description: Number of requests with min threads constraint picked up out of order for execution immediately
              since their min threads requirement was not met. This does not include the case where threads are idle 
              during schedule.
            readOnly: true
          minThreadsConstraintsPending:
            type: integer
            format: int32
            description: Number of requests that should be executed now to satisfy the min threads requirement.
            readOnly: true
          overloadRejectedRequestsCount:
            type: integer
            format: int32
            description: Number of requests rejected due to configured Shared Capacity for work managers have been 
              reached.
            readOnly: true
          pendingUserRequestCount:
            type: integer
            format: int32
            description: The number of pending user requests in the priority queue. The priority queue contains requests
              from internal subsystems and users. This is just the count of all user requests.
            readOnly: true
          queueLength:
            type: integer
            format: int32
            description: The number of pending requests in the priority queue. This is the total of internal system 
              requests and user requests.
            readOnly: true
          sharedCapacityForWorkManagers:
            type: integer
            format: int32
            description: Maximum amount of requests that can be accepted in the priority queue. Note that a request with
              higher priority will be accepted in place of a lower priority request already in the queue even after the 
              threshold is reached. The lower priority request is kept waiting in the queue till all high priority 
              requests are executed. Also note that further enqueues of the low priority requests are rejected right 
              away.
            readOnly: true
          standbyThreadCount:
            type: integer
            format: int32
            description: The number of threads in the standby pool. Threads that are not needed to handle the present 
              work load are designated as standby and added to the standby pool. These threads are activated when more 
              threads are needed.
            readOnly: true
          stuckThreadCount:
            type: integer
            format: int32
            description: Number of stuck threads in the thread pool.
            readOnly: true
          suspended:
            type: boolean
            description: Indicates if the RequestManager is suspended. A suspended manager will not dequeue work and 
              dispatch threads till it is resumed.
            readOnly: true
          throughput:
            type: number
            format: double
            description: The mean number of requests completed per second.
            readOnly: true
      description: This bean is used to monitor the self-tuning queue
    JVMRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: "Provides methods for retrieving information about the Java Virtual Machine (JVM) within with the current
          server instance is running. You cannot change the JVM's operating parameters while the JVM is active. Instead, use
          the startup options that are described in the JVM's documentation.\n\nThe WebLogic JVM contains only one of these
          Runtime MBeans:\n\n- \n\nIf the JVM is an instance of a JRockit JDK, then the JVM contains `JRockitRuntime MBean`.\n\
          \n- \n- \n\nOtherwise, it contains the `JVMRuntimeMBean`.\n\n-"
        properties:
          name:
            type: string
            description: The name of this configuration. WebLogic Server uses an MBean to implement and persist the 
              configuration.
            readOnly: true
          type:
            type: string
            description: Returns the type of the MBean.
            readOnly: true
          heapFreeCurrent:
            type: integer
            format: int64
            description: The current amount of memory (in bytes) that is available in the JVM heap.
            readOnly: true
          heapFreePercent:
            type: integer
            format: int32
            description: Percentage of the maximum memory that is free.
            readOnly: true
          heapSizeCurrent:
            type: integer
            format: int64
            description: The current size (in bytes) of the JVM heap.
            readOnly: true
          heapSizeMax:
            type: integer
            format: int64
            description: The maximum free memory configured for this JVM.
            readOnly: true
          javaVMVendor:
            type: string
            description: "Returns the vendor of the JVM.\n\nThe vendor of the JVM that this server runs.\n\nsystem property
              java.vm.vendor is returned"
            readOnly: true
          javaVendor:
            type: string
            description: "Returns the vendor of Java.\n\nThe vendor of Java that this server runs."
            readOnly: true
          javaVersion:
            type: string
            description: The Java version of the JVM.
            readOnly: true
          OSName:
            type: string
            description: "Returns the operating system on which the JVM is running.\n\nThe operating system on which the JVM
              is running.\n\n**Quirk — non-camelCase property name.** The WLS REST projection\nkeeps the uppercase `OS` prefix
              on these two fields, against the\nrest of the API which would have spelled them `osName` /\n`osVersion`. Clients
              that auto-lowercase JSON keys (some JS\nhelpers, some Go libraries) will not find them under the\n\"expected\"\
              \ names."
            readOnly: true
            x-weblogic-quirks:
            - id: jvm-os-prefix-uppercase
              doc: docs/QUIRKS.md#1-casing-inconsistencies-across-runtimes
          OSVersion:
            type: string
            description: "The version of the operating system on which the JVM is running.\n\n**Quirk — non-camelCase property
              name.** The WLS REST projection\nkeeps the uppercase `OS` prefix on these two fields, against the\nrest of the
              API which would have spelled them `osName` /\n`osVersion`. Clients that auto-lowercase JSON keys (some JS\n\
              helpers, some Go libraries) will not find them under the\n\"expected\" names."
            readOnly: true
            x-weblogic-quirks:
            - id: jvm-os-prefix-uppercase
              doc: docs/QUIRKS.md#1-casing-inconsistencies-across-runtimes
          threadStackDump:
            type: string
            description: "JVM thread dump. Thread dump is available only on 1.5 VM\n\n**Quirk — payload size.** Despite the
              field name, this is a complete\n`Thread.dumpAllStacks()`-style multi-line text dump of every JVM\nthread. We
              measured ~108 KB on a busy 12.2.1.4 OSB server and\n~53 KB on an idle 14.1.2 AdminServer.\n\nOn busy servers
              it can exceed 100 KB and produces noticeable HTTP\nlatency. Polling `JVMRuntime` at default field set on an\n\
              AdminServer monitoring many managed servers can produce >MB of\nmonitoring traffic per cycle.\n\n**Always exclude
              this field from monitoring polls.** Recommended\nidiom:\n\n- `?excludeFields=threadStackDump&links=none`, or\n\
              - `?fields=heapFreeCurrent,heapSizeCurrent,uptime,javaVersion,...`\n  (allow-list)."
            readOnly: true
            x-weblogic-large-payload: true
            x-weblogic-recommended-exclude: true
            x-weblogic-quirks:
            - id: jvm-threadstackdump-size
              doc: docs/QUIRKS.md#9-jvmruntimethreadstackdump-payload-size
          uptime:
            type: integer
            format: int64
            description: The number of milliseconds that the Virtual Machine has been running.
            readOnly: true
      description: "Provides methods for retrieving information about the Java Virtual Machine (JVM) within with the current
        server instance is running. You cannot change the JVM's operating parameters while the JVM is active. Instead, use
        the startup options that are described in the JVM's documentation.\n\nThe WebLogic JVM contains only one of these
        Runtime MBeans:\n\n- \n\nIf the JVM is an instance of a JRockit JDK, then the JVM contains `JRockitRuntime MBean`.\n\
        \n- \n- \n\nOtherwise, it contains the `JVMRuntimeMBean`.\n\n-"
    JDBCServiceRuntime:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        description: This class is used for monitoring a WebLogic JDBC service. It maps to a JDBCResource JMO.
        properties:
          name:
            type: string
