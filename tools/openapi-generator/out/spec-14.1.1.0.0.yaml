  /management/weblogic/{version}/domainRuntime/search:
    post:
      operationId: searchDomainRuntime
      tags:
      - domainRuntime
      summary: Bulk-fetch a tree slice of runtime beans in one request.
      description: "Accepts a `BulkSearchRequest` body describing the desired tree\nshape and answers with a JSON document
        that mirrors the request\nstructure, populated with the requested fields. Allows a single\nrequest to harvest many
        runtime values that would otherwise\nrequire N separate REST round-trips.\n\n### Body shape (verified)\n\n- `fields`
        — array of property names to read on the current\n  node. Unknown property names are silently ignored.\n- `links`
        — array of link relation names to keep in the response.\n  Pass `[]` to suppress the HATEOAS `links` array on this
        node\n  entirely. **Must be an array** — passing the string `\"none\"`\n  (which is valid as a query parameter on
        GET) returns `400`\n  with detail `The property 'links' must be an array.`\n- `children` — object whose keys are child
        collection or\n  singleton names (e.g. `serverRuntimes`, `threadPoolRuntime`)\n  and whose values are themselves `BulkSearchRequest`
        nodes.\n  Recursive to arbitrary depth.\n- `name` — when used inside a `children.<collection>` node,\n  restricts
        the collection to the listed instance names.\n\nTop-level keys not listed above are silently ignored.\n\n### Response
        shape\n\nMirrors the request: each requested child appears as either a\nsingle object (when targeting a singleton
        MBean such as\n`threadPoolRuntime`) or an `{\"items\": [...]}` envelope (when\ntargeting a collection such as `serverRuntimes`).
        The fields\nlisted in `fields` populate each node, and any `links` array\nrequested is appended at the same level.\n\
        \n### Failure modes (verified, WLS 14.1.2)\n\n| Condition | HTTP | Body |\n|---|---|---|\n| No `X-Requested-By` header
        | 400 | `Bad Request` (text/html) |\n| Wrong content type | 415 | `Unsupported Media Type` |\n| GET instead of POST
        | 405 | RFC-7807-style JSON error |\n| `/management/wls/latest/...` namespace | 404 | `Not Found` |\n| Invalid JSON
        body | 400 | `Bad Request` (text/html) |\n| `\"links\": \"none\"` (string) | 400 | RFC-7807 JSON: `must be an array`
        |\n"
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSearchRequest'
            examples:
              empty:
                summary: Empty body — returns the full domainRuntime root with HATEOAS links.
                value: {}
              serversBasic:
                summary: Names and states of every running server.
                value:
                  fields: []
                  links: []
                  children:
                    serverRuntimes:
                      fields:
                      - name
                      - state
                      links: []
              serversWithThreadPool:
                summary: Server state plus thread pool counters in one call.
                value:
                  fields: []
                  links: []
                  children:
                    serverRuntimes:
                      fields:
                      - name
                      - state
                      links: []
                      children:
                        threadPoolRuntime:
                          fields:
                          - executeThreadTotalCount
                          - hoggingThreadCount
                          - stuckThreadCount
                          links: []
      responses:
        '200':
          description: Tree slice mirroring the request structure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSearchResponse'
        '400':
          description: "Returned for two distinct reasons. **`text/html` body\ncontaining `Bad Request`**: the CSRF check
            or JSON parser\nrejected the request before it reached the DSL validator —\nmost commonly because the `X-Requested-By`
            header is\nmissing. **RFC-7807 JSON body**: the DSL validator rejected\na value (e.g. `links` was not an array).\n"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/html:
              schema:
                type: string
                description: Plain `Bad Request` page; rejection happened before DSL validation.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          description: Wrong HTTP method (only POST is accepted).
        '415':
          description: Unsupported `Content-Type` (only `application/json` is accepted).
