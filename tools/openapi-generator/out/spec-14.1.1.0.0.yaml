                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/JDBCSystemResource'
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/Link'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createJDBCSystemResource__edit_JDBCSystemResources
      tags:
      - edit
      summary: Create JDBCSystemResource
      description: "Create a new `JDBCSystemResource` resource within this collection. Requires `X-Requested-By`.\n\n**Quirk
        — non-fatal `400`, parent created, staged-create required.**\nThe minimal create call (`{\"name\": \"<unique>\"}`)
        returns\n`400 Bad Request` with a detail like\n`JDBCDataSource: Name cannot be null` — but **the parent shell\nJDBCSystemResource
        is registered in the edit session anyway**. A\nsubsequent `GET /edit/JDBCSystemResources/<unique>` returns 200\nwith
        the 15-field shell.\n\nPosting the full nested tree (`{\"name\": ..., \"JDBCResource\":\n{...}}`) returns the same
        400 with the same partial-create. The\nnested fields are silently ignored at this level.\n\nThe reliable workflow
        is **staged**:\n\n1. `POST /edit/JDBCSystemResources {\"name\": \"<unique>\"}` — accept\n   the 400.\n2. `POST /edit/JDBCSystemResources/<unique>/JDBCResource\n\
        \   {\"name\": \"<unique>\"}`.\n3. `POST .../JDBCResource/JDBCDataSourceParams {...}`.\n4. `POST .../JDBCResource/JDBCDriverParams
        {...}`.\n5. `POST .../JDBCResource/JDBCConnectionPoolParams {...}`.\n6. Set `targets` on the parent or via the dedicated
        subresource.\n7. `activate` the change session.\n\nEach sub-resource POST returns `200 {}` cleanly. Treating the\n\
        initial 400 as fatal causes clients to delete the partial parent\nand retry, producing the same 400 in a loop.\n\n\
        Cross-version detail: WLS 12.2.1.4 carries the FQCN of the\nvalidation exception in the `detail` (e.g.\n`weblogic.management.provider.EditNotEditorException:
        ...`).\n14.1.2 strips the FQCN and keeps only the message."
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JDBCSystemResource'
      responses:
        '201':
          description: '`JDBCSystemResource` created.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JDBCSystemResource'
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-weblogic-staged-create: true
      x-weblogic-non-fatal-status: 400
      x-weblogic-quirks:
      - id: jdbc-systemresources-400-staged-create
        doc: docs/QUIRKS.md#6-post-editjdbcsystemresources-always-returns-http-400
