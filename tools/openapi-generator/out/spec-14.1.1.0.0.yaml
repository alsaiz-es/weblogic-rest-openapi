      description: "Stub schema for `ServerLifeCycleTaskRuntime`. Full schema not yet generated; expand coverage via Phase
        4e by adding the source MBean to `tools/openapi-generator/src/phase4b_runner.py:TARGETS`.\n\n**Quirk — every lifecycle
        action returns this task envelope, even when\nit completes synchronously.** `start`, `suspend`, `resume`,\n`forceSuspend`,
        `shutdown`, `forceShutdown`, `startInAdmin`,\n`startInStandby` all return a populated\n`ServerLifeCycleTaskRuntime`
        JSON object describing the job — not\nan empty `200`. Even ~35 ms operations follow the async-job\nprotocol; `taskStatus:
        \"TASK COMPLETED\"` and `completed: true`\nappear synchronously in the response on success.\n\nFailures are reported
        via `taskError` (non-null), **not via HTTP\nstatus**. A misbehaving NodeManager returns `200` with a non-null\n`taskError`
        carrying the wrapped exception. Clients should not\ntreat the HTTP code alone as success/failure for lifecycle calls;\n\
        inspect `taskStatus` / `taskError`.\n\n`suspend` requests are internally recorded as `suspendWithTimeout`\nregardless
        of whether the body included a timeout. The `tasks`\ncollection child of each lifecycle runtime accumulates the\n\
        history of all past invocations. Verified on WLS 12.2.1.4 and\n14.1.2 with identical 18-field shape."
      x-stub: true
