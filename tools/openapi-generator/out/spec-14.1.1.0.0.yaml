  /management/weblogic/{version}/domainRuntime/serverRuntimes:
    get:
      operationId: listServerRuntime__domainRuntime_serverRuntimes
      tags:
      - domainRuntime
      summary: List ServerRuntime
      description: "List all `ServerRuntimes` resources in this collection.\n\n**Quirk — selective CSRF gate on this read
        endpoint.** Oracle's\ndocs state that `X-Requested-By` is required only on mutating\nmethods. On this collection it
        is also required for GET — but\n**only when at least one managed server is in `RUNNING` state**.\nWith only the AdminServer
        up and no managed servers running, the\nsame anonymous GET returns `200`. Once any managed server reaches\nRUNNING,
        anonymous calls return `400 Bad Request` (JSON envelope\nwith no useful detail).\n\nOf the eight `/domainRuntime/*`
        endpoints we probed\n(`serverRuntimes`, `migrationDataRuntimes`, `nodeManagerRuntimes`,\n`serviceMigrationDataRuntimes`,
        `serverLifeCycleRuntimes`,\n`systemComponentLifeCycleRuntimes`, plus the `/domainRuntime`\nroot and the `JNDI` singleton),
        **only this one** enforces the\nheader. We have not found any Oracle documentation calling this\nout.\n\nWorkarounds
        when the header cannot be sent: fetch each server by\nname (`/domainRuntime/serverRuntimes/{serverName}` is unaffected),\n\
        or use `POST /domainRuntime/search` with a `serverRuntimes` child\n(which always requires `X-Requested-By` per the
        standard CSRF\nguard)."
      parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - $ref: '#/components/parameters/FieldsParam'
      - $ref: '#/components/parameters/ExcludeFieldsParam'
      - $ref: '#/components/parameters/LinksParam'
      - $ref: '#/components/parameters/ExcludeLinksParam'
      - $ref: '#/components/parameters/XRequestedByHeader'
      responses:
        '200':
          description: Collection of `ServerRuntime`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerRuntime'
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/Link'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-weblogic-conditional-csrf:
        header: X-Requested-By
        condition: at-least-one-managed-server-in-RUNNING-state
      x-weblogic-quirks:
      - id: csrf-serverRuntimes
        doc: docs/QUIRKS.md#2-selective-x-requested-by-enforcement-on-get-domainruntimeserverruntimes
