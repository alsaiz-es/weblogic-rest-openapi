            x-weblogic-restart-needed: true
          loginTimeoutMillis:
            type: integer
            format: int32
            description: "The login timeout for this server's default regular (non-SSL) listen port. This is the maximum amount
              of time allowed for a new connection to establish.\n\nA value of `0` indicates there is no maximum."
          machine:
            type: array
            items:
              type: string
            description: "The WebLogic Server host computer (machine) on which this server is meant to run.\n\nIf you want
              to use Node Manager to start this server, you must assign the server to a machine and you must configure the
