          defaultIIOPPasswordEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: "The encrypted password for the default IIOP user.\n\nTo set this attribute, use `weblogic.management.EncryptionHelper.encrypt()`
              to encrypt the value. Then set this attribute to the output of the encrypt() method.\n\nTo compare a password
              that a user enters with the encrypted value of this attribute, go to the same WebLogic Server instance that
              you used to set and encrypt this attribute and use `weblogic.management.EncryptionHelper.encrypt()` to encrypt
              the user-supplied password. Then compare the encrypted values."
            x-weblogic-restart-needed: true
          defaultIIOPUser:
            type: string
            description: The user name of the default IIOP user. (Requires you to enable IIOP.)
            x-weblogic-restart-needed: true
          defaultInternalServletsDisabled:
            type: boolean
            description: "Specifies whether all default servlets in the servlet engine are disabled.\n\nThis includes: weblogic.servlet.ClasspathServlet
              weblogic.servlet.utils.iiop.GetIORServlet weblogic.rjvm.http.TunnelSendServlet weblogic.rjvm.http.TunnelRecvServlet
              weblogic.rjvm.http.TunnelLoginServlet weblogic.rjvm.http.TunnelCloseServlet If set to true, this property overrides
              the ClasspathServletDisabled property."
            x-weblogic-restart-needed: true
          defaultTGIOPPassword:
            type: string
            description: "The password for the default user associated with the Tuxedo GIOP (TGIOP) protocol. (Requires you
              to configure WebLogic Tuxedo Connector (WTC) for this server.)\n\nAs of 8.1 sp4, when you get the value of this
              attribute, WebLogic Server does the following:\n\n- Retrieves the value of the `DefaultTGIOPPasswordEncrypted`
              attribute.\n- \n- Decrypts the value and returns the unencrypted password as a String.\n- \n\nWhen you set the
              value of this attribute, WebLogic Server does the following:\n\n- Encrypts the value.\n- \n- Sets the value
              of the `DefaultTGIOPPasswordEncrypted` attribute to the encrypted value.\n- \n\nUsing this attribute (`DefaultTGIOPPassword`)
              is a potential security risk in because the String object (which contains the unencrypted password) remains
              the JVM's memory until garbage collection removes it and the memory is reallocated. Depending on how memory
              is allocated in the JVM, a significant amount of time could pass before this unencrypted data is removed from
              memory.\n\nInstead of using this attribute, use `DefaultTGIOPPasswordEncrypted`."
            x-weblogic-restart-needed: true
          defaultTGIOPPasswordEncrypted:
            type: array
            items:
              type: integer
              format: int32
            description: "The encrypted password for the default TGIOP user.\n\nTo set this attribute, use `weblogic.management.EncryptionHelper.encrypt()`
              to encrypt the value. Then set this attribute to the output of the encrypt() method.\n\nTo compare a password
              that a user enters with the encrypted value of this attribute, go to the same WebLogic Server instance that
              you used to set and encrypt this attribute and use `weblogic.management.EncryptionHelper.encrypt()` to encrypt
              the user-supplied password. Then compare the encrypted values."
            x-weblogic-restart-needed: true
          defaultTGIOPUser:
            type: string
            deprecated: true
            description: "The default user associated with the Tuxedo GIOP (TGIOP) protocol. (Requires you to configure WebLogic
              Tuxedo Connector (WTC) for this server.)\n\n_Deprecated_: 12.2.1.3.0"
            x-weblogic-restart-needed: true
          externalDNSName:
            type: string
            description: "The external IP address or DNS name for this server.\n\nThis address will be sent with HTTP session
              cookies and with dynamic server lists to HTTP proxies. It will also be used by external application clients
              to enable the propagation of RMI traffic through network address translating (NAT) firewalls.\n\nYou must specify
              an external DNS name for configurations in which a firewall is performing network address translation, unless
              clients are accessing WebLogic Server using t3 and the default channel. For example, define the external DNS
              name for configurations in which a firewall is performing network address translation, and clients are accessing
              WebLogic Server using HTTP via a proxy plug-in."
            x-weblogic-restart-needed: true
            x-weblogic-redeploy-needed: true
          extraEjbcOptions:
            type: string
            description: "The options passed to the EJB compiler during server-side generation.\n\nEach EJB component can
              override the compiler options that you specify here. The following options are valid:\n\n-forcegeneration Forces
              generation of wrapper classes. Without this flag the classes may not be regenerated if it is determined to be
              unnecessary. -disableHotCodeGen Generate ejb stub and skel as part of ejbc. Avoid HotCodeGen to have better
              performance. -keepgenerated Keep the generated .java files. -compiler javac Java compiler to exec. If not specified,
              the -compilerclass option will be used. -compilerclass com.sun.tools.javac.Main Specifies the compiler class
              to invoke. -g Compile debugging info into class file. -normi Passed through to Symantec's sj. -classpath path
              Classpath to use. -source source Source version. -Joption Flags passed through to java runtime."
            x-weblogic-restart-needed: true
          extraRmicOptions:
            type: string
            description: "The options passed to the RMIC compiler during server-side generation.\n\nEach EJB component can
