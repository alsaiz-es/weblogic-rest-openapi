openapi: 3.0.3
info:
  title: WebLogic REST Management API — Generated Specification (14.1.1.0.0)
  description: "Generated OpenAPI 3.0 specification for WebLogic Server 14.1.1.0.0.\n\nSchemas are derived mechanically from
    Oracle's WebLogic Remote Console harvested MBean YAMLs ([weblogic-remote-console](https://github.com/oracle/weblogic-remote-console),
    UPL 1.0). UI overlays from the same source provide enums and read-only hints; the rest of the structure is computed from
    JMX containment.\n\nThis is a Phase 4d-1 build: generated paths, generated schemas, and a minimal envelope/error overlay.
    Quirks documentation, curated descriptions, live samples, sub-type discriminators, enum extraction, and surface curation
    are pending in PHASE4D2 through PHASE4D5.\n\n**Tooling**: `tools/openapi-generator/` (Python + uv, ruamel.yaml, openapi-spec-validator).
    Branch: `feat/openapi-generator`.\n\n**Cross-bean note — `name` is not a single concept.** WebLogic's\nREST projection
    exposes a `name` field on virtually every bean,\ninherited from `WebLogicMBean.Name`. The semantics differ:\n\n- On a
    **runtime** bean (e.g. `ServerRuntime`, `ApplicationRuntime`),\n  `name` is the instance identifier as the running domain
    knows it\n  — typically the configured name plus, in some cases, a partition\n  or version suffix.\n- On an **edit/config**
    bean (e.g. `Server`, `Cluster`,\n  `JDBCSystemResource`), `name` is the URL key — the path segment\n  used to address
    the resource, and what the runtime later\n  reports back. Setting it is a CREATE-only operation; updates\n  against `/edit/<collection>/{name}`
    use the existing identifier.\n- On a **task** bean (e.g. `LifecycleTaskResponse`,\n  `JDBCDataSourceTaskRuntime`), `name`
    is a synthesized job key\n  such as `_<n>_<operation>` — informative for log correlation,\n  not a stable identifier across
    restarts.\n\nA few beans further override `name` with a derived value (channel\nruntimes use `channelName` as the canonical
    field but still emit\n`name`). When in doubt, prefer the most specific field\n(`channelName`, `serverName`, `componentName`,
    …) over the inherited\n`name`.\n\n**Universal — `X-Requested-By` on mutations.** Every mutating\nrequest to the WebLogic
    REST API (POST, PUT, DELETE on `/edit/*`,\nPOST to `/domainRuntime/serverLifeCycleRuntimes/<server>/<action>`,\nPOST to
    `/domainRuntime/search`) requires the `X-Requested-By`\nrequest header. Any non-empty value is accepted; clients\ntypically
    send their product name or version\n(`X-Requested-By: openapi-generator`, `X-Requested-By: ansible`,\netc.). Without the
    header, the server returns `400 Bad Request`\nwith a plain-text body and no JSON diagnostic.\n\nThe header is also conditionally
    required on a single GET endpoint\n(`/domainRuntime/serverRuntimes` — see the `csrf-serverRuntimes`\nquirk)."
  version: 14.1.1.0.0
  contact:
    name: weblogic-rest-openapi (unofficial)
    url: https://github.com/alsaiz-es/weblogic-rest-openapi
  license:
    name: Apache-2.0 (generator + overlays); UPL-1.0 (harvested schemas)
    url: https://www.apache.org/licenses/LICENSE-2.0
  x-quirks-global:
  - name-semantics-vary
  - csrf-on-mutations
  x-weblogic-csrf-header: X-Requested-By
servers:
- url: http://{host}:{port}
  description: WebLogic Administration Server (HTTP).
  variables:
    host:
      default: localhost
    port:
      default: '7001'
- url: https://{host}:{port}
  description: WebLogic Administration Server (HTTPS).
  variables:
    host:
      default: localhost
    port:
      default: '7002'
security:
- basicAuth: []
tags:
- name: domainRuntime
  description: Read-only domain-wide runtime monitoring (`/domainRuntime`).
- name: lifecycle
  description: Server lifecycle actions (start, suspend, shutdown, …).
- name: edit
  description: Edit-tree configuration mutations (`/edit`). Wrap mutations between `startEdit` and `activate`.
- name: change-manager
  description: 'Edit-session lifecycle: `startEdit`, `activate`, `cancelEdit`, `safeResolve`, `forceResolve`.'
