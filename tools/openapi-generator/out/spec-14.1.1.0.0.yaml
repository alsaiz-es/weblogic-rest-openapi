  parameters:
    VersionPathParam:
      name: version
      in: path
      required: true
      description: WebLogic REST API version segment.
      schema:
        type: string
        enum:
        - latest
        - 15.1.1.0.0
        - 14.1.2.0.0
        - 14.1.1.0.0
        - 12.2.1.4.0
        - 12.2.1.3.0
        default: latest
    FieldsParam:
      name: fields
      in: query
      required: false
      description: Comma-separated list of property names to include in the response.
      schema:
        type: string
      example: name,state,healthState
    ExcludeFieldsParam:
      name: excludeFields
      in: query
      required: false
      description: Comma-separated list of property names to omit from the response.
      schema:
        type: string
    LinksParam:
      name: links
      in: query
      required: false
      description: "Comma-separated list of `rel` names to include in the response `links`.\nUse `none` to suppress all links.\n"
      schema:
        type: string
    ExcludeLinksParam:
      name: excludeLinks
      in: query
      required: false
      description: Comma-separated list of `rel` names to omit from the response `links`.
      schema:
        type: string
    XRequestedByHeader:
      name: X-Requested-By
      in: header
      required: true
      description: "CSRF guard. Any non-empty value is accepted. Without it, mutating\nrequests return `400 Bad Request`.
        The header is also conditionally\nrequired on `GET /domainRuntime/serverRuntimes` when at least one\nmanaged server
        is RUNNING (documented in the quirks overlay).\n"
      schema:
        type: string
        minLength: 1
      example: openapi-generator
  responses:
    Unauthorized:
      description: Authentication failed or absent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Bean not found at this path.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    EditError:
      description: Edit-tree validation or precondition error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EditErrorResponse'
  headers: {}
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: "WebLogic administration user credentials. The user must have at least\nthe `Monitor` role for GET operations;
        `Operator`, `Deployer`, or\n`Admin` are required for lifecycle and edit operations.\n"
