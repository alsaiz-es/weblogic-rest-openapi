id: startedit-idempotent
title: "POST /edit/changeManager/startEdit is idempotent for the current lock owner"
applies_to_versions:
  - "12.2.1.3.0"
  - "12.2.1.4.0"
  - "14.1.1.0.0"
  - "14.1.2.0.0"
  - "15.1.1.0.0"
attachments:
  - type: path
    path: "/edit/changeManager/startEdit"
    method: post
inject:
  description_append: |
    **Quirk — idempotent for the existing owner.** Calling `startEdit`
    while you already hold the lock is **not** an error; it returns
    `200 {}` and leaves the session in the same state. The intuitive
    REST semantics for a "lock acquire" would be `409 Conflict` or
    `423 Locked`; WLS does not enforce that for the same owner.

    Operational benefit: clients that crash mid-session can re-acquire
    cleanly. A finally-clause cleanup of `startEdit → cancelEdit →
    done` is safe regardless of prior state.

    The documented `safeResolve` / `forceResolve` operations are still
    needed when **another** user has activated changes underneath you
    — that scenario manifests as `mergeNeeded: true` on the session
    state. Cross-user contention (a different user trying to
    `startEdit` while another holds the lock) is presumed to collide
    and was not verified.
  x_extensions:
    x-weblogic-idempotent-for-owner: true
external_doc: docs/QUIRKS.md#5-startedit-is-idempotent
