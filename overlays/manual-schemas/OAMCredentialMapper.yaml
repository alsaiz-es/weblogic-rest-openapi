schema: OAMCredentialMapper
description: |
  Credential mapper that maps a WLS-authenticated identity to the
  credentials needed by an OAM-protected resource. Used by
  applications that initiate calls into OAM-fronted backends and
  need to forward an OAM token for the calling user.
sources:
  - "Oracle Fusion Middleware Securing Oracle WebLogic Server (credential mapping)."
  - "Oracle Access Manager Administrator's Guide."
properties:
  description:
    type: string
    nullable: true
  version:
    type: string
    nullable: true
  credentialMappingDeploymentEnabled:
    type: boolean
    description: |
      When true, application deployments may carry credential
      mappings in their descriptor and have them imported into this
      provider on deploy.
  userPasswordCredentialMappingDeploymentEnabled:
    type: boolean
    description: Per-user password mappings allowed in deployment descriptors.
