# Virtual operations — REST endpoints that have no MBean in harvested.
# Currently only the change-manager surface lives here. The schemas
# (ChangeManagerState, ChangeManagerLockOwner-like fields) are also
# defined in this file because they have no harvested counterpart.
#
# Consumed by the generator orchestrator. The structure mirrors
# OpenAPI 3.0 components/paths so the orchestrator can splice it in
# directly under each tree's root.

components:
  schemas:
    BulkSearchRequest:
      type: object
      description: |
        Recursive description of a tree slice. Every node may carry
        `fields`, `links`, and `children`. Inside `children.<X>`,
        when `<X>` is a collection, `name` may filter to a subset.
      properties:
        fields:
          type: array
          description: Property names to read on this node. Unknown names are silently ignored.
          items:
            type: string
          example: [name, state]
        links:
          type: array
          description: |
            Link relation names to keep in the `links` array of this
            node's response. Pass `[]` to suppress all links on this
            node. **Must be an array** even when empty — the string
            `"none"` (valid on GET) is rejected here.
          items:
            type: string
          example: []
        children:
          type: object
          description: |
            Map of child collection or singleton names to nested
            `BulkSearchRequest` nodes. Recursive to arbitrary depth.
          additionalProperties:
            $ref: '#/components/schemas/BulkSearchRequest'
        name:
          type: array
          description: |
            Restricts a `children.<collection>` node to instances
            with these names. Has no observed effect at the root
            node — only inside a child collection.
          items:
            type: string

    BulkSearchResponse:
      type: object
      description: |
        Mirror of the request structure populated with values.
        Each child collection appears as `{ "items": [...] }`;
        each child singleton appears as a plain object. The shape
        is structural — no fixed property set is enforced because
        it depends entirely on which fields and children the
        request asked for.
      additionalProperties: true

    WLDFLogRecordSearchRequest:
      type: object
      description: |
        Time-windowed log-record query. `since` and `until` are ISO-8601
        timestamps; either may be omitted (open window). `limit` caps the
        number of records returned in this page.
      properties:
        since:
          type: string
          format: date-time
        until:
          type: string
          format: date-time
        limit:
          type: integer
          minimum: 0
          description: Maximum number of records to return in this page.
      required:
        - limit

    WLDFLogRecord:
      type: object
      description: |
        One log-record row from a `WLDFDataAccessRuntime` archive.

        **Property names are uppercase** — they mirror the WLDF
        column projection at the data-access layer, not the camelCase
        envelope WLS uses elsewhere. All fields are nullable: a given
        archive type (server log, http access log, harvested data store)
        only populates the columns it has.
      properties:
        RECORDID:
          type: integer
          format: int64
          nullable: true
        TIMESTAMP:
          nullable: true
          description: |
            Epoch milliseconds (UTC).

            **Type varies by version.** WLS 14.1.x and 15.1.x return
            this column as a JSON **integer**; WLS 12.2.1.x returns it
            as a JSON **string of digits** (e.g. `"1777669371498"`).
            Consumers must coerce to a number before using it as a
            timestamp.
          oneOf:
            - type: integer
              format: int64
            - type: string
              pattern: '^[0-9]+$'
        DATE:
          type: string
          nullable: true
        SEVERITY:
          type: string
          nullable: true
        SEVERITY_VALUE:
          type: integer
          nullable: true
        SUBSYSTEM:
          type: string
          nullable: true
        MACHINE:
          type: string
          nullable: true
        SERVER:
          type: string
          nullable: true
        THREAD:
          type: string
          nullable: true
        USERID:
          type: string
          nullable: true
        TXID:
          type: string
          nullable: true
        CONTEXTID:
          type: string
          nullable: true
        MSGID:
          type: string
          nullable: true
        MESSAGE:
          type: string
          nullable: true
        SUPP_ATTRS:
          type: string
          nullable: true
        RID:
          type: string
          nullable: true
      additionalProperties: true

    WLDFLogRecordSearchResponse:
      type: object
      description: |
        Page of records plus a forward cursor. `nextRecordId` is `null`
        when the page reached the tail of the archive within the window.
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/WLDFLogRecord'
        nextRecordId:
          type: integer
          format: int64
          nullable: true
      required:
        - records

    ChangeManagerState:
      type: object
      description: |
        Edit-session state. Returned by `GET /edit/changeManager`.
      properties:
        locked:
          type: boolean
          description: Whether someone currently holds the edit lock.
        lockOwner:
          type: string
          description: "User holding the lock, when `locked: true`."
        hasChanges:
          type: boolean
        mergeNeeded:
          type: boolean
          description: True when the global config has advanced under the session.
        editSession:
          type: string
          example: default

paths:
  /edit/changeManager:
    get:
      operationId: getChangeManagerState
      tags: [change-manager]
      summary: Read current edit-session state.
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
      responses:
        '200':
          description: Session state envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeManagerState'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /edit/changeManager/startEdit:
    post:
      operationId: startEdit
      tags: [change-manager]
      summary: Acquire the edit lock.
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Lock acquired or already held.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /edit/changeManager/cancelEdit:
    post:
      operationId: cancelEdit
      tags: [change-manager]
      summary: Discard pending changes and release the edit lock.
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Pending changes discarded.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /edit/changeManager/activate:
    post:
      operationId: activate
      tags: [change-manager]
      summary: Activate pending changes.
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Changes activated.
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /edit/changeManager/safeResolve:
    post:
      operationId: safeResolve
      tags: [change-manager]
      summary: Reconcile session against global config (safe mode).
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Reconciliation succeeded.
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /domainRuntime/search:
    post:
      operationId: searchDomainRuntime
      tags: [domainRuntime]
      summary: Bulk-fetch a tree slice of runtime beans in one request.
      description: |
        Accepts a `BulkSearchRequest` body describing the desired tree
        shape and answers with a JSON document that mirrors the request
        structure, populated with the requested fields. Allows a single
        request to harvest many runtime values that would otherwise
        require N separate REST round-trips.

        ### Body shape (verified)

        - `fields` — array of property names to read on the current
          node. Unknown property names are silently ignored.
        - `links` — array of link relation names to keep in the response.
          Pass `[]` to suppress the HATEOAS `links` array on this node
          entirely. **Must be an array** — passing the string `"none"`
          (which is valid as a query parameter on GET) returns `400`
          with detail `The property 'links' must be an array.`
        - `children` — object whose keys are child collection or
          singleton names (e.g. `serverRuntimes`, `threadPoolRuntime`)
          and whose values are themselves `BulkSearchRequest` nodes.
          Recursive to arbitrary depth.
        - `name` — when used inside a `children.<collection>` node,
          restricts the collection to the listed instance names.

        Top-level keys not listed above are silently ignored.

        ### Response shape

        Mirrors the request: each requested child appears as either a
        single object (when targeting a singleton MBean such as
        `threadPoolRuntime`) or an `{"items": [...]}` envelope (when
        targeting a collection such as `serverRuntimes`). The fields
        listed in `fields` populate each node, and any `links` array
        requested is appended at the same level.

        ### Failure modes (verified, WLS 14.1.2)

        | Condition | HTTP | Body |
        |---|---|---|
        | No `X-Requested-By` header | 400 | `Bad Request` (text/html) |
        | Wrong content type | 415 | `Unsupported Media Type` |
        | GET instead of POST | 405 | RFC-7807-style JSON error |
        | `/management/wls/latest/...` namespace | 404 | `Not Found` |
        | Invalid JSON body | 400 | `Bad Request` (text/html) |
        | `"links": "none"` (string) | 400 | RFC-7807 JSON: `must be an array` |
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSearchRequest'
            examples:
              empty:
                summary: Empty body — returns the full domainRuntime root with HATEOAS links.
                value: {}
              serversBasic:
                summary: Names and states of every running server.
                value:
                  fields: []
                  links: []
                  children:
                    serverRuntimes:
                      fields: [name, state]
                      links: []
              serversWithThreadPool:
                summary: Server state plus thread pool counters in one call.
                value:
                  fields: []
                  links: []
                  children:
                    serverRuntimes:
                      fields: [name, state]
                      links: []
                      children:
                        threadPoolRuntime:
                          fields:
                            - executeThreadTotalCount
                            - hoggingThreadCount
                            - stuckThreadCount
                          links: []
      responses:
        '200':
          description: Tree slice mirroring the request structure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSearchResponse'
        '400':
          description: |
            Returned for two distinct reasons. **`text/html` body
            containing `Bad Request`**: the CSRF check or JSON parser
            rejected the request before it reached the DSL validator —
            most commonly because the `X-Requested-By` header is
            missing. **RFC-7807 JSON body**: the DSL validator rejected
            a value (e.g. `links` was not an array).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
            text/html:
              schema:
                type: string
                description: Plain `Bad Request` page; rejection happened before DSL validation.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          description: Wrong HTTP method (only POST is accepted).
        '415':
          description: Unsupported `Content-Type` (only `application/json` is accepted).

  /domainRuntime/serverLifeCycleRuntimes/{serverName}/startInAdmin:
    parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - name: serverName
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: startServerInAdmin
      tags: [lifecycle]
      summary: Start the server, halting in ADMIN state.
      description: |
        Boots the server through NodeManager but stops it in `ADMIN`
        state — the server runs but accepts only administrative
        traffic. This action is **not** declared in the WebLogic Remote
        Console's `extension.yaml` overlay; it is recovered here
        manually. See the Phase 4d-2 report for the decision rationale
        (Java scraping was attempted; only `startInAdminMode` for
        application deployments was found, distinct from this server-
        lifecycle action).

        Like the other lifecycle actions, the call returns a
        populated `ServerLifeCycleTaskRuntime` envelope (see the
        `lifecycle-async-task-shape` quirk). Failures surface via
        `taskError` rather than HTTP status.
      parameters:
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: array
                  description: Optional NodeManager start properties (server.start.* keys).
                  items:
                    type: string
            example: {}
      responses:
        '200':
          description: Lifecycle task descriptor (always populated, even on synchronous completion).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerLifeCycleTaskRuntime'
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /domainRuntime/serverLifeCycleRuntimes/{serverName}/startInStandby:
    parameters:
      - $ref: '#/components/parameters/VersionPathParam'
      - name: serverName
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: startServerInStandby
      tags: [lifecycle]
      summary: Start the server, halting in STANDBY state.
      description: |
        Boots the server through NodeManager but stops it in `STANDBY`
        state — listen ports closed, server initialized but not
        accepting any traffic. Useful as a "warm spare" before
        promoting the instance with a follow-up `resume`.

        As with `startInAdmin`, this action is not declared in the
        Remote Console `extension.yaml` overlay; recovered manually
        for the generated spec. Same async-task envelope as the other
        lifecycle actions (`lifecycle-async-task-shape` quirk).
      parameters:
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: array
                  description: Optional NodeManager start properties (server.start.* keys).
                  items:
                    type: string
            example: {}
      responses:
        '200':
          description: Lifecycle task descriptor (always populated, even on synchronous completion).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerLifeCycleTaskRuntime'
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /edit/changeManager/forceResolve:
    post:
      operationId: forceResolve
      tags: [change-manager]
      summary: Reconcile session against global config (force mode, your changes win).
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Reconciliation succeeded.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /domainRuntime/serverRuntimes/{serverName}/WLDFRuntime/WLDFAccessRuntime/WLDFDataAccessRuntimes/{WLDFDataAccessName}/search:
    parameters:
      - name: serverName
        in: path
        required: true
        schema:
          type: string
        description: Identifier of the parent `serverRuntimes` item.
      - name: WLDFDataAccessName
        in: path
        required: true
        schema:
          type: string
        description: Identifier of the WLDF data-access archive (server log, http log, harvested store, …).
    post:
      operationId: searchWLDFDataAccessRuntime
      tags: [domainRuntime]
      summary: Page records from a WLDF data-access archive.
      description: |
        Time-windowed search over a `WLDFDataAccessRuntime` archive.
        Returns a page of records plus a `nextRecordId` cursor for
        forward iteration.

        **Source.** This action is not declared in the harvested
        `WLDFDataAccessRuntimeMBean/extension.yaml`. It is a runtime
        endpoint exposed for the Remote Console's log viewer (note the
        `enableConsoleRestExtension` query flag). Empirically verified
        on WLS 12.2.1.4 and 14.1.2 — see
        `x-weblogic-empirically-verified-versions`.

        **Cross-version response shape.** The `WLDFLogRecord.TIMESTAMP`
        column carries a JSON integer on 14.1.x / 15.1.x but a JSON
        string of digits on 12.2.1.x. The schema models both forms via
        `oneOf`; consumers must coerce. `RECORDID`, `nextRecordId` and
        `SEVERITY_VALUE` are integers on both releases.

        **Semantically read.** Despite using POST, this action does not
        mutate WLS state — see `x-weblogic-action-kind: read`.
      x-weblogic-action-kind: read
      x-weblogic-empirically-verified-versions: ["12.2.1.4.0", "14.1.2.0.0"]
      x-weblogic-source: WLS Remote Console internal extension (not in oracle/weblogic-remote-console extension.yaml)
      parameters:
        - $ref: '#/components/parameters/VersionPathParam'
        - $ref: '#/components/parameters/XRequestedByHeader'
        - name: internal
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Console-internal flag. Observed value `true` in working calls.
        - name: expandedValues
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Console-internal flag. Observed value `false` in working calls.
        - name: saveChanges
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Console-internal flag. Observed value `false` in working calls.
        - name: enableConsoleRestExtension
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: |
            Required to opt into the Remote Console's REST extension surface
            (which is what exposes this `search` action). Observed value
            `true` in working calls; omitting it returns 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WLDFLogRecordSearchRequest'
            example:
              since: '2026-04-29T08:00:00.000Z'
              until: '2026-04-29T09:00:00.000Z'
              limit: 25
      responses:
        '200':
          description: Page of records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WLDFLogRecordSearchResponse'
        '400':
          $ref: '#/components/responses/EditError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
